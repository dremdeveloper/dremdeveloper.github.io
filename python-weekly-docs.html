  <style>
    :root {
      --bg: #f4f7fb;
      --bg-soft: #f8fbff;
      --panel: #ffffff;
      --panel-soft: #f7faff;
      --line: #d7e2ef;
      --line-strong: #c7d5e5;
      --text: #111827;
      --muted: #4b5563;
      --muted-soft: #667085;
      --primary: #0969da;
      --primary-soft: #eaf2fd;
      --shadow: 0 16px 34px rgba(15, 23, 42, 0.08);
      --radius-xl: 22px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: linear-gradient(180deg, #f8fbff 0%, #f4f7fb 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      line-height: 1.85;
      word-break: keep-all;
    }
    body.embed { background: transparent; }
    body.embed .app { grid-template-columns: minmax(0, 1fr); }
    body.embed .sidebar { display: none; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button { font: inherit; }

    .shell { width: 100%; }
    .app {
      display: grid;
      grid-template-columns: minmax(240px, 292px) minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }
    .sidebar { position: sticky; top: 16px; display: grid; gap: 14px; }
    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .sidebar-card {
      padding: 22px 20px;
      background: linear-gradient(180deg, #ffffff 0%, #f7faff 100%);
    }
    .eyebrow {
      margin: 0 0 10px;
      color: var(--primary);
      font-size: .84rem;
      font-weight: 800;
      letter-spacing: .02em;
    }
    .sidebar-card h1 {
      margin: 0;
      font-size: 1.36rem;
      line-height: 1.35;
    }
    .sidebar-card p {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: .96rem;
      line-height: 1.75;
    }
    .sidebar-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--text);
      font-size: .83rem;
      font-weight: 700;
    }

    .menu-card { padding: 12px; max-height: calc(100vh - 220px); overflow: auto; }
    .menu-card::-webkit-scrollbar { width: 10px; }
    .menu-card::-webkit-scrollbar-thumb { background: #d7e2ef; border-radius: 999px; border: 2px solid #fff; }
    .week-group + .week-group { margin-top: 14px; }
    .week-label { margin: 0; }
    .menu-list { display: grid; gap: 8px; }
    .week-list[hidden] { display: none; }
    .menu-button {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 16px;
      background: transparent;
      padding: 12px 13px;
      text-align: left;
      color: var(--text);
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease, transform .15s ease;
    }
    .menu-button:hover { background: #f6f9fd; border-color: #dbe7f4; transform: translateY(-1px); }
    .menu-button.active { background: var(--primary-soft); border-color: #c9dcf5; }
    .menu-title { display: block; font-size: .95rem; font-weight: 700; line-height: 1.45; }
    .week-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .week-label-copy {
      display: grid;
      gap: 2px;
    }
    .week-meta {
      color: var(--muted-soft);
      font-size: .8rem;
      font-weight: 700;
    }
    .week-toggle-icon {
      flex: 0 0 auto;
      color: var(--primary);
      font-size: 1rem;
      font-weight: 900;
      line-height: 1;
    }

    .viewer { overflow: hidden; }
    .viewer-head {
      padding: 22px 26px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    }
    .viewer-meta { margin: 0 0 8px; color: var(--primary); font-size: .84rem; font-weight: 800; letter-spacing: .02em; }
    .viewer-title { margin: 0; font-size: clamp(1.42rem, 2vw, 1.9rem); line-height: 1.35; }
    .viewer-body {
      padding: 28px clamp(18px, 4vw, 42px) 56px;
    }
    .doc-prose { max-width: 860px; }
    .doc-prose > :first-child { margin-top: 0; }
    .lead {
      margin: 0 0 22px;
      color: #243043;
      font-size: 1.04rem;
      line-height: 1.95;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 0 0 24px;
    }
    .summary-item {
      padding: 15px 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }
    .summary-label { display: block; margin-bottom: 6px; color: var(--muted-soft); font-size: .82rem; font-weight: 700; }
    .summary-value { display: block; font-size: .98rem; line-height: 1.6; }
    .section-heading {
      margin: 40px 0 14px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      font-size: 1.22rem;
      line-height: 1.4;
    }
    .section-heading:first-of-type { margin-top: 10px; }
    .step-heading { margin: 26px 0 10px; font-size: 1.04rem; line-height: 1.55; }
    .doc-prose p { margin: 0 0 1rem; font-size: 1rem; color: var(--text); }
    .doc-prose ul, .doc-prose ol { margin: 0 0 1.05rem 1.15rem; padding: 0; }
    .doc-prose li { margin: .38rem 0; color: var(--text); }
    .doc-prose li > p { margin: 0; }
    .inline-note { color: var(--muted); }
    .inline-label {
      display: inline-flex;
      align-items: center;
      margin-right: 8px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: .82rem;
      font-weight: 800;
      vertical-align: middle;
    }
    .inline-label-soft { background: #eef4fb; color: #345176; }
    .callout-box {
      margin: 22px 0 24px;
      padding: 18px 20px;
      border: 1px solid #cfe0f5;
      border-radius: 18px;
      background: linear-gradient(180deg, #f8fbff 0%, #eef5ff 100%);
    }
    .callout-label { margin: 0 0 8px; color: var(--primary); font-size: .88rem; font-weight: 800; }
    .callout-box p:last-child { margin-bottom: 0; }
    .table-scroll { margin: 18px 0 24px; overflow-x: auto; }
    .table-scroll table {
      min-width: 100%;
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
    }
    .table-scroll th, .table-scroll td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: .95rem;
      line-height: 1.75;
    }
    .table-scroll tr:last-child td { border-bottom: 0; }
    .table-scroll th:last-child, .table-scroll td:last-child { border-right: 0; }
    .table-scroll thead th { background: #f8fbff; font-weight: 800; }
    .doc-prose code {
      padding: .18em .42em;
      border-radius: 8px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .95em;
    }
    .doc-prose pre {
      overflow: auto;
      padding: 17px 18px;
      border-radius: 18px;
      background: #111827;
      color: #f9fafb;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .92rem;
      line-height: 1.7;
    }
    .doc-prose pre code { background: transparent; border: 0; color: inherit; padding: 0; }
    .doc-prose blockquote {
      margin: 18px 0;
      padding: 15px 18px;
      border-left: 4px solid #c8d9ee;
      border-radius: 0 16px 16px 0;
      background: #f7fbff;
      color: var(--muted);
    }
    .doc-prose hr { border: 0; border-top: 1px solid var(--line); margin: 28px 0; }
    .doc-empty { color: var(--muted); }

    .repo-link {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
      border-bottom: 1px solid rgba(9, 105, 218, 0.28);
      box-shadow: inset 0 -1px 0 rgba(9, 105, 218, 0.08);
      transition: color .15s ease, border-color .15s ease, box-shadow .15s ease;
    }
    .repo-link:hover {
      color: #0754ad;
      text-decoration: none;
      border-bottom-color: rgba(7, 84, 173, 0.52);
      box-shadow: inset 0 -1px 0 rgba(7, 84, 173, 0.16);
    }
    .repo-link:focus-visible {
      outline: 2px solid rgba(9, 105, 218, 0.28);
      outline-offset: 2px;
      border-radius: 6px;
    }

    .problem-link {
      color: #0a5fc4;
      font-weight: 800;
      text-decoration: none;
      border-bottom: 1px solid rgba(10, 95, 196, 0.34);
      box-shadow: inset 0 -1px 0 rgba(10, 95, 196, 0.08);
      transition: color .15s ease, border-color .15s ease, box-shadow .15s ease;
    }
    .problem-link:hover {
      color: #084b99;
      text-decoration: none;
      border-bottom-color: rgba(8, 75, 153, 0.52);
      box-shadow: inset 0 -1px 0 rgba(8, 75, 153, 0.16);
    }
    .problem-link:focus-visible {
      outline: 2px solid rgba(10, 95, 196, 0.28);
      outline-offset: 2px;
      border-radius: 6px;
    }

    @media (max-width: 1024px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .menu-card { max-height: none; }
    }
    @media (max-width: 720px) {
      .summary-grid { grid-template-columns: 1fr; }
      .viewer-head { padding: 18px 18px 16px; }
      .viewer-body { padding: 22px 16px 42px; }
      .sidebar-card { padding: 18px 16px; }
      .menu-card { padding: 10px; }
      .table-scroll table { min-width: 640px; }
    }
  </style>
</head>

    const docs = {"w1-a01":"<div class=\"doc-prose\"><p class=\"lead\">이번 문서는 학습 범위, 핵심 목표, 참고 자료를 빠르게 확인할 수 있도록 정리한 과제 안내입니다.</p><section class=\"summary-grid\"><div class=\"summary-item\"><span class=\"summary-label\">범위</span><strong class=\"summary-value\">00~04장 | 이론 정리 및 문법 드릴</strong></div><div class=\"summary-item\"><span class=\"summary-label\">핵심 역량</span><strong class=\"summary-value\">문제 해석 루틴, 시간복잡도 감각, 파이썬 기본 문법, 디버깅 로그 작성</strong></div><div class=\"summary-item\"><span class=\"summary-label\">권장 시간</span><strong class=\"summary-value\">4~5시간 | 난도: 하</strong></div></section><h2 class=\"section-heading\">과제 개요</h2><p>이 과제는 4주 커리큘럼 전체의 출발점입니다. 문제를 읽고 바로 코드를 치는\n습관을 끊고, 입력/출력 분석, 자료구조 후보 선정, 시간복잡도 검토,\n의사코드 작성, 구현, 검증이라는 일정한 절차를 몸에 익히는 것을 목표로\n합니다. 이후의 모든 과제는 이 문서에서 만든 체크리스트를 기반으로\n진행됩니다.</p><p>특히 대기업 코딩 테스트에서는 실력 차이보다도 문제를 푸는 흐름이\n무너져서 시간을 낭비하는 경우가 많습니다. 따라서 이 과제에서는 “정답\n코드”보다 “풀이 프로세스”를 먼저 표준화해야 하며, GitHub 저장소의\n문법·성능·에러 폴더를 함께 보며 파이썬 코테 환경을 안정적으로 세팅해야\n합니다.</p><section class=\"callout-box\"><p class=\"callout-label\">대기업 코딩 테스트 연결 포인트</p><p>실제 대기업 코딩 테스트에서는 쉬운 문제를 맞히지 못하는 이유가\n알고리즘 부족보다도 입력 해석 누락, 복잡도 오판, 기본 문법 실수인 경우가\n많습니다. 이 과제를 마치면 최소한 문제를 분석하는 기본 프레임과\n파이썬에서 자주 쓰는 문법 블록을 안정적으로 사용할 수 있어야\n합니다.</p></section><h2 class=\"section-heading\">학습 목표</h2><ul>\n<li><p>문제를 읽은 뒤 바로 구현하지 않고, 풀이 순서를 한 장짜리 체크리스트로\n정리할 수 있다.</p>\n</li>\n<li><p>O(N), O(N log N), O(N²) 정도의 복잡도 허용 범위를 입력 크기에 따라\n대략 판별할 수 있다.</p>\n</li>\n<li><p>Counter, deque, dict, set, sort(key=...), zip, try/except 같은 파이썬\n코테 기본 문법을 손으로 다시 쓸 수 있다.</p>\n</li>\n<li><p>자주 보는 런타임 에러를 원인과 예방책 중심으로 정리할 수 있다.</p>\n</li>\n</ul><h2 class=\"section-heading\">세부 수행 절차</h2><h3 class=\"step-heading\">1. 풀이 루틴 체크리스트 만들기</h3><p>책 00~01장을 읽고 “문제 읽기 → 입력/출력 정리 → 자료구조 후보 2개 쓰기 →\n시간복잡도 계산 → 의사코드 → 구현 → 테스트” 순서의 개인 체크리스트를\n작성합니다. 이 체크리스트는 이후 모든 문제 풀이의 공통 전처리 문서가\n되므로, 각 단계에서 무엇을 확인해야 하는지 질문형 문장으로 적는 것이\n좋습니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 예: 입력 크기가 100만이면 O(N²) 접근을 버리는지, 정렬을\n허용할 수 있는지부터 묻기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">2. 파이썬 기본 문법 직접 타이핑</h3><p>reference 폴더의 자주 쓰는 문법 파일을 보고 Counter, deque, dictionary,\nlambda, list comprehension, zip, try/except 예제를 직접 타이핑합니다.\n복붙하지 말고 변수명과 입력값을 바꿔서 동일한 기능을 다시 구현해 보세요.\n손에 익힐 때까지 최소 두 번은 다시 입력하는 편이 좋습니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 각 문법마다 “언제 쓰는지” 한 줄 주석을 달고, 5~10줄짜리\n작은 예제를 본인이 다시 만들기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">3. 성능 비교 메모 작성</h3><p>performance 폴더의 list vs deque, list vs set membership, append vs\nplus, string concatenation 관련 예제를 보고 왜 같은 기능처럼 보이는데\n속도가 달라지는지 정리합니다. 이때 단순히 빠르다/느리다가 아니라 어떤\n연산이 내부적으로 더 많은 이동 비용을 만드는지 적어야 합니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 특히 list.pop(0)와 deque.popleft()의 차이, in 연산에서\nlist와 set의 차이를 반드시 설명하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">4. 에러 로그 템플릿 만들기</h3><p>errorcode 폴더를 참고해 IndexError, KeyError, NameError, RecursionError,\nTypeError, ValueError를 중심으로 원인과 대응책을 정리합니다. 이 문서는\n앞으로 과제에서 실제 에러가 났을 때 원인 추적표로 계속 업데이트할\n예정입니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 각 에러마다 “자주 나는 상황 / 에러 메시지 / 예방 습관 /\n빠른 점검 순서” 4칸으로 정리하기</p>\n</li>\n\n</ul><h2 class=\"section-heading\">GitHub 활용 가이드</h2><div class=\"table-scroll\"><table>\n<thead>\n<tr>\n<th><strong>참고 경로</strong></th>\n<th><strong>사용 시점</strong></th>\n<th><strong>활용 방식</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>reference/</strong></td>\n<td>문법을 다시 입력해 손에 익힐 때</td>\n<td>counter.py, deque.py, dictionary.py, lambda.py, list_comprehension.py, zip.py, try_except.py를 우선 봅니다.</td>\n</tr>\n<tr>\n<td><strong>performance/</strong></td>\n<td>시간 초과 원인을 점검할 때</td>\n<td>list_vs_deque_pop_performance.py, list_vs_set_in.py, append_vs_plus_performance.py, string_concatenation_performance.py를 참고합니다.</td>\n</tr>\n<tr>\n<td><strong>errorcode/</strong></td>\n<td>런타임 에러 원인을 찾을 때</td>\n<td>index_out_of_range.py, key_error.py, name_error.py, recursion_limit_exceed.py 등으로 메시지 의미를 빠르게 파악합니다.</td>\n</tr>\n</tbody>\n</table></div><h2 class=\"section-heading\">자주 하는 실수와 교정 포인트</h2><p><strong>1)</strong> 문법 예제를 읽기만 하고 직접 손으로 다시 쓰지 않으면 시험장에서\n바로 떠오르지 않습니다. 반드시 입력값을 바꿔 다시 구현하세요.</p><p><strong>2)</strong> 시간복잡도를 숫자 감각 없이 외우기만 하면 제약을 보고도 판단이\n흔들립니다. 입력 크기를 보고 허용 복잡도를 역으로 추정하는 연습을 같이\n해야 합니다.</p><p><strong>3)</strong> 에러 노트를 만들 때 메시지만 적고 상황을 적지 않으면 실제\n디버깅에 도움이 되지 않습니다. 어떤 상황에서 그 에러가 자주 나는지까지\n기록해야 합니다.</p><p><strong>4)</strong> 기초 과제라서 가볍게 넘기면 이후 모든 과제의 효율이 떨어집니다.\n이 과제는 공부 속도를 높이는 기반 작업이라는 점을 기억하세요.</p></div>","w1-a02":"<div class=\"doc-prose\"><p class=\"lead\">이번 문서는 학습 범위, 핵심 목표, 참고 자료를 빠르게 확인할 수 있도록 정리한 과제 안내입니다.</p><section class=\"summary-grid\"><div class=\"summary-item\"><span class=\"summary-label\">범위</span><strong class=\"summary-value\">05장 | 문제 01~07</strong></div><div class=\"summary-item\"><span class=\"summary-label\">핵심 역량</span><strong class=\"summary-value\">배열 조작, 정렬 기반 사고, 중복 제거, 인덱스 설계</strong></div><div class=\"summary-item\"><span class=\"summary-label\">권장 시간</span><strong class=\"summary-value\">5~6시간 | 난도: 중</strong></div></section><h2 class=\"section-heading\">과제 개요</h2><p>배열은 거의 모든 코딩 테스트 문제의 기본 무대입니다. 이 과제는 문제\n01~07을 풀면서 배열 문제를 “정렬형 / 중복 처리형 / 시뮬레이션형 / 인덱스\n관리형”으로 분류하는 감각을 만드는 데 초점을 둡니다. 단순히 답을 맞히는\n것보다, 어떤 상황에서 정렬을 먼저 해도 되는지와 어떤 정보를 집합이나\n배열 인덱스로 기록해야 하는지를 말로 설명할 수 있어야 합니다.</p><p>특히 실패율과 방문 길이 문제는 겉으로는 구현처럼 보이지만, 실제로는\n카운팅 전략과 상태 표현 방식이 핵심입니다. 대기업 코딩 테스트에서는 이런\n“배열 + 상태 정의” 문제가 아주 자주 나오므로, 문제별 패턴 노트를 남겨\n두면 이후 정렬/해시/시뮬레이션 과제와 자연스럽게 연결됩니다.</p><section class=\"callout-box\"><p class=\"callout-label\">대기업 코딩 테스트 연결 포인트</p><p>배열 문제는 쉬워 보여서 빠르게 지나가지만, 정렬 여부 판단과 상태 저장\n방식이 흔들리면 뒤의 정렬·해시·시뮬레이션 문제에서도 같은 실수가\n반복됩니다. 이 과제는 선형 자료구조 문제의 기본 판단 속도를 끌어올리는\n역할을 합니다.</p></section><h2 class=\"section-heading\">학습 목표</h2><ul>\n<li><p>배열 문제를 유형별로 분류하고, 각 유형에서 먼저 떠올릴 자료구조를\n정리할 수 있다.</p>\n</li>\n<li><p>정렬을 적용했을 때 얻는 이점과 정렬하면 안 되는 경우를 구분할 수 있다.</p>\n</li>\n<li><p>문제06 실패율과 문제07 방문 길이처럼 상태를 올바르게 기록하는 문제를\n다시 구현할 수 있다.</p>\n</li>\n<li><p>문제별로 예외 케이스와 경계 조건을 표 형태로 남길 수 있다.</p>\n</li>\n</ul><h2 class=\"section-heading\">세부 수행 절차</h2><h3 class=\"step-heading\">1. 문제 01~07 1차 풀이</h3><p>문제01부터 문제07까지를 순서대로 풉니다. 각 문제를 풀기 전에 “정렬이\n필요한지”, “중복 제거가 필요한지”, “인덱스를 그대로 써도 되는지”,\n“상태를 집합으로 저장해야 하는지”를 먼저 써보세요. 풀이 과정에서 떠올린\n첫 접근과 최종 접근이 다르면 둘 다 남겨 두는 것이 중요합니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 문제별로 5분 이내에 유형 태그를 붙이고 시작하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">2. 배열 패턴 분류표 작성</h3><p>문제01~07을 정렬, 중복 제거, 시뮬레이션, 인덱스 설계 네 가지 관점으로\n재분류합니다. 한 문제에 두 개 이상의 태그가 붙어도 괜찮지만, 왜 그렇게\n분류했는지 이유를 같이 적어야 합니다. 이 표는 이후 해시/정렬/시뮬레이션\n과제에서 재사용할 분류 기준이 됩니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 문제마다 “정렬을 했더니 쉬워진 점” 또는 “정렬하면 정보가\n깨지는 점”을 한 줄로 적기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">3. 문제06 실패율 재구현</h3><p>카운팅과 정렬, 누적 분모 갱신이 어떻게 결합되는지 설명한 뒤 문제06을 빈\n파일에서 다시 구현합니다. 이 문제는 매 단계마다 전체를 다시 세면\n비효율적이므로, 한 번 센 정보를 누적해서 사용하는 방식으로 정리해야\n합니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> Counter 또는 배열 카운팅을 쓰는 이유를 코드 옆 주석으로\n적기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">4. 문제07 방문 길이 재구현</h3><p>문제07은 좌표가 아니라 “간선 방문 여부”를 저장해야 한다는 점이\n핵심입니다. 동일한 길을 반대 방향으로 다시 지나갈 수 있다는 점까지\n고려해 상태 표현을 설계하고, 왜 점 방문 기록으로는 부족한지 설명합니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 집합에 어떤 형태의 튜플을 넣을지 먼저 종이에 설계한 뒤\n구현하기</p>\n</li>\n\n</ul><h2 class=\"section-heading\">GitHub 활용 가이드</h2><div class=\"table-scroll\"><table>\n<thead>\n<tr>\n<th><strong>참고 경로</strong></th>\n<th><strong>사용 시점</strong></th>\n<th><strong>활용 방식</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>solution/</strong></td>\n<td>1차 자력 풀이 후 비교할 때</td>\n<td>01.py~07.py를 바로 베끼지 말고, 내 풀이와 무엇이 다른지만 비교합니다.</td>\n</tr>\n<tr>\n<td><strong>reference/</strong></td>\n<td>정렬/zip/list comprehension 문법이 헷갈릴 때</td>\n<td>lambda.py, list_comprehension.py, zip.py를 같이 보면 배열 문제 구현 속도를 높일 수 있습니다.</td>\n</tr>\n<tr>\n<td><strong>performance/</strong></td>\n<td>중복 제거와 membership 비용을 따져 볼 때</td>\n<td>list_vs_set_in.py를 보고 리스트 대신 집합을 쓸 시점을 정리합니다.</td>\n</tr>\n</tbody>\n</table></div><h2 class=\"section-heading\">자주 하는 실수와 교정 포인트</h2><p><strong>1)</strong> 배열 문제를 “그냥 구현”으로 분류해 버리면 핵심 패턴이 남지\n않습니다. 반드시 정렬/중복/인덱스/상태 표현 관점에서 다시 분류하세요.</p><p><strong>2)</strong> 문제07에서 좌표 방문만 기록하면 같은 길을 반대 방향으로 지나가는\n경우를 제대로 처리하지 못합니다. 길 자체를 상태로 저장해야 합니다.</p><p><strong>3)</strong> 행렬이나 인덱스 문제에서 0-based와 1-based를 섞으면 구현은 맞아\n보여도 테스트에서 틀립니다. 인덱스 기준을 초반에 적어 두세요.</p><p><strong>4)</strong> 문제06처럼 매 단계마다 전체를 다시 세는 방식은 작은 입력에서는\n되더라도, 실전에서는 시간 낭비로 이어집니다. 이미 계산한 값을 재사용하는\n습관을 들이세요.</p></div>","w1-a03":"<div class=\"doc-prose\"><p class=\"lead\">이번 문서는 학습 범위, 핵심 목표, 참고 자료를 빠르게 확인할 수 있도록 정리한 과제 안내입니다.</p><section class=\"summary-grid\"><div class=\"summary-item\"><span class=\"summary-label\">범위</span><strong class=\"summary-value\">06장 | 문제 08~14</strong></div><div class=\"summary-item\"><span class=\"summary-label\">핵심 역량</span><strong class=\"summary-value\">스택 기본 패턴, 괄호 처리, 단조 구조 사고, 상태 복원</strong></div><div class=\"summary-item\"><span class=\"summary-label\">권장 시간</span><strong class=\"summary-value\">6시간 | 난도: 상</strong></div></section><h2 class=\"section-heading\">과제 개요</h2><p>스택 문제는 단순히 자료구조를 사용하는 문제라기보다 “가장 최근 상태를\n먼저 처리한다”는 규칙을 발견하는 문제에 가깝습니다. 이 과제에서는 괄호\n검증, 숫자 변환, 인접 쌍 제거, 주식 가격, 편집기와 같은 다양한 모양의\n스택 문제를 한꺼번에 경험하면서, 값 자체를 쌓아야 하는지 인덱스를 쌓아야\n하는지를 구분하는 훈련을 합니다.</p><p>문제14 표 편집은 1주차에서 가장 어려운 문제군에 속하므로, 맞혔는지\n여부보다도 상태를 어떤 구조로 저장했는지가 더 중요합니다. 이 과제는 기본\n스택 문제를 넘어 “삭제/복구 기록”, “미래 시점 추적”, “상태 복원”까지\n확장된 스택 활용을 다루도록 설계했습니다.</p><section class=\"callout-box\"><p class=\"callout-label\">대기업 코딩 테스트 연결 포인트</p><p>대기업 코딩 테스트에서 스택은 괄호, 문자열 압축, 직전 상태 취소,\n다음에 처음 깨지는 지점 찾기처럼 형태를 바꿔 자주 등장합니다. 이\n과제에서 스택을 값 저장소가 아니라 상태 압축 도구로 이해해야 실전\n문제에서 패턴을 빨리 인식할 수 있습니다.</p></section><h2 class=\"section-heading\">학습 목표</h2><ul>\n<li><p>괄호 검증, 변환, 인접 소거 문제를 스택의 관점에서 통합해 설명할 수\n있다.</p>\n</li>\n<li><p>현재 값이 아니라 인덱스를 스택에 넣어야 하는 이유를 말할 수 있다.</p>\n</li>\n<li><p>삭제와 복구가 섞인 문제에서 스택을 기록 장치로 활용할 수 있다.</p>\n</li>\n<li><p>고난도 구현 문제를 풀이 후 다음 날 빈 파일에서 다시 재현할 수 있다.</p>\n</li>\n</ul><h2 class=\"section-heading\">세부 수행 절차</h2><h3 class=\"step-heading\">1. 문제 08~11 풀이 후 공통 패턴 추출</h3><p>문제08 괄호 짝 맞추기, 문제09 진수 변환, 문제10 괄호 회전하기, 문제11\n짝지어 제거하기를 푼 뒤 공통 패턴을 적습니다. 스택이 “열린 상태를 임시\n보관하는가”, “최근 입력을 취소하는가”, “출력의 역순 생성을 돕는가”를\n기준으로 묶어 보세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 각 문제를 값 저장형 스택인지, 상태 검증형 스택인지 태그로\n붙이기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">2. 스택 템플릿 함수 작성</h3><p>is_valid_parentheses, to_binary, remove_adjacent_pairs, stock_duration\n같은 보편 템플릿 함수를 직접 작성합니다. 단순히 현재 책 문제를 푸는\n코드가 아니라, 다른 문제에서도 그대로 재사용할 수 있는 형태로 함수화를\n해 두는 것이 목적입니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 함수별 입력/출력 예시를 주석으로 적고, 예제 테스트를 2개\n이상 추가하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">3. 문제12와 문제13의 스택 활용 차이 정리</h3><p>문제12 주식 가격은 “가격이 언제 처음 떨어지는지”를 추적해야 하므로\n인덱스를 스택에 넣는 편이 자연스럽습니다. 반면 문제13 크레인 인형 뽑기\n게임은 실제 값 비교와 제거가 핵심입니다. 두 문제를 비교해 스택에 무엇을\n저장해야 하는지 설명해 보세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 값 저장과 인덱스 저장의 장단점을 한 표로 정리하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">4. 문제14 표 편집 3회전 복기</h3><p>문제14는 삭제/복구, 현재 위치 이동, 최종 상태 문자열 생성이 동시에 섞여\n있는 문제입니다. 1차 자력 풀이 40분, 해설 비교, D+1 재구현, D+7 재구현의\n3회전 계획을 세우세요. 이번 문서에는 설계도와 오답 원인 중심으로 남기고,\n재구현 결과는 별도 파일에 축적합니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 삭제 기록과 현재 행 이동 구조를 그림으로 그린 뒤 구현하기</p>\n</li>\n\n</ul><h2 class=\"section-heading\">GitHub 활용 가이드</h2><div class=\"table-scroll\"><table>\n<thead>\n<tr>\n<th><strong>참고 경로</strong></th>\n<th><strong>사용 시점</strong></th>\n<th><strong>활용 방식</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>solution/</strong></td>\n<td>1차 자력 풀이 이후 설계 차이를 볼 때</td>\n<td>08.py~14.py를 참고하되, 문제14는 바로 구현을 따라가지 말고 자료구조 아이디어만 비교합니다.</td>\n</tr>\n<tr>\n<td><strong>mistake/</strong></td>\n<td>인덱스와 범위 실수를 점검할 때</td>\n<td>range_function_usage.py, indexing_convention_tutorial.py, list_in_del_usage.py가 편집/스택 문제에서 도움이 됩니다.</td>\n</tr>\n<tr>\n<td><strong>errorcode/</strong></td>\n<td>빈 스택 pop, 인덱스 실수가 났을 때</td>\n<td>pop-from_empty_list.py, index_out_of_range.py를 먼저 확인합니다.</td>\n</tr>\n</tbody>\n</table></div><h2 class=\"section-heading\">자주 하는 실수와 교정 포인트</h2><p><strong>1)</strong> 스택을 무조건 값 저장소로만 쓰면 주식 가격처럼 “언제 깨졌는지”를\n추적하는 문제에서 구현이 복잡해집니다. 인덱스를 저장하는 발상을 먼저\n떠올리세요.</p><p><strong>2)</strong> 문제14는 한 번에 완벽히 맞히려 하기보다, 어떤 상태를 기록해야\n복구가 가능한지를 분리해서 보는 것이 중요합니다.</p><p><strong>3)</strong> 괄호 문제에서 열린 괄호를 push한 뒤 닫힌 괄호를 만났을 때 바로\npop만 하는 방식은 입력 검증이 빈약하면 오류를 냅니다. 빈 스택 여부를\n먼저 점검해야 합니다.</p><p><strong>4)</strong> 문자열을 직접 많이 이어붙이는 방식은 간단해 보여도 느릴 수\n있습니다. 스택이나 리스트에 쌓고 마지막에 합치는 습관을 들이세요.</p></div>","w1-a04":"<div class=\"doc-prose\"><p class=\"lead\">이번 문서는 학습 범위, 핵심 목표, 참고 자료를 빠르게 확인할 수 있도록 정리한 과제 안내입니다.</p><section class=\"summary-grid\"><div class=\"summary-item\"><span class=\"summary-label\">범위</span><strong class=\"summary-value\">07장 | 문제 15~17</strong></div><div class=\"summary-item\"><span class=\"summary-label\">핵심 역량</span><strong class=\"summary-value\">큐/덱 사용 판단, 포인터 전진, 배치 처리, 원형 구조 사고</strong></div><div class=\"summary-item\"><span class=\"summary-label\">권장 시간</span><strong class=\"summary-value\">3~4시간 | 난도: 중</strong></div></section><h2 class=\"section-heading\">과제 개요</h2><p>큐 문제는 단순히 deque를 쓰는 문제처럼 보이지만, 실제로는 “앞에서 빠지고\n뒤로 들어오는 구조가 필요한가”, “원형처럼 순환하는가”, “단지 두 포인터만\n움직이면 되는가”를 구분하는 과정이 더 중요합니다. 이 과제는 문제15~17을\n통해 deque와 포인터 기반 구현의 선택 기준을 명확히 만드는 데 초점을\n둡니다.</p><p>특히 기능 개발 문제는 날짜를 하루씩 직접 시뮬레이션하는 풀이보다 “완료일\n계산 → 묶음 처리” 방식으로 사고를 전환해야 효율이 좋아집니다. 큐/덱\n문제를 자료구조 이름으로 외우지 말고 흐름 관리 문제로 받아들이는 연습을\n해 보세요.</p><section class=\"callout-box\"><p class=\"callout-label\">대기업 코딩 테스트 연결 포인트</p><p>대기업 코딩 테스트에서는 대기열, 작업 배치, 순환 제거, 두 리스트\n포인터 이동 같은 형태가 자주 나옵니다. 문제를 보고 deque가 정말\n필요한지, 아니면 인덱스만 움직여도 되는지 빠르게 판단하는 능력이 실전\n속도를 크게 좌우합니다.</p></section><h2 class=\"section-heading\">학습 목표</h2><ul>\n<li><p>원형 제거 문제, 작업 묶음 문제, 포인터 전진 문제를 서로 다른 구조로\n설명할 수 있다.</p>\n</li>\n<li><p>list.pop(0)를 피해야 하는 이유를 시간복잡도 관점에서 설명할 수 있다.</p>\n</li>\n<li><p>deque를 써야 하는 문제와 포인터만 있으면 되는 문제를 구분할 수 있다.</p>\n</li>\n<li><p>작업 완료일 계산처럼 시뮬레이션을 더 간단한 모델로 바꾸는 경험을 쌓을\n수 있다.</p>\n</li>\n</ul><h2 class=\"section-heading\">세부 수행 절차</h2><h3 class=\"step-heading\">1. 문제15 요세푸스 문제 풀이</h3><p>원형 구조에서 일정한 간격으로 제거가 일어날 때 deque 회전 또는 인덱스\n순환이 어떻게 동작하는지 정리합니다. 제거 순서를 출력해야 하는지, 마지막\n생존자만 찾으면 되는지에 따라 구현 복잡도가 달라진다는 점도 함께\n적습니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> deque 버전과 인덱스 시뮬레이션 버전의 장단점을 비교하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">2. 문제16 기능 개발의 배치 처리 모델 작성</h3><p>매일 1일씩 시간을 진행시키는 대신, 각 기능의 완료일을 먼저 계산하고\n앞에서부터 한 번 훑으면서 몇 개가 함께 배포되는지 묶는 방식으로\n정리합니다. 이 문제는 큐처럼 보이지만 실제로는 선형 스캔과 그룹 묶음의\n성격이 강합니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 완료일 배열을 만든 뒤, 현재 배포 기준일을 어떻게\n갱신하는지 설명하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">3. 문제17 카드 뭉치의 포인터 풀이</h3><p>두 카드 뭉치에서 앞쪽 카드만 사용할 수 있는 조건을 포인터 두 개로\n표현합니다. 이 문제는 deque를 써도 되지만, 굳이 자료를 삭제하지 않고\n인덱스만 이동해도 풀 수 있다는 점을 정리합니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> deque 풀이와 포인터 풀이를 모두 써 보고, 더 간단한 쪽을\n기록하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">4. 큐/덱 선택 기준 노트 정리</h3><p>문제15~17을 통해 “앞에서 자주 꺼내는가”, “양쪽 삽입/삭제가 필요한가”,\n“실제 자료 삭제가 필요한가”, “단지 순서만 추적하면 되는가”를 질문\n리스트로 정리합니다. 이 기준은 이후 두 큐 합 같게 만들기나 보석 쇼핑\n같은 문제에도 적용됩니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> queue_deque_note.md에 질문형 체크리스트 작성</p>\n</li>\n\n</ul><h2 class=\"section-heading\">GitHub 활용 가이드</h2><div class=\"table-scroll\"><table>\n<thead>\n<tr>\n<th><strong>참고 경로</strong></th>\n<th><strong>사용 시점</strong></th>\n<th><strong>활용 방식</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>performance/</strong></td>\n<td>큐 구현 방식의 성능을 비교할 때</td>\n<td>list_vs_deque_pop_performance.py를 먼저 보고 deque가 필요한 이유를 정리합니다.</td>\n</tr>\n<tr>\n<td><strong>reference/</strong></td>\n<td>deque 문법이 헷갈릴 때</td>\n<td>reference/deque.py와 zip.py, range.py를 함께 보면 포인터 풀이도 정리하기 좋습니다.</td>\n</tr>\n<tr>\n<td><strong>solution/</strong></td>\n<td>자력 풀이 후 구조 비교를 할 때</td>\n<td>15.py~17.py를 보고 더 간결한 모델링이 가능한지 점검합니다.</td>\n</tr>\n</tbody>\n</table></div><h2 class=\"section-heading\">자주 하는 실수와 교정 포인트</h2><p><strong>1)</strong> deque가 익숙하다고 모든 문제에 deque를 쓰면 오히려 코드가\n지저분해질 수 있습니다. 실제 삭제가 필요한지 먼저 판단하세요.</p><p><strong>2)</strong> 기능 개발 문제를 하루씩 증가시키며 시뮬레이션하면 구현은 되더라도\n불필요하게 느립니다. 완료일을 먼저 계산해 묶는 모델로 바꿔야 합니다.</p><p><strong>3)</strong> 원형 문제에서 인덱스 증가 후 범위를 넘어가는 처리를 빼먹으면\n오프바이원 오류가 자주 납니다. 모듈러 연산 또는 deque 회전을 분명히\n선택하세요.</p><p><strong>4)</strong> 포인터 문제에서 실제 배열 삭제를 하면 복잡도와 구현 난도가 모두\n올라갑니다. 읽기 위치만 옮겨도 되는지 꼭 확인하세요.</p></div>","w1-a05":"<div class=\"doc-prose\"><p class=\"lead\">이번 문서는 학습 범위, 핵심 목표, 참고 자료를 빠르게 확인할 수 있도록 정리한 과제 안내입니다.</p><section class=\"summary-grid\"><div class=\"summary-item\"><span class=\"summary-label\">범위</span><strong class=\"summary-value\">08장 | 문제 18~25</strong></div><div class=\"summary-item\"><span class=\"summary-label\">핵심 역량</span><strong class=\"summary-value\">dict/Counter, set membership, 문자열 해싱, 조합+해시, 슬라이딩 윈도우</strong></div><div class=\"summary-item\"><span class=\"summary-label\">권장 시간</span><strong class=\"summary-value\">6시간 | 난도: 상</strong></div></section><h2 class=\"section-heading\">과제 개요</h2><p>해시는 코딩 테스트에서 가장 자주 등장하는 도구 중 하나지만, 단순히\n딕셔너리를 쓴다고 끝나는 영역은 아닙니다. 이 과제에서는 문제18~25를 통해\n빈도 비교, 존재 여부 검사, 최종 상태 매핑, 조합 결과의 표준화, 슬라이딩\n윈도우 갱신까지 해시가 쓰이는 여러 장면을 묶어서 학습합니다.</p><p>특히 문제21 할인 행사, 문제23 베스트 앨범, 문제25 메뉴 리뉴얼은 해시\n하나만으로 끝나지 않고 정렬, 윈도우, 조합과 결합되는 형태입니다. 이\n과제를 통해 “언제 set이면 충분한지”, “언제 Counter가 더 명확한지”,\n“문자열을 어떤 형태로 표준화해야 중복을 정확히 비교할 수 있는지”까지\n정리해 두는 것이 중요합니다.</p><section class=\"callout-box\"><p class=\"callout-label\">대기업 코딩 테스트 연결 포인트</p><p>대기업 코딩 테스트에서 해시 문제는 단독으로도 나오지만, 문자열, 정렬,\n윈도우, 조합과 섞여 더 자주 나옵니다. 해시를 조회 가속기이자 상태\n저장소로 동시에 다룰 수 있어야 풀 수 있는 문제가 크게\n늘어납니다.</p></section><h2 class=\"section-heading\">학습 목표</h2><ul>\n<li><p>문제별로 dict, Counter, set, 문자열 정규화 중 어떤 도구가 핵심인지\n구분할 수 있다.</p>\n</li>\n<li><p>빈도 차이, 최종 매핑, 조합 카운팅, 윈도우 갱신 패턴을 설명할 수 있다.</p>\n</li>\n<li><p>문제19의 문자열 해싱 함수를 다시 구현하고, 왜 해시 충돌이나 표준화가\n중요한지 이해할 수 있다.</p>\n</li>\n<li><p>문제25 메뉴 리뉴얼에서 조합 결과를 표준 형태로 맞춰 세는 과정을 설명할\n수 있다.</p>\n</li>\n</ul><h2 class=\"section-heading\">세부 수행 절차</h2><h3 class=\"step-heading\">1. 문제 18~25 1차 풀이와 도구 태깅</h3><p>문제18부터 25까지를 풀고, 각 문제에 dict counting, Counter, set\nmembership, 조합+해시, 문자열 해싱, 슬라이딩 윈도우 태그를 붙입니다.\n태그는 하나만 고정하지 말고, 실제 풀이에 어떤 도구가 핵심이었는지\n중심으로 정리하세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 각 문제 제목 옆에 핵심 도구와 보조 도구를 함께 적기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">2. 문제19 문자열 해싱 재구현</h3><p>문자열을 수치값으로 매핑하는 과정, 모듈러를 쓰는 이유, 충돌 가능성을\n줄이는 방법을 간단히 적은 뒤 문제19를 다시 구현합니다. 이 문제는 개념\n자체가 중요한 편이므로, 코드보다 해싱 아이디어를 먼저 문장으로 요약하는\n편이 좋습니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 해시 함수의 입력, 누적 방식, 최종 반환값을 주석으로\n남기기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">3. 문제21 할인 행사 윈도우 갱신 정리</h3><p>10일 구간을 매번 새로 세지 않고, 한 칸 이동할 때 빠지는 품목과 들어오는\n품목만 갱신하는 방식으로 정리합니다. 해시를 슬라이딩 윈도우와 결합하는\n대표 문제이므로, 이후 보석 쇼핑 같은 문제를 위해 꼭 패턴 노트를 남겨\n두세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 윈도우가 이동할 때 바뀌는 키와 수량을 표로 적기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">4. 문제23~25 복합 패턴 복기</h3><p>문제23 베스트 앨범은 다중 기준 정렬, 문제24 신고 결과 받기는 set을 통한\n중복 제거, 문제25 메뉴 리뉴얼은 조합 생성 후 문자열을 정렬해 표준 형태로\n세는 패턴이 핵심입니다. 세 문제는 각각 “해시 하나로 끝나지 않는 해시\n문제”라는 공통점이 있으므로 묶어서 비교해 보세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 문제25는 같은 조합을 같은 문자열로 표현하는 방법을 별도\n메모로 남기기</p>\n</li>\n\n</ul><h2 class=\"section-heading\">GitHub 활용 가이드</h2><div class=\"table-scroll\"><table>\n<thead>\n<tr>\n<th><strong>참고 경로</strong></th>\n<th><strong>사용 시점</strong></th>\n<th><strong>활용 방식</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>reference/</strong></td>\n<td>Counter, dictionary, 조합 직접 구현이 필요할 때</td>\n<td>counter.py, dictionary.py, combination_direct.py, permutation_direct.py를 참고합니다.</td>\n</tr>\n<tr>\n<td><strong>solution/</strong></td>\n<td>해시 문제의 정렬/조합 결합 방식을 비교할 때</td>\n<td>18.py~25.py를 보고 내 코드가 불필요하게 길어지지 않았는지 확인합니다.</td>\n</tr>\n<tr>\n<td><strong>performance/</strong></td>\n<td>문자열 결합과 membership 비용을 점검할 때</td>\n<td>string_concatenation_performance.py, list_vs_set_in.py가 유용합니다.</td>\n</tr>\n</tbody>\n</table></div><h2 class=\"section-heading\">자주 하는 실수와 교정 포인트</h2><p><strong>1)</strong> Counter를 쓸 수 있는 문제를 일반 dict로만 푸는 것은 가능하지만,\n의도가 흐려질 수 있습니다. 빈도 비교 문제라면 Counter가 더 명확한지 먼저\n보세요.</p><p><strong>2)</strong> 문제25에서 조합 문자열을 정렬하지 않으면 같은 메뉴 구성을 서로\n다른 값으로 세게 됩니다. 표준 형태를 맞추는 과정이 반드시 필요합니다.</p><p><strong>3)</strong> set은 존재 여부와 중복 제거에는 좋지만 빈도 저장은 직접 하지\n못합니다. 문제 요구가 “몇 번 나왔는가”인지 “있는가”인지 먼저 구분하세요.</p><p><strong>4)</strong> 슬라이딩 윈도우 문제를 매 구간 완전 탐색으로 처리하면 쉽게 시간\n낭비가 발생합니다. 들어오고 나가는 값만 갱신하는 사고를 익히세요.</p></div>","w2-a06":"<div class=\"doc-prose\"><p class=\"lead\">이번 문서는 학습 범위, 핵심 목표, 참고 자료를 빠르게 확인할 수 있도록 정리한 과제 안내입니다.</p><section class=\"summary-grid\"><div class=\"summary-item\"><span class=\"summary-label\">범위</span><strong class=\"summary-value\">09장 | 문제 26~32</strong></div><div class=\"summary-item\"><span class=\"summary-label\">핵심 역량</span><strong class=\"summary-value\">트리 순회, BST 기초, 재귀 설계, 상태 공간 탐색</strong></div><div class=\"summary-item\"><span class=\"summary-label\">권장 시간</span><strong class=\"summary-value\">5~6시간 | 난도: 상</strong></div></section><h2 class=\"section-heading\">과제 개요</h2><p>이 과제는 트리의 기본 구조를 익히는 데서 끝나지 않고, “트리처럼 생겼지만\n사실은 상태 공간 탐색인 문제”를 구분하는 연습까지 포함합니다.\n문제26~32를 통해 전위/중위/후위 순회, BST 삽입/탐색, 트리 응용 문제를\n다루고, 문제31·32처럼 단순 순회가 아닌 상태 설계가 필요한 고난도 문제를\n별도로 복기합니다.</p><p>재귀는 코딩 테스트에서 자주 쓰이지만, 호출 구조를 그림으로 그려 보지\n않으면 흐름이 쉽게 무너집니다. 이 과제에서는 순회 자체를 암기하기보다\n“어떤 정보가 재귀 호출로 내려가고, 어떤 값이 다시 올라오는지”를 문서로\n정리하게 구성했습니다.</p><section class=\"callout-box\"><p class=\"callout-label\">대기업 코딩 테스트 연결 포인트</p><p>대기업 코딩 테스트에서는 트리 문제가 단순 순회 형태보다, 트리 구조를\n이용한 상태 탐색이나 부모-자식 관계 모델링 형태로 더 자주 나옵니다.\n재귀를 두려워하지 않고, 트리를 그래프/상태 공간으로 확장해 보는 습관이\n중요합니다.</p></section><h2 class=\"section-heading\">학습 목표</h2><ul>\n<li><p>전위/중위/후위 순회를 직접 구현하고 방문 순서를 설명할 수 있다.</p>\n</li>\n<li><p>BST 삽입과 탐색의 불변식을 말로 설명할 수 있다.</p>\n</li>\n<li><p>문제31과 문제32가 단순 트리 순회가 아니라 상태 공간 탐색임을 설명할 수\n있다.</p>\n</li>\n<li><p>재귀 호출과 스택 기반 탐색의 장단점을 비교할 수 있다.</p>\n</li>\n</ul><h2 class=\"section-heading\">세부 수행 절차</h2><h3 class=\"step-heading\">1. 트리 순회 템플릿 작성</h3><p>전위, 중위, 후위 순회를 각각 구현하고, 같은 트리를 넣었을 때 방문 결과가\n어떻게 달라지는지 예시를 남깁니다. 단순 코드만 적지 말고 “현재 노드를\n언제 처리하는가” 기준으로 순회 차이를 설명하세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> tree_toolkit.py에 세 순회 함수를 별도 정의하고 출력\n예시를 남기기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">2. BST 삽입/탐색 구현</h3><p>문제27을 중심으로 BST의 삽입과 탐색을 구현하고, 왼쪽 서브트리 &lt; 현재\n노드 &lt; 오른쪽 서브트리 불변식이 코드에서 어떻게 유지되는지 적습니다.\n편향 트리가 될 때 성능이 나빠질 수 있다는 점도 같이 적어 두면 좋습니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 삽입 전에 비교 기준, 탐색 종료 조건을 주석으로 정리하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">3. 문제26~30 풀이 후 트리 응용 노트 작성</h3><p>문제26~30은 순회, 구조 구성, 간단한 응용이 섞여 있습니다. 각 문제에서\n트리 구조를 어떻게 만들었는지, 순회가 필요한지, 재귀가 자연스러운지를\n정리합니다. “트리”라고 적혀 있어도 구현의 중심이 무엇인지 다시 판단해\n보세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 문제마다 트리 생성 / 순회 / 계산 중 무엇이 핵심인지\n태그로 남기기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">4. 문제31·32 상태 공간 탐색 복기</h3><p>문제31 양과 늑대, 문제32 길 찾기 게임은 단순 순회로 접근하면 막히기\n쉽습니다. 어떤 노드를 갈 수 있는 후보 집합이 상태가 되는지, 좌표 정렬 후\n트리를 구성하는 과정이 왜 중요한지 문장으로 정리하고, 자력 풀이가\n막혔더라도 설계 메모를 반드시 남기세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 현재 노드보다 “현재 가능한 선택지”가 상태라는 점을 글로\n적기</p>\n</li>\n\n</ul><h2 class=\"section-heading\">GitHub 활용 가이드</h2><div class=\"table-scroll\"><table>\n<thead>\n<tr>\n<th><strong>참고 경로</strong></th>\n<th><strong>사용 시점</strong></th>\n<th><strong>활용 방식</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Algorithm_with_DataStructure/</strong></td>\n<td>순회와 DFS 기초를 다시 볼 때</td>\n<td>dfs_recursion.py, dfs_stack.py, dictionary.py, stack.py를 참고합니다.</td>\n</tr>\n<tr>\n<td><strong>solution/</strong></td>\n<td>문제26~32 설계 차이를 비교할 때</td>\n<td>26.py~32.py를 보고 내 풀이의 상태 정의가 부족한 부분을 확인합니다.</td>\n</tr>\n<tr>\n<td><strong>Coding_Test_Success_Guide.md</strong></td>\n<td>재귀/트리 관련 보충 링크를 볼 때</td>\n<td>개념이 약한 경우 추가 설명 자료로 연결해 학습 밀도를 높입니다.</td>\n</tr>\n</tbody>\n</table></div><h2 class=\"section-heading\">자주 하는 실수와 교정 포인트</h2><p><strong>1)</strong> 트리 문제를 보면 무조건 순회부터 떠올리는 습관은 위험합니다.\n순회가 아니라 트리 구성이나 상태 공간 설계가 핵심인 경우가 많습니다.</p><p><strong>2)</strong> 재귀 호출을 무작정 쓰면 종료 조건과 반환값 흐름이 불명확해집니다.\n호출 전/후에 무엇을 처리하는지 적어 두세요.</p><p><strong>3)</strong> BST 문제에서 비교 연산 기준을 일관되게 유지하지 않으면 삽입과\n탐색 결과가 어긋납니다.</p><p><strong>4)</strong> 문제31·32처럼 한 번에 풀기 어려운 문제는 “현재 위치”만이 아니라\n“가능한 선택지 집합” 또는 “구성 규칙”을 상태로 보는 관점이 중요합니다.</p></div>","w2-a07":"<div class=\"doc-prose\"><p class=\"lead\">이번 문서는 학습 범위, 핵심 목표, 참고 자료를 빠르게 확인할 수 있도록 정리한 과제 안내입니다.</p><section class=\"summary-grid\"><div class=\"summary-item\"><span class=\"summary-label\">범위</span><strong class=\"summary-value\">10장 | 문제 33~37</strong></div><div class=\"summary-item\"><span class=\"summary-label\">핵심 역량</span><strong class=\"summary-value\">유니온-파인드, 경로 압축, 사이클 판별, MST 기초</strong></div><div class=\"summary-item\"><span class=\"summary-label\">권장 시간</span><strong class=\"summary-value\">4~5시간 | 난도: 중상</strong></div></section><h2 class=\"section-heading\">과제 개요</h2><p>이 과제는 집합과 연결 관계를 효율적으로 다루는 법을 익히기 위한\n과제입니다. 문제33~37을 통해 union-find를 직접 구현하고, 단순 set으로\n충분한 문제와 유니온-파인드가 필요한 문제를 구분합니다. 특히 문제37 섬\n연결하기는 연결 + 최소 비용이라는 조건을 보고 MST 관점으로 전환하는\n연습이 핵심입니다.</p><p>실전에서는 연결 여부를 여러 번 묻는 문제나 사이클 여부를 빠르게 판단해야\n하는 문제가 자주 나옵니다. 이 과제는 find와 union을 그냥 외우는 수준을\n넘어서, 왜 경로 압축을 해야 하는지와 어떤 상황에서 그래프 탐색보다\nunion-find가 더 적합한지까지 설명할 수 있게 만드는 데 목적이 있습니다.</p><section class=\"callout-box\"><p class=\"callout-label\">대기업 코딩 테스트 연결 포인트</p><p>대기업 코딩 테스트에서 MST와 연결성 문제는 BFS/DFS로도 접근해 보다가\n시간 낭비를 하는 경우가 많습니다. “연결 여부를 반복해서 묻는가”, “간선을\n비용순으로 보며 사이클을 막는가”를 빠르게 인식하면 풀이 속도가 크게\n올라갑니다.</p></section><h2 class=\"section-heading\">학습 목표</h2><ul>\n<li><p>find와 union을 경로 압축과 함께 직접 구현할 수 있다.</p>\n</li>\n<li><p>set 기반 해결과 union-find 기반 해결의 차이를 설명할 수 있다.</p>\n</li>\n<li><p>문제37을 MST/크루스칼 관점으로 정리할 수 있다.</p>\n</li>\n<li><p>사이클 판별과 연결성 판단에서 union-find의 장점을 말할 수 있다.</p>\n</li>\n</ul><h2 class=\"section-heading\">세부 수행 절차</h2><h3 class=\"step-heading\">1. 유니온-파인드 템플릿 직접 구현</h3><p>find, union을 직접 구현하고, 가능하면 size 또는 rank를 기준으로 트리를\n합치는 방식까지 추가합니다. 코드에는 “부모 배열이 무엇을 뜻하는지”,\n“find가 끝나고 왜 부모를 바로 루트로 갱신하는지”를 주석으로 남기세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> union_find_template.py에 작은 예제 입력과 출력까지\n포함하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">2. 문제33~36 유형 비교</h3><p>문제33 유니온-파인드 구현, 문제34 폰켓몬, 문제35 영어 끝말잇기, 문제36\n전화번호 목록을 풀고 “집합 처리”가 필요한 이유를 비교합니다. 이때 모든\n집합 문제가 union-find로 가는 것은 아니라는 점을 분명히 정리해야 합니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 각 문제를 set 해결형 / prefix 탐지형 / union-find형으로\n태그하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">3. 문제37 섬 연결하기 MST 복기</h3><p>문제37을 단순 연결 문제가 아니라 최소 비용 연결 문제로 재해석합니다.\n간선을 비용순으로 정렬해 보고, 사이클이 생기지 않을 때만 선택하는 흐름을\n직접 설명한 뒤 구현합니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 간선 정렬 → union 검사 → 비용 누적 순서를 글로 적기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">4. set과 union-find 선택 기준 정리</h3><p>중복 제거, membership 검사, 단순 분류는 set으로 충분하지만, 서로 다른\n원소가 같은 그룹인지 반복적으로 물을 때는 union-find가 유리합니다. 이\n차이를 실제 문제 예시와 함께 짧은 기준표로 정리하세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 질문형 문장으로 “지금 같은 집합 여부를 자주 묻는가?”를\n체크리스트에 넣기</p>\n</li>\n\n</ul><h2 class=\"section-heading\">GitHub 활용 가이드</h2><div class=\"table-scroll\"><table>\n<thead>\n<tr>\n<th><strong>참고 경로</strong></th>\n<th><strong>사용 시점</strong></th>\n<th><strong>활용 방식</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Algorithm_with_DataStructure/</strong></td>\n<td>union_find.py 대체 개념과 set.py, queue.py를 비교할 때</td>\n<td>해당 폴더의 기초 구현을 참조해 템플릿을 정리합니다.</td>\n</tr>\n<tr>\n<td><strong>solution/</strong></td>\n<td>33.py~37.py 비교를 통해 불필요한 탐색이 있는지 점검할 때</td>\n<td>문제37은 특히 MST 관점이 살아 있는지 확인합니다.</td>\n</tr>\n<tr>\n<td><strong>mistake/</strong></td>\n<td>인덱스 범위와 정렬 습관을 점검할 때</td>\n<td>sorting_methods_comparison.py와 indexing_convention_tutorial.py를 함께 보면 좋습니다.</td>\n</tr>\n</tbody>\n</table></div><h2 class=\"section-heading\">자주 하는 실수와 교정 포인트</h2><p><strong>1)</strong> 연결 문제라고 해서 무조건 BFS/DFS부터 떠올리면 MST 문제에서\n돌아가는 길을 택하게 됩니다. 최소 비용 연결인지 먼저 확인하세요.</p><p><strong>2)</strong> find만 구현하고 경로 압축을 빼면 동작은 하지만 반복 질의에서\n비효율이 커집니다. 왜 부모를 루트로 바꾸는지 이해해야 합니다.</p><p><strong>3)</strong> set은 그룹 이름을 붙여 주지는 않습니다. 두 원소가 같은 그룹인지\n계속 묻는 구조라면 union-find가 더 적합합니다.</p><p><strong>4)</strong> 간선 정렬 후 사이클을 막는 흐름이 크루스칼의 핵심입니다. 비용이\n싼 간선부터 보되, 연결 가능 여부를 반드시 검사하세요.</p></div>","w2-a08":"<div class=\"doc-prose\"><p class=\"lead\">이번 문서는 학습 범위, 핵심 목표, 참고 자료를 빠르게 확인할 수 있도록 정리한 과제 안내입니다.</p><section class=\"summary-grid\"><div class=\"summary-item\"><span class=\"summary-label\">범위</span><strong class=\"summary-value\">11장 | 문제 38~46</strong></div><div class=\"summary-item\"><span class=\"summary-label\">핵심 역량</span><strong class=\"summary-value\">DFS/BFS, 최단경로, 가중치 그래프, 상태 확장</strong></div><div class=\"summary-item\"><span class=\"summary-label\">권장 시간</span><strong class=\"summary-value\">6~7시간 | 난도: 상</strong></div></section><h2 class=\"section-heading\">과제 개요</h2><p>그래프 과제의 핵심은 알고리즘 이름을 외우는 것이 아니라, 문제를 보고\n“정점이 무엇인지, 간선이 무엇인지, 방문 상태가 어디까지 필요한지,\n가중치가 있는지”를 즉시 판단하는 것입니다. 이 과제는 문제38~46을 통해\nDFS, BFS, 다익스트라, 벨만-포드를 직접 써 보고, 문제45처럼 상태를\n좌표보다 더 크게 잡아야 하는 경우까지 포함해 정리하도록 설계했습니다.</p><p>많은 학습자가 격자 문제를 보면 BFS부터 떠올리지만, 비용이 섞이면\n이야기가 달라집니다. 또한 같은 칸이라도 방향이나 보유 자원에 따라 다른\n상태가 되는 문제가 나오므로, 단순 방문 배열로는 부족한 사례를 반드시\n경험해야 합니다.</p><section class=\"callout-box\"><p class=\"callout-label\">대기업 코딩 테스트 연결 포인트</p><p>대기업 코딩 테스트에서 그래프는 길찾기, 네트워크, 최단거리, 상태 전이\n문제의 공통 언어입니다. 문제를 그래프로 바꿔 보는 힘이 생기면 구현\n문제처럼 보이는 문제도 훨씬 빠르게 정리할 수 있습니다.</p></section><h2 class=\"section-heading\">학습 목표</h2><ul>\n<li><p>DFS/BFS를 재귀/스택/큐 버전으로 각각 직접 구현할 수 있다.</p>\n</li>\n<li><p>가중치가 없을 때 BFS, 양수 가중치일 때 다익스트라, 음수 간선이 있을 때\n벨만-포드를 선택하는 이유를 설명할 수 있다.</p>\n</li>\n<li><p>문제45처럼 위치 외의 상태가 비용에 영향을 줄 때 상태를 확장하는 발상을\n할 수 있다.</p>\n</li>\n<li><p>인접 리스트, 방문 배열, 거리 배열의 역할을 구분할 수 있다.</p>\n</li>\n</ul><h2 class=\"section-heading\">세부 수행 절차</h2><h3 class=\"step-heading\">1. 그래프 공통 템플릿 작성</h3><p>인접 리스트 생성, DFS 재귀, DFS 스택, BFS, Dijkstra, Bellman-Ford를 한\n파일에 정리합니다. 각 템플릿에는 입력 자료구조, 초기화 방식, 종료 조건을\n짧게 주석으로 남기고, 최소 한 개의 작은 예제를 붙여 보세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> graph_toolkit.py에 템플릿별로 “언제 쓰는가” 주석 추가</p>\n</li>\n\n</ul><h3 class=\"step-heading\">2. 문제38~44 유형 분류</h3><p>문제38 DFS 순회, 문제39 BFS 순회, 문제40 다익스트라, 문제41 벨만-포드,\n문제42 게임 맵 최단 거리, 문제43 네트워크, 문제44 배달을 풀며 어떤\n조건이 알고리즘 선택을 갈랐는지 정리합니다. 특히 가중치, 최단거리, 연결\n요소, 반복 질의 여부를 중심으로 비교하세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 문제별로 “정점/간선/가중치/상태” 4칸 표 작성</p>\n</li>\n\n</ul><h3 class=\"step-heading\">3. 문제45 경주로 건설 상태 확장 메모</h3><p>문제45는 같은 좌표라도 어느 방향에서 들어왔는지에 따라 비용이\n달라집니다. 따라서 방문 상태를 (x, y)만으로 두면 틀릴 수 있습니다.\n풀이를 본 뒤라도 방향 상태를 추가해야 하는 이유를 반드시 문장으로\n남기고, D+1에 빈 파일에서 다시 구현해 보세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 상태를 (x, y, dir)로 확장한 뒤 비용 테이블을 어떻게 둘지\n먼저 설계하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">4. 문제46 전력망 분할과 연결 요소 계산</h3><p>간선을 하나 끊었을 때 연결 요소 크기가 어떻게 변하는지 계산하는 흐름을\n정리합니다. 이 문제는 그래프 모델링과 탐색 재사용 관점에서 복기하기\n좋으므로, “간선을 하나 제거한 그래프”를 반복해서 어떻게 처리했는지도\n함께 적습니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 그래프를 매번 새로 구성했는지, 방문 배열만 새로\n만들었는지 비교하기</p>\n</li>\n\n</ul><h2 class=\"section-heading\">GitHub 활용 가이드</h2><div class=\"table-scroll\"><table>\n<thead>\n<tr>\n<th><strong>참고 경로</strong></th>\n<th><strong>사용 시점</strong></th>\n<th><strong>활용 방식</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Algorithm_with_DataStructure/</strong></td>\n<td>bfs.py, dfs_recursion.py, dfs_stack.py, dijkstra.py, bellmanford.py를 볼 때</td>\n<td>기본 템플릿을 내 코드 스타일로 정리하는 용도로 활용합니다.</td>\n</tr>\n<tr>\n<td><strong>solution/</strong></td>\n<td>38.py~46.py의 상태 정의와 방문 처리 차이를 비교할 때</td>\n<td>내 코드가 불필요하게 복잡하거나 느린지 점검합니다.</td>\n</tr>\n<tr>\n<td><strong>mistake/</strong></td>\n<td>binary_search_mistake.py 외에도 indexing 관련 실수를 점검할 때</td>\n<td>그래프 좌표와 거리 배열 인덱스 실수를 줄이는 데 도움이 됩니다.</td>\n</tr>\n</tbody>\n</table></div><h2 class=\"section-heading\">자주 하는 실수와 교정 포인트</h2><p><strong>1)</strong> 격자 문제를 보면 무조건 BFS로 가는 습관은 위험합니다. 가중치가\n있거나 방향에 따라 비용이 달라지면 상태를 더 늘려야 합니다.</p><p><strong>2)</strong> 다익스트라를 쓸 때는 우선순위 큐에서 꺼낸 값이 최신 거리인지\n확인하지 않으면 불필요한 확장이 많아집니다.</p><p><strong>3)</strong> 방문 배열 하나로 모든 상태를 표현하려고 하면 문제45 같은 상태\n확장 문제에서 오답이 납니다. 비용에 영향을 주는 요소를 상태에\n포함하세요.</p><p><strong>4)</strong> 인접 리스트와 거리 배열 초기화를 대충 하면 디버깅이 어려워집니다.\n그래프 문제일수록 자료구조 초기화를 문서로 먼저 정리하는 편이 좋습니다.</p></div>","w2-a09":"<div class=\"doc-prose\"><p class=\"lead\">이번 문서는 학습 범위, 핵심 목표, 참고 자료를 빠르게 확인할 수 있도록 정리한 과제 안내입니다.</p><section class=\"summary-grid\"><div class=\"summary-item\"><span class=\"summary-label\">범위</span><strong class=\"summary-value\">저장소 보충 모듈 | 힙/이분탐색 추가 학습</strong></div><div class=\"summary-item\"><span class=\"summary-label\">핵심 역량</span><strong class=\"summary-value\">heapq, 우선순위 큐, binary search, lower/upper bound, parametric search</strong></div><div class=\"summary-item\"><span class=\"summary-label\">권장 시간</span><strong class=\"summary-value\">3~4시간 | 난도: 중</strong></div></section><h2 class=\"section-heading\">과제 개요</h2><p>책의 본문 장 구성만으로는 힙과 이분탐색을 독립적으로 충분히 다루기\n어렵기 때문에, 이 과제는 GitHub 저장소의 보충 모듈을 기반으로 별도\n템플릿을 만드는 역할을 합니다. 실전에서는 정렬로 처리할 수 있어 보이는\n문제를 힙으로 더 효율적으로 풀거나, 탐색 문제처럼 보이는 문제를\n이분탐색/파라메트릭 서치로 바꾸는 일이 자주 발생합니다.</p><p>따라서 이 과제의 목표는 “힙과 이분탐색 문제를 많이 푼다”가 아니라, 그\n둘의 선택 기준을 명확히 정리하는 데 있습니다. 정렬 한 번으로 끝나는지,\n가장 작은/큰 값을 반복해서 꺼내야 하는지, 정답의 범위에 단조성이 있는지\n등을 질문형으로 정리해 두세요.</p><section class=\"callout-box\"><p class=\"callout-label\">대기업 코딩 테스트 연결 포인트</p><p>대기업 코딩 테스트에서는 힙과 이분탐색이 단독 장으로 나오지 않아도,\n다른 유형 안에 자연스럽게 숨어 있습니다. 우선순위가 바뀌는 작업 처리,\n최소/최대 후보 반복 선택, 조건을 만족하는 최솟값 찾기 같은 문제가\n대표적입니다.</p></section><h2 class=\"section-heading\">학습 목표</h2><ul>\n<li><p>heapq를 이용해 최소 힙과 최대 힙 래퍼를 구현할 수 있다.</p>\n</li>\n<li><p>반복형/재귀형 이분탐색과 lower_bound/upper_bound를 직접 작성할 수\n있다.</p>\n</li>\n<li><p>정답을 직접 찾는 탐색과 조건의 경계를 찾는 탐색을 구분할 수 있다.</p>\n</li>\n<li><p>힙과 정렬, 선형 탐색과 이분탐색의 선택 기준을 말할 수 있다.</p>\n</li>\n</ul><h2 class=\"section-heading\">세부 수행 절차</h2><h3 class=\"step-heading\">1. 힙 래퍼와 사용 사례 정리</h3><p>heapq로 최소 힙 push/pop, 음수 부호를 이용한 최대 힙 흉내내기를 직접\n구현합니다. 이후 “정렬 한 번으로 충분한지”, “매 단계 가장 작은 값이\n필요해 계속 후보가 바뀌는지”를 기준으로 힙이 필요한 문제를 정리합니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> heap_usage_cases.md에 정렬과 힙 선택 기준을 문제 예시와\n함께 적기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">2. 기본 이분탐색 템플릿 구현</h3><p>반복형 binary search, 재귀형 binary search, lower_bound, upper_bound를\n직접 구현합니다. 각 함수는 종료 조건과 반환 의미가 다르므로, 무엇을\n반환하는 함수인지 주석을 꼭 남기세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 찾는 값이 없을 때 반환할 값과 경계 함수의 의미를 명확히\n적기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">3. 파라메트릭 서치 체크리스트 작성</h3><p>정답 자체를 찾는 것이 아니라, “조건을 만족하는 최소/최대 값”을 찾는\n경우를 따로 정리합니다. 이때 가장 중요한 것은 조건 판별 함수가 단조성을\n가지는지 여부입니다. 파라메트릭 서치를 언제 의심해야 하는지 질문\n리스트로 만들어 보세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 문제 설명을 읽고 “값이 커질수록 조건이 더 쉽게/어렵게\n성립하는가?”를 묻는 체크리스트 만들기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">4. 실수 노트와 성능 비교 메모</h3><p>mistake 폴더의 binary_search_mistake.py를 읽고 mid 계산, 종료 조건,\nanswer 갱신 시점, 정렬 여부 확인 같은 실수를 정리합니다. 또한\nperformance 폴더의 list_vs_heapq.py를 보고 힙 선택 이유를 성능 관점에서\n정리합니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 틀리기 쉬운 코드 조각을 직접 적고, 왜 잘못됐는지 설명하기</p>\n</li>\n\n</ul><h2 class=\"section-heading\">GitHub 활용 가이드</h2><div class=\"table-scroll\"><table>\n<thead>\n<tr>\n<th><strong>참고 경로</strong></th>\n<th><strong>사용 시점</strong></th>\n<th><strong>활용 방식</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Algorithm_with_DataStructure/</strong></td>\n<td>binary_search.py, priority_queue.py, heapq.py를 참고할 때</td>\n<td>기초 구현을 본 뒤 내 템플릿으로 다듬는 용도로 사용합니다.</td>\n</tr>\n<tr>\n<td><strong>mistake/</strong></td>\n<td>이분탐색 실수 패턴을 점검할 때</td>\n<td>binary_search_mistake.py를 가장 우선으로 참고합니다.</td>\n</tr>\n<tr>\n<td><strong>performance/</strong></td>\n<td>힙 선택 이유를 성능 관점에서 볼 때</td>\n<td>list_vs_heapq.py를 보면 반복 선택 문제에서 힙이 왜 유리한지 감각을 잡기 좋습니다.</td>\n</tr>\n</tbody>\n</table></div><h2 class=\"section-heading\">자주 하는 실수와 교정 포인트</h2><p><strong>1)</strong> 정렬만 하면 된다는 이유로 힙이 필요한 문제를 놓치면, 가장 작은\n값을 반복해서 꺼내는 과정에서 비효율이 커집니다.</p><p><strong>2)</strong> 이분탐색은 정렬된 배열에서 값을 찾는 용도로만 생각하면 활용\n범위가 좁아집니다. 단조 조건을 만족하는 경계를 찾는 도구로도 익혀야\n합니다.</p><p><strong>3)</strong> lower_bound와 upper_bound는 이름만 비슷하고 반환 의미가 다릅니다.\n찾지 못한 경우 어떤 인덱스를 돌려주는지 꼭 써 두세요.</p><p><strong>4)</strong> 파라메트릭 서치는 조건 함수 설계가 핵심입니다. 조건이 단조적이지\n않다면 이분탐색을 적용할 수 없습니다.</p></div>","w3-a10":"<div class=\"doc-prose\"><p class=\"lead\">이번 문서는 학습 범위, 핵심 목표, 참고 자료를 빠르게 확인할 수 있도록 정리한 과제 안내입니다.</p><section class=\"summary-grid\"><div class=\"summary-item\"><span class=\"summary-label\">범위</span><strong class=\"summary-value\">12장 | 문제 47~53</strong></div><div class=\"summary-item\"><span class=\"summary-label\">핵심 역량</span><strong class=\"summary-value\">백트래킹, 상태 정의, 가지치기, 조합/순열 생성</strong></div><div class=\"summary-item\"><span class=\"summary-label\">권장 시간</span><strong class=\"summary-value\">6~7시간 | 난도: 상</strong></div></section><h2 class=\"section-heading\">과제 개요</h2><p>백트래킹 과제는 “모든 경우를 탐색한다”는 말 뒤에 숨어 있는 설계 요소를\n끄집어내는 데 목적이 있습니다. 이 과제에서는 문제47~53을 풀며 각 문제를\n상태, 선택지, 종료 조건, 가지치기 조건 네 가지 칸으로 정리하고,\n라이브러리 없이 조합과 순열을 생성하는 함수를 직접 구현합니다.</p><p>특히 문제52 외벽 점검과 문제53 사라지는 발판처럼 경우의 수가 폭발하기\n쉬운 문제는 맞혔는지 여부보다도 구조를 단순화하고 가지치기 기준을 세우는\n능력이 핵심입니다. 고난도 문제를 억지로 끝까지 밀어붙이기보다, 어디서\n탐색 공간을 줄여야 하는지를 문서로 남기도록 설계했습니다.</p><section class=\"callout-box\"><p class=\"callout-label\">대기업 코딩 테스트 연결 포인트</p><p>대기업 코딩 테스트에서 백트래킹은 N-Queen류의 전형 문제뿐 아니라,\n제약이 많은 조합 탐색·배치 문제로 자주 변형됩니다. 상태와 가지치기를\n먼저 떠올릴 수 있으면 완전탐색 문제에서 시간 낭비를 크게 줄일 수\n있습니다.</p></section><h2 class=\"section-heading\">학습 목표</h2><ul>\n<li><p>각 문제의 상태, 선택지, 종료 조건, 가지치기 조건을 구분해 적을 수\n있다.</p>\n</li>\n<li><p>조합/순열 생성 함수를 라이브러리 없이 직접 구현할 수 있다.</p>\n</li>\n<li><p>문제52·53 같은 고난도 탐색 문제에서 구조 단순화 포인트를 문서로 남길\n수 있다.</p>\n</li>\n<li><p>백트래킹과 단순 브루트포스의 차이를 설명할 수 있다.</p>\n</li>\n</ul><h2 class=\"section-heading\">세부 수행 절차</h2><h3 class=\"step-heading\">1. 문제47~53 1차 풀이와 네 칸 정리</h3><p>각 문제를 푼 뒤 상태(state), 선택지(choice), 종료 조건(termination),\n가지치기(pruning) 네 칸으로 다시 정리합니다. 정답을 못 맞힌 문제라도 네\n칸은 반드시 채워야 합니다. 이 표가 백트래킹 감각을 키우는 핵심\n산출물입니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 문제마다 탐색 트리를 손으로 한 번 그려 보고, 어디를 자를\n수 있는지 표시하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">2. 조합/순열 직접 구현</h3><p>reference 폴더의 combination_direct.py, permutation_direct.py를 참고해\n라이브러리 없이 조합과 순열을 생성하는 함수를 작성합니다. 이 과정에서\n방문 배열 방식과 start index 방식의 차이를 분명히 정리해야 합니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> comb_perm_manual.py에 조합/순열 두 버전을 각각 구현하고\n간단한 테스트를 추가하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">3. 문제50 N-Queen 가지치기 정리</h3><p>체스판 전체를 매번 검사하는 대신 열, 대각선, 역대각선 사용 여부를 관리해\n가지치기하는 구조를 정리합니다. 백트래킹에서 자료구조 선택이 검사 비용을\n얼마나 줄여 주는지 체감하는 대표 문제로 복기하세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 어떤 배열/집합이 가지치기 비용을 줄였는지 표로 정리하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">4. 문제52·53 고난도 재도전 계획</h3><p>원형 구조를 선형화하는 방식, 게임 상태를 함수 인자로 넘기는 방식, 이미\n최적보다 나쁜 경우를 잘라내는 기준 등을 정리합니다. 이 두 문제는 D+1,\nD+7 재풀이 계획을 별도로 세워 두고, 자력 완주가 안 되더라도 상태 설계를\n계속 복기합니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> hard_case_retry_plan.md에 막힌 지점과 다음 번에 먼저 볼\n힌트 포인트 정리</p>\n</li>\n\n</ul><h2 class=\"section-heading\">GitHub 활용 가이드</h2><div class=\"table-scroll\"><table>\n<thead>\n<tr>\n<th><strong>참고 경로</strong></th>\n<th><strong>사용 시점</strong></th>\n<th><strong>활용 방식</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>reference/</strong></td>\n<td>combination_direct.py, permutation_direct.py를 다시 볼 때</td>\n<td>조합/순열 생성 방식을 내 코드 스타일로 정리합니다.</td>\n</tr>\n<tr>\n<td><strong>solution/</strong></td>\n<td>47.py~53.py를 비교하며 가지치기 포인트를 확인할 때</td>\n<td>문제52·53은 코드보다 상태 정의와 단순화 아이디어를 우선 봅니다.</td>\n</tr>\n<tr>\n<td><strong>mistake/</strong></td>\n<td>range와 인덱스 실수, 연산 우선순위를 점검할 때</td>\n<td>range_function_usage.py, operation_precedence_examples.py를 참고하면 재귀 디버깅에 도움 됩니다.</td>\n</tr>\n</tbody>\n</table></div><h2 class=\"section-heading\">자주 하는 실수와 교정 포인트</h2><p><strong>1)</strong> 백트래킹 문제를 단순 브루트포스로만 보면 경우의 수 폭발을 막지\n못합니다. 어디서 탐색을 잘라야 하는지 먼저 찾으세요.</p><p><strong>2)</strong> 재귀 호출에서 상태를 되돌리는 부분을 놓치면 이전 분기의 흔적이\n남습니다. 방문 배열과 현재 선택 목록을 언제 복구하는지 명확히 해야\n합니다.</p><p><strong>3)</strong> 문제52·53 같은 고난도 문제는 처음부터 완주를 기대하기보다, 문제를\n선형화/상태화하는 데 집중해야 합니다.</p><p><strong>4)</strong> 조합과 순열 생성 함수를 직접 써 보지 않으면 라이브러리 의존도가\n높아집니다. 실전에서는 직접 구현이 필요한 경우도 있으니 한 번은 꼭\n손으로 써 보세요.</p></div>","w3-a11":"<div class=\"doc-prose\"><p class=\"lead\">이번 문서는 학습 범위, 핵심 목표, 참고 자료를 빠르게 확인할 수 있도록 정리한 과제 안내입니다.</p><section class=\"summary-grid\"><div class=\"summary-item\"><span class=\"summary-label\">범위</span><strong class=\"summary-value\">13장 | 문제 54~61</strong></div><div class=\"summary-item\"><span class=\"summary-label\">핵심 역량</span><strong class=\"summary-value\">정렬, 커스텀 key, 계수정렬, 정렬+그래프 전환</strong></div><div class=\"summary-item\"><span class=\"summary-label\">권장 시간</span><strong class=\"summary-value\">5~6시간 | 난도: 중상</strong></div></section><h2 class=\"section-heading\">과제 개요</h2><p>정렬 문제를 풀 때 중요한 것은 어떤 정렬 알고리즘을 외우는가보다, 정렬을\n왜 먼저 하려는지와 정렬 이후 어떤 처리가 쉬워지는지를 설명하는\n능력입니다. 이 과제에서는 문제54~61을 풀며 계수정렬, 병합, 다중 기준\n정렬, 숫자를 문자열로 바꿔 비교하는 방식, 정렬 후 그래프/MST 관점으로\n넘어가는 사례까지 정리합니다.</p><p>문제59 가장 큰 수와 문제61 지형 이동은 특히 복기 가치가 큽니다. 전자는\n비교 기준을 잘못 잡으면 반례에 바로 무너지고, 후자는 정렬 문제처럼\n보이지만 실제로는 그래프 연결 비용을 생각해야 하는 구간이 있기\n때문입니다. 정렬을 전처리 도구로 보는 눈을 키우는 데 집중하세요.</p><section class=\"callout-box\"><p class=\"callout-label\">대기업 코딩 테스트 연결 포인트</p><p>대기업 코딩 테스트에서는 정렬이 단독 문제보다도 그리디, 해시, 그래프,\n슬라이딩 윈도우의 전처리로 훨씬 자주 쓰입니다. 정렬 이후 무엇이\n단순해지는지 말로 설명할 수 있으면 문제 유형 전환이 빨라집니다.</p></section><h2 class=\"section-heading\">학습 목표</h2><ul>\n<li><p>계수정렬이 가능한 조건과 일반 정렬이 더 나은 조건을 구분할 수 있다.</p>\n</li>\n<li><p>커스텀 정렬 key 또는 비교 기준 설계를 설명할 수 있다.</p>\n</li>\n<li><p>문제59에서 숫자 크기 정렬이 왜 틀리는지 반례로 설명할 수 있다.</p>\n</li>\n<li><p>문제61처럼 정렬 이후 다른 알고리즘 관점으로 전환하는 사례를 복기할 수\n있다.</p>\n</li>\n</ul><h2 class=\"section-heading\">세부 수행 절차</h2><h3 class=\"step-heading\">1. 기초 정렬 문제 풀이와 알고리즘 비교</h3><p>문제54~58을 풀고 계수정렬, 두 배열 merge, 정렬 후 K번째 원소 선택 등\n기본 패턴을 정리합니다. 단순히 파이썬 sort를 쓰는 데서 끝내지 말고, 왜\n계수정렬이 가능한 범위인지, merge가 왜 선형으로 되는지 설명하세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> sorting_patterns.md에 정렬 방식별 사용 조건을 적기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">2. 문제59 가장 큰 수 커스텀 정렬 복기</h3><p>숫자 내림차순으로 정렬하면 왜 반례가 생기는지 적고, 문자열 결합 비교\n또는 동등한 기준을 통해 정렬해야 하는 이유를 정리합니다. 비교 기준\n설계가 핵심이므로, 코드보다 반례 설명을 우선하세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 30과 3, 34와 343 같은 반례를 직접 써 보기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">3. 문제60·61의 전처리와 후속 처리 분리</h3><p>문제60 튜플처럼 정렬이 해석을 돕는 경우와, 문제61 지형 이동처럼 정렬\n이후 그래프/MST 관점이 필요한 경우를 구분합니다. 정렬이 목적이 아니라\n이후 판단을 쉽게 만드는 수단이라는 점을 강조해 적으세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 문제61은 어떤 시점에 그래프/MST 시각으로 전환했는지 메모\n남기기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">4. 정렬 템플릿과 요약표 작성</h3><p>계수정렬, merge, key 정렬 예제를 하나의 toolkit 파일로 정리하고, 짧은\n사용 예시를 붙입니다. 코테에서 자주 쓰는 `sorted(..., key=...)`,\n`sort(reverse=True)`를 문법 수준이 아니라 “언제 이런 기준을 걸어야\n하는가”까지 적어 두는 편이 좋습니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> sorting_toolkit.py에 커스텀 key 예제를 최소 두 개\n추가하기</p>\n</li>\n\n</ul><h2 class=\"section-heading\">GitHub 활용 가이드</h2><div class=\"table-scroll\"><table>\n<thead>\n<tr>\n<th><strong>참고 경로</strong></th>\n<th><strong>사용 시점</strong></th>\n<th><strong>활용 방식</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>reference/</strong></td>\n<td>countsort.py, mergesort_recursive.py, lambda.py를 참고할 때</td>\n<td>정렬 구현과 커스텀 key 문법을 함께 점검합니다.</td>\n</tr>\n<tr>\n<td><strong>solution/</strong></td>\n<td>54.py~61.py로 정렬 이후 로직 구조를 비교할 때</td>\n<td>내 코드가 정렬 이후 불필요하게 복잡해졌는지 확인합니다.</td>\n</tr>\n<tr>\n<td><strong>mistake/</strong></td>\n<td>sorting_methods_comparison.py를 볼 때</td>\n<td>기본 정렬 메서드 차이와 커스텀 정렬 실수를 줄이는 데 도움 됩니다.</td>\n</tr>\n</tbody>\n</table></div><h2 class=\"section-heading\">자주 하는 실수와 교정 포인트</h2><p><strong>1)</strong> 정렬을 “일단 해 두면 편할 것 같아서” 쓰면 의미가 약합니다. 정렬\n후 어떤 비교나 탐색이 쉬워지는지 분명히 적으세요.</p><p><strong>2)</strong> 문제59는 숫자 크기 정렬이 아니라 결합 결과 비교가 핵심입니다.\n반례를 직접 써 보면 왜 그런지 더 빨리 이해됩니다.</p><p><strong>3)</strong> 계수정렬은 값의 범위가 좁고 정수일 때만 유리합니다. 무턱대고\n적용하면 메모리와 구현이 비효율적일 수 있습니다.</p><p><strong>4)</strong> 문제61처럼 정렬 후 다른 알고리즘 관점으로 넘어가는 문제를 놓치면,\n정렬만으로 다 풀려는 잘못된 접근에 갇히게 됩니다.</p></div>","w3-a12":"<div class=\"doc-prose\"><p class=\"lead\">이번 문서는 학습 범위, 핵심 목표, 참고 자료를 빠르게 확인할 수 있도록 정리한 과제 안내입니다.</p><section class=\"summary-grid\"><div class=\"summary-item\"><span class=\"summary-label\">범위</span><strong class=\"summary-value\">14장 | 문제 62~69</strong></div><div class=\"summary-item\"><span class=\"summary-label\">핵심 역량</span><strong class=\"summary-value\">상태 전이, 좌표 구현, 반복 변환, 디버깅 체크포인트</strong></div><div class=\"summary-item\"><span class=\"summary-label\">권장 시간</span><strong class=\"summary-value\">5~6시간 | 난도: 중상</strong></div></section><h2 class=\"section-heading\">과제 개요</h2><p>시뮬레이션 문제는 “구현만 하면 된다”는 말 때문에 가장 과소평가되기 쉬운\n영역입니다. 그러나 실제로는 상태를 어떻게 정의하고, 어떤 순서로\n갱신하며, 어디에서 중간 검증을 할지를 정하지 않으면 디버깅 시간이 크게\n늘어납니다. 이 과제는 문제62~69를 통해 상태 전이도, 경계 조건, 종료\n조건을 먼저 적고 구현하는 습관을 만드는 데 목표를 둡니다.</p><p>특히 좌표 이동, 배열 회전, 반복 변환, 분기 처리 문제는 코드가 길어질수록\n작은 실수가 숨어들기 쉽습니다. 그래서 이 과제는 코드보다 상태 도식과\n중간 출력 포인트 설계에 더 많은 시간을 쓰도록 구성했습니다. 문제66처럼\n해시/카운팅 관점으로 다시 볼 수 있는 문제도 같이 정리해야 합니다.</p><section class=\"callout-box\"><p class=\"callout-label\">대기업 코딩 테스트 연결 포인트</p><p>대기업 코딩 테스트에서는 구현 문제가 자주 앞쪽 문제로 등장하지만,\n여기서 시간을 과하게 쓰면 뒤의 알고리즘 문제를 풀 기회가 줄어듭니다.\n상태 전이를 먼저 글로 정리하는 습관은 구현 속도와 정확도를 동시에 높여\n줍니다.</p></section><h2 class=\"section-heading\">학습 목표</h2><ul>\n<li><p>문제를 코드 전에 상태, 다음 상태, 종료 조건으로 분해할 수 있다.</p>\n</li>\n<li><p>좌표/배열/문자열 기반 시뮬레이션에서 경계 조건을 빠르게 찾을 수 있다.</p>\n</li>\n<li><p>중간 출력 포인트를 설계해 디버깅 시간을 줄일 수 있다.</p>\n</li>\n<li><p>겉보기 구현 문제를 해시나 수학 문제로 재해석하는 경험을 쌓을 수 있다.</p>\n</li>\n</ul><h2 class=\"section-heading\">세부 수행 절차</h2><h3 class=\"step-heading\">1. 문제62~69 상태 전이도 작성</h3><p>각 문제를 풀기 전에 현재 상태, 다음 상태, 경계 조건, 종료 조건, 중간\n검증 포인트를 표나 도식으로 적습니다. 코드를 먼저 쓰지 말고, 한 단계가\n끝날 때 어떤 값들이 바뀌는지를 언어로 설명해 보세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> simulation_state_diagram.md에 최소 8개 문제의 상태 표를\n작성하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">2. 좌표·회전·변환 문제 구현</h3><p>문제62 배열 회전, 문제63 행렬 곱 후 전치, 문제64 달팽이 수열, 문제69\n캐릭터의 좌표처럼 인덱스와 방향이 중요한 문제를 우선 풉니다. 이때 인덱스\n기준(0-based/1-based), 방향 전환 조건, 범위 체크를 반드시 코드 앞부분에\n주석으로 적어 두세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 오프바이원 실수가 날 가능성이 있는 줄을 미리 표시하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">3. 문제65~68 반복 변환과 관점 전환</h3><p>문제65 이진 변환, 문제66 롤케이크 자르기, 문제67 카펫, 문제68 점프와\n순간 이동은 구현처럼 보여도 카운팅, 약수 탐색, 수학적 관찰이 같이\n필요합니다. 특히 문제66은 해시/카운팅 문제로 다시 설명해 보세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 문제66을 해시 관점으로, 문제67을 약수 탐색 관점으로 각각\n한 번 더 요약하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">4. 디버깅 체크포인트 설계</h3><p>시뮬레이션 문제는 중간 상태를 출력해 보는 습관이 중요합니다. 언제 어떤\n값을 찍어 보면 오류를 빨리 발견할 수 있는지, 어디에서 assert처럼 생각해\n볼 수 있는지를 정리합니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> debug_checkpoint_note.md에 문제별 중간 확인 지점을 적기</p>\n</li>\n\n</ul><h2 class=\"section-heading\">GitHub 활용 가이드</h2><div class=\"table-scroll\"><table>\n<thead>\n<tr>\n<th><strong>참고 경로</strong></th>\n<th><strong>사용 시점</strong></th>\n<th><strong>활용 방식</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>solution/</strong></td>\n<td>62.py~69.py를 비교하며 상태 갱신 순서를 확인할 때</td>\n<td>내 구현과 해설 구현의 상태 순서 차이를 중심으로 봅니다.</td>\n</tr>\n<tr>\n<td><strong>mistake/</strong></td>\n<td>indexing, range, operation precedence 실수를 점검할 때</td>\n<td>indexing_convention_tutorial.py, range_function_usage.py, operation_precedence_examples.py가 특히 유용합니다.</td>\n</tr>\n<tr>\n<td><strong>performance/</strong></td>\n<td>문자열 결합이나 반복 생성 비용이 걱정될 때</td>\n<td>string_concatenation_performance.py를 참고해 구현 방식을 조정합니다.</td>\n</tr>\n</tbody>\n</table></div><h2 class=\"section-heading\">자주 하는 실수와 교정 포인트</h2><p><strong>1)</strong> 시뮬레이션 문제를 읽고 바로 코드를 치면 디버깅에 시간을 많이\n씁니다. 상태 전이를 먼저 표로 적는 습관이 중요합니다.</p><p><strong>2)</strong> 좌표 이동 문제는 방향 전환과 범위 체크 순서를 잘못 두면 오답이\n자주 납니다. 어떤 순서로 검사할지 먼저 정해야 합니다.</p><p><strong>3)</strong> 문제66처럼 구현처럼 보이는 문제를 해시/카운팅 관점으로 다시 보지\n않으면 풀이가 필요 이상으로 길어질 수 있습니다.</p><p><strong>4)</strong> 중간 상태 출력은 많을수록 좋은 것이 아니라, 오류를 빨리 좁혀 주는\n지점에만 두는 것이 중요합니다.</p></div>","w3-a13":"<div class=\"doc-prose\"><p class=\"lead\">이번 문서는 학습 범위, 핵심 목표, 참고 자료를 빠르게 확인할 수 있도록 정리한 과제 안내입니다.</p><section class=\"summary-grid\"><div class=\"summary-item\"><span class=\"summary-label\">범위</span><strong class=\"summary-value\">15장 전반 | 문제 70~76</strong></div><div class=\"summary-item\"><span class=\"summary-label\">핵심 역량</span><strong class=\"summary-value\">DP 상태 정의, 점화식, 초기값, 순회 순서</strong></div><div class=\"summary-item\"><span class=\"summary-label\">권장 시간</span><strong class=\"summary-value\">5~6시간 | 난도: 중상</strong></div></section><h2 class=\"section-heading\">과제 개요</h2><p>동적 계획법은 “코드 템플릿”보다 “무엇을 기억할 것인가”가 훨씬\n중요합니다. 이 과제는 문제70~76을 통해 상태(state), 점화식(recurrence),\n초기값(base case), 순회 순서(iteration order) 네 칸으로 문제를 정리하는\n습관을 만드는 데 초점을 둡니다. 특히 LCS, LIS, 정수 삼각형 같은 전형\n문제를 직접 템플릿화해 두면 이후 DP 심화 문제 진입이 쉬워집니다.</p><p>많은 학습자가 DP를 배울 때 바로 코드를 쓰려다 점화식을 놓치곤 합니다.\n이번 과제에서는 말을 먼저 하고 코드를 쓰는 방식으로 흐름을 바꿉니다.\n문제75와 76처럼 직관적으로는 구현처럼 보여도 “여기까지 왔을 때의 최선”을\n저장하는 발상이 필요한 문제를 반드시 말로 설명해 보세요.</p><section class=\"callout-box\"><p class=\"callout-label\">대기업 코딩 테스트 연결 포인트</p><p>대기업 코딩 테스트에서 DP는 고난도 전용이 아니라, 중간 난도\n문제에서도 자주 숨어 있습니다. 상태 정의가 머리에 남아 있으면 비슷한\n문제를 만났을 때 방향을 훨씬 빨리 잡을 수 있습니다.</p></section><h2 class=\"section-heading\">학습 목표</h2><ul>\n<li><p>문제별로 상태, 점화식, 초기값, 순회 순서를 네 칸 표로 정리할 수 있다.</p>\n</li>\n<li><p>LCS, LIS, 피보나치, 정수 삼각형, 땅따먹기 같은 대표 문제를 템플릿으로\n재현할 수 있다.</p>\n</li>\n<li><p>코드보다 먼저 점화식을 말로 설명할 수 있다.</p>\n</li>\n<li><p>재귀+메모이제이션과 바텀업 순회의 차이를 이해할 수 있다.</p>\n</li>\n</ul><h2 class=\"section-heading\">세부 수행 절차</h2><h3 class=\"step-heading\">1. 문제70~76 1차 풀이와 네 칸 표 작성</h3><p>각 문제를 풀고 state, recurrence, base case, iteration order를 같은\n형식으로 정리합니다. 상태 정의가 모호하면 점화식이 흔들리므로,\n“dp[i]가 정확히 무엇을 뜻하는가”를 문장으로 먼저 적는 것이 핵심입니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> dp_recurrence_notebook.md에 문제별 네 칸 표를 통일된\n형식으로 작성하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">2. 대표 DP 템플릿 재작성</h3><p>LCS_DP.py, LIS_DP.py, 피보나치 메모이제이션 예제를 참고해 내 스타일로\n다시 작성합니다. 특히 2차원 DP 테이블과 1차원 DP 배열의 차이를 설명하고,\n어떤 문제에서 테이블이 필요한지도 정리합니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> dp_toolkit.py에 LCS, LIS, fibonacci, triangle, land 게임\n템플릿 추가</p>\n</li>\n\n</ul><h3 class=\"step-heading\">3. 문제75·76 구두 설명 후 구현</h3><p>정수 삼각형과 땅따먹기는 코드를 바로 쓰기보다 “현재 칸까지 왔을 때\n가능한 최선”이 무엇인지 먼저 설명한 뒤 구현합니다. 구두 설명이\n자연스러워지면 DP가 훨씬 덜 추상적으로 느껴집니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> oral_explanation_note.md에 75, 76의 말 설명 버전 기록</p>\n</li>\n\n</ul><h3 class=\"step-heading\">4. 재귀/반복 접근 비교</h3><p>같은 문제를 재귀+메모이제이션과 바텀업으로 각각 생각해 보고, 어떤 방식이\n더 구현하기 쉬웠는지 적습니다. 실전에서는 반복형이 더 안전한 경우가\n많지만, 상태를 떠올릴 때는 재귀적 사고가 더 도움이 되는 경우도 있습니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 두 접근의 장단점을 한 표로 정리하기</p>\n</li>\n\n</ul><h2 class=\"section-heading\">GitHub 활용 가이드</h2><div class=\"table-scroll\"><table>\n<thead>\n<tr>\n<th><strong>참고 경로</strong></th>\n<th><strong>사용 시점</strong></th>\n<th><strong>활용 방식</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Algorithm_with_DataStructure/</strong></td>\n<td>LCS_DP.py, LIS_DP.py, fibonacci_recursion_memoization.py를 볼 때</td>\n<td>점화식 형태를 확인한 뒤 내 언어로 다시 적어 봅니다.</td>\n</tr>\n<tr>\n<td><strong>solution/</strong></td>\n<td>70.py~76.py를 비교하며 순회 순서를 점검할 때</td>\n<td>내 풀이와 해설의 초기값 설정 차이를 특히 확인합니다.</td>\n</tr>\n<tr>\n<td><strong>Coding_Test_Success_Guide.md</strong></td>\n<td>DP 장 요약을 빠르게 복습할 때</td>\n<td>문제 풀이 전후 짧은 정리용으로 활용하기 좋습니다.</td>\n</tr>\n</tbody>\n</table></div><h2 class=\"section-heading\">자주 하는 실수와 교정 포인트</h2><p><strong>1)</strong> dp[i]가 무엇을 의미하는지 모호한 상태에서 점화식을 세우면\n코드가 금방 흔들립니다. 상태 문장을 먼저 정확히 써 보세요.</p><p><strong>2)</strong> 초기값을 소홀히 하면 점화식이 맞아도 구현이 틀립니다. base case는\n별도로 강조해 적어야 합니다.</p><p><strong>3)</strong> 2차원 문제를 억지로 1차원으로 줄이려다 가독성이 떨어질 수\n있습니다. 이해가 더 잘 되는 표현을 우선하세요.</p><p><strong>4)</strong> 대표 DP 문제는 외우기보다 템플릿을 스스로 다시 만들어 보는 것이\n더 오래 남습니다.</p></div>","w4-a14":"<div class=\"doc-prose\"><p class=\"lead\">이번 문서는 학습 범위, 핵심 목표, 참고 자료를 빠르게 확인할 수 있도록 정리한 과제 안내입니다.</p><section class=\"summary-grid\"><div class=\"summary-item\"><span class=\"summary-label\">범위</span><strong class=\"summary-value\">15장 후반~16장 | 문제 77~85</strong></div><div class=\"summary-item\"><span class=\"summary-label\">핵심 역량</span><strong class=\"summary-value\">원형 DP, 문자열 DP, 그리디 정당화, 배낭/MST 관점</strong></div><div class=\"summary-item\"><span class=\"summary-label\">권장 시간</span><strong class=\"summary-value\">5~6시간 | 난도: 상</strong></div></section><h2 class=\"section-heading\">과제 개요</h2><p>이 과제는 3주차에서 만든 DP 기본기를 심화 문제와 그리디 판단 문제로\n확장하는 단계입니다. 문제77~79에서는 원형 배열, 가장 큰 정사각형, 단어\n퍼즐처럼 상태 정의가 한 번 더 어려워지는 DP를 다루고, 문제80~85에서는\n그리디가 왜 성립하는지 한 문장으로 정당화하는 연습을 합니다.</p><p>그리디는 코드를 짧게 쓰는 기술이 아니라, 현재의 선택이 미래 최적해를\n해치지 않는다는 근거를 찾는 과정입니다. 이 과제에서는 “왜 지금 선택이\n안전한가”를 문장으로 적지 못하면 풀이가 완성되지 않은 것으로 간주합니다.\nDP와 그리디를 구분하는 안목을 키우는 것이 핵심입니다.</p><section class=\"callout-box\"><p class=\"callout-label\">대기업 코딩 테스트 연결 포인트</p><p>대기업 코딩 테스트에서 중상급 문제는 DP와 그리디가 자주 섞여\n나옵니다. 원형 DP, 구간 선택, 예산/용량 문제를 풀 때 어떤 문제는 케이스\n분리 DP가 필요하고, 어떤 문제는 정렬 후 그리디로 충분하다는 판단을 빨리\n내려야 합니다.</p></section><h2 class=\"section-heading\">학습 목표</h2><ul>\n<li><p>문제77~79의 상태와 점화식을 스스로 정리할 수 있다.</p>\n</li>\n<li><p>그리디 문제에서 현재 선택이 안전한 이유를 한 문장으로 적을 수 있다.</p>\n</li>\n<li><p>DP와 그리디의 선택 기준을 반례 관점에서 설명할 수 있다.</p>\n</li>\n<li><p>MST와 배낭 문제처럼 그리디가 통하는 경우와 그렇지 않은 경우를 비교할\n수 있다.</p>\n</li>\n</ul><h2 class=\"section-heading\">세부 수행 절차</h2><h3 class=\"step-heading\">1. 문제77~79 DP 심화 노트 작성</h3><p>문제77 도둑질은 원형 구조 때문에 첫 집을 선택한 경우와 선택하지 않은\n경우를 나눠야 합니다. 문제78과 문제79도 각각 상태 정의가 중요하므로,\n상태/점화식/초기값/케이스 분리 방식을 별도 노트에 정리하세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> dp_advanced_note.md에 케이스 분리 이유와 점화식 요약 작성</p>\n</li>\n\n</ul><h3 class=\"step-heading\">2. 그리디 문제 1차 풀이와 정당화 문장 작성</h3><p>문제80~85를 풀고, 각 문제마다 “현재 선택 / 왜 이 선택이 미래 선택을\n망치지 않는가 / 반례가 없는 이유”를 세 줄로 정리합니다. 정렬을 했다고\n해서 자동으로 그리디가 되는 것은 아니므로, 정당화 문장이 핵심입니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> greedy_checklist.md에 문제별 정당화 문장 3줄씩 적기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">3. MST와 배낭 비교 메모</h3><p>같은 “그리디”라도 MST의 간선 선택과 배낭 문제의 선택은 성격이 다릅니다.\n왜 어떤 배낭 문제는 그리디가 되고, 왜 0/1 배낭은 DP가 더 자연스러운지\n짧게 비교해 보세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 부분 배낭과 0/1 배낭의 차이를 한 표로 정리하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">4. 문제77 또는 79 재구현</h3><p>심화 DP 문제 하나를 골라 D+1에 다시 구현합니다. 문제77은 원형 구조,\n문제79는 상태 범위 설계가 핵심이므로, 처음보다 더 짧은 코드가 아니라 더\n설명 가능한 코드를 목표로 하세요.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 77_79_retry.py에 한 문제 이상 재구현</p>\n</li>\n\n</ul><h2 class=\"section-heading\">GitHub 활용 가이드</h2><div class=\"table-scroll\"><table>\n<thead>\n<tr>\n<th><strong>참고 경로</strong></th>\n<th><strong>사용 시점</strong></th>\n<th><strong>활용 방식</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>solution/</strong></td>\n<td>77.py~85.py를 비교하며 DP/그리디 시각 전환을 볼 때</td>\n<td>내가 왜 다른 방향으로 접근했는지까지 함께 점검합니다.</td>\n</tr>\n<tr>\n<td><strong>Algorithm_with_DataStructure/</strong></td>\n<td>LCS/LIS/priority_queue/interval_sum 등을 보며 보조 개념을 확인할 때</td>\n<td>문제79처럼 상태 범위를 다룰 때 관련 템플릿이 도움이 됩니다.</td>\n</tr>\n<tr>\n<td><strong>mistake/</strong></td>\n<td>sorting_methods_comparison.py, operation_precedence_examples.py를 확인할 때</td>\n<td>정렬 기반 그리디에서 흔한 사소한 실수를 줄이는 용도로 사용합니다.</td>\n</tr>\n</tbody>\n</table></div><h2 class=\"section-heading\">자주 하는 실수와 교정 포인트</h2><p><strong>1)</strong> 그리디는 “가장 좋아 보이는 선택”을 하는 것이 아니라, 그 선택이\n안전하다는 근거를 찾는 과정입니다. 근거가 없으면 DP를 다시 의심해야\n합니다.</p><p><strong>2)</strong> 원형 구조가 나오면 종종 케이스 분리가 필요합니다. 첫 요소와\n마지막 요소가 동시에 영향을 주는지 확인하세요.</p><p><strong>3)</strong> 문제79처럼 문자열/상태 범위가 큰 DP는 상태 정의를 너무 넓게\n잡으면 구현이 복잡해집니다. 최소한의 상태만 남기는 연습이 필요합니다.</p><p><strong>4)</strong> 부분 배낭과 0/1 배낭을 혼동하면 잘못된 그리디로 가기 쉽습니다.\n반례를 직접 적어 두는 것이 좋습니다.</p></div>","w4-a15":"<div class=\"doc-prose\"><p class=\"lead\">이번 문서는 학습 범위, 핵심 목표, 참고 자료를 빠르게 확인할 수 있도록 정리한 과제 안내입니다.</p><section class=\"summary-grid\"><div class=\"summary-item\"><span class=\"summary-label\">범위</span><strong class=\"summary-value\">전 범위 | 전체 문제 기반 120분 실전</strong></div><div class=\"summary-item\"><span class=\"summary-label\">핵심 역량</span><strong class=\"summary-value\">실전 시간 관리, 문제 선택 순서, 복기 보고서, 약점 지도</strong></div><div class=\"summary-item\"><span class=\"summary-label\">권장 시간</span><strong class=\"summary-value\">4~5시간 | 난도: 상</strong></div></section><h2 class=\"section-heading\">과제 개요</h2><p>최종 모의고사 과제는 단순히 4문제를 시간 재고 푸는 것이 아니라, 실제\n시험장에서의 문제 선택 순서와 복기 방식까지 포함한 종합 훈련입니다.\n지금까지 만든 템플릿과 오답노트를 활용해 120분 안에 문제를 고르고, 남은\n시간을 분배하고, 종료 후 틀린 원인을 유형별로 분류하는 흐름을 한 번\n완성해 보는 것이 목적입니다.</p><p>실전에서는 문제를 다 못 푸는 것보다, 쉬운 문제를 제때 풀지 못하거나, 한\n문제에 지나치게 매몰되거나, 맞은 문제도 운 좋게 푼 것처럼 남겨 두는 것이\n더 큰 손실입니다. 따라서 이 과제에서는 점수보다 복기 문서 품질과 약점\n지도 완성도를 더 높게 평가합니다.</p><section class=\"callout-box\"><p class=\"callout-label\">대기업 코딩 테스트 연결 포인트</p><p>대기업 코딩 테스트는 알고리즘 지식만으로 통과하지 않습니다. 시간\n관리, 문제 선택, 중도 포기 기준, 디버깅 포인트 기록, 재도전 일정까지\n실전 운영력이 뒷받침되어야 안정적으로 점수를 얻을 수 있습니다.</p></section><h2 class=\"section-heading\">학습 목표</h2><ul>\n<li><p>120분 실전에서 문제 선택 순서를 스스로 조절할 수 있다.</p>\n</li>\n<li><p>쉬운 문제 완주를 우선하고, 중간 난도 문제와 고난도 문제를 나누어\n대응할 수 있다.</p>\n</li>\n<li><p>복기 문서를 통해 시간 낭비의 원인과 약한 유형을 명확히 분류할 수 있다.</p>\n</li>\n<li><p>최종 약점 지도를 업데이트하고 시험 직전 재풀이 우선순위를 정할 수\n있다.</p>\n</li>\n</ul><h2 class=\"section-heading\">세부 수행 절차</h2><h3 class=\"step-heading\">1. 모의고사 세트 구성</h3><p>전 범위에서 난도와 유형이 섞이도록 4문제를 고릅니다. 권장 방식은 쉬운\n2문제, 중간 1문제, 어려운 1문제로 구성하는 것입니다. 예시 세트는 31, 61,\n95, 99처럼 그래프/정렬응용/DP/누적합을 섞어서 구성할 수 있습니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 시험 전날 세트를 고정해 두지 말고, 약한 유형 보완을\n반영해 최종 세트를 선택하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">2. 120분 실전 수행</h3><p>문제 시작 전에 전체를 5분 정도 훑고, 바로 풀 수 있는 문제부터\n착수합니다. 한 문제에 30분 이상 막히면 보류하고 다음 문제로 이동하는\n기준을 세우세요. 구현 중간에 디버깅에만 시간을 쓰지 않도록, 앞서 만든\n체크리스트를 적극 활용합니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> 문제별 시작/종료 시각과 중단 시각을 간단히 기록하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">3. 복기 보고서 작성</h3><p>모의고사 직후에는 정답 여부보다도 왜 막혔는지를 중심으로 복기합니다.\n문제를 5분 안에 어떻게 읽었는지, 자료구조 선택이 맞았는지, 구현 실수인지\n설계 실수인지를 구분해 적어야 합니다. 맞은 문제도 “왜 그 자료구조가\n맞았는지”를 적어 두면 실전 감이 빠르게 오릅니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> final_mock_result.md에 문제별 첫 접근, 막힌 이유, 교정\n포인트를 모두 기록하기</p>\n</li>\n\n</ul><h3 class=\"step-heading\">4. 약점 지도 업데이트와 최종 재풀이 계획</h3><p>배열/정렬, 해시/문자열, 스택/큐, 트리/그래프, 백트래킹, DP, 그리디,\n구현, 누적합/윈도우 등으로 나눠 자신감 점수와 최근 오답 문제를\n기록합니다. 그 후 시험 직전 다시 볼 문제를 5개 이하로 압축해 우선순위를\n정합니다.</p><ul>\n<li><p class=\"inline-note\"><span class=\"inline-label\">실행 포인트</span> weakness_map.md에 카테고리별 자신감 점수와 재풀이 날짜\n작성</p>\n</li>\n\n</ul><h2 class=\"section-heading\">GitHub 활용 가이드</h2><div class=\"table-scroll\"><table>\n<thead>\n<tr>\n<th><strong>참고 경로</strong></th>\n<th><strong>사용 시점</strong></th>\n<th><strong>활용 방식</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>모든 이전 과제 산출물</strong></td>\n<td>실전 전 최종 복기 자료로 사용할 때</td>\n<td>stack/graph/dp toolkit과 오답노트를 동시에 옆에 두고 비교합니다.</td>\n</tr>\n<tr>\n<td><strong>solution/ 및 개인 재풀이 파일</strong></td>\n<td>틀린 문제를 다시 점검할 때</td>\n<td>해설 코드를 바로 보기보다 내 재풀이 파일과 먼저 비교합니다.</td>\n</tr>\n<tr>\n<td><strong>mistake/, errorcode/</strong></td>\n<td>실전 중 자주 반복된 실수를 분류할 때</td>\n<td>문법 실수와 설계 실수를 구분하는 데 활용합니다.</td>\n</tr>\n</tbody>\n</table></div><h2 class=\"section-heading\">자주 하는 실수와 교정 포인트</h2><p><strong>1)</strong> 모의고사를 실제 시험보다 느슨하게 치르면 실전 감각이 생기지\n않습니다. 휴대폰을 치우고 시간을 엄격히 재세요.</p><p><strong>2)</strong> 어려운 문제를 붙잡다가 쉬운 문제 두 개를 놓치는 것이 가장\n치명적입니다. 문제 선택 순서를 사전에 정해 두는 것이 좋습니다.</p><p><strong>3)</strong> 맞은 문제는 복기를 생략하기 쉽지만, 왜 맞았는지를 정리해 두어야\n시험장에서 비슷한 문제를 더 빨리 풀 수 있습니다.</p><p><strong>4)</strong> 약점 지도를 너무 세분화하면 다시 보기가 어렵습니다. 큰 유형\n기준으로 정리하고, 대표 문제 몇 개만 연결하세요.</p></div>"};

      { pattern: '기지국\\s+설치', href: 'https://school.programmers.co.kr/learn/courses/30/lessons/12979' },
    ].map((entry) => ({
      ...entry,
      regex: new RegExp(`^${entry.pattern}$`),
    }));
    const problemLinkPattern = new RegExp(
      problemLinkEntries.map((entry) => `(?:${entry.pattern})`).join('|'),
      'g',
    );

    function buildRepoSearchUrl(token) {
      return `${REPO_BASE}/search?q=${encodeURIComponent(token)}&type=code`;
    }

    function resolveRepoUrl(token) {
      if (repoDirectFileLinks.has(token)) return repoDirectFileLinks.get(token);
      if (repoFolderLinks.has(token)) return repoFolderLinks.get(token);
      if (repoBareSearchTokens.has(token)) return buildRepoSearchUrl(token);
      return '';
    }

    function createRepoLinkElement(token) {
      const href = resolveRepoUrl(token);
      if (!href) return document.createTextNode(token);
      const anchor = document.createElement('a');
      anchor.href = href;
      anchor.textContent = token;
      anchor.className = 'repo-link';
      anchor.target = '_blank';
      anchor.rel = 'noopener noreferrer';
      anchor.setAttribute('aria-label', `${token} GitHub에서 열기`);
      return anchor;
    }

    function shouldSkipLinkify(parent) {
      return Boolean(parent?.closest('a, script, style, textarea, code, pre'));
    }

    function linkifyTextNodes(root, pattern, replacer) {
      if (!root || !pattern) return;
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
      const textNodes = [];
      while (walker.nextNode()) {
        const node = walker.currentNode;
        const parent = node.parentElement;
        if (!parent) continue;
        if (!node.nodeValue || !node.nodeValue.trim()) continue;
        if (shouldSkipLinkify(parent)) continue;
        pattern.lastIndex = 0;
        if (!pattern.test(node.nodeValue)) continue;
        textNodes.push(node);
      }

      textNodes.forEach((node) => {
        const nodeText = node.nodeValue || '';
        pattern.lastIndex = 0;
        let match;
        let lastIndex = 0;
        const fragment = document.createDocumentFragment();
        while ((match = pattern.exec(nodeText)) !== null) {
          const token = match[0];
          const start = match.index;
          const end = start + token.length;
          if (start > lastIndex) {
            fragment.appendChild(document.createTextNode(nodeText.slice(lastIndex, start)));
          }
          fragment.appendChild(replacer(token));
          lastIndex = end;
        }
        if (lastIndex < nodeText.length) {
          fragment.appendChild(document.createTextNode(nodeText.slice(lastIndex)));
        }
        if (node.parentNode) {
          node.parentNode.replaceChild(fragment, node);
        }
      });
    }

    function linkifyRepoReferences(root) {
      linkifyTextNodes(root, repoLinkPattern, createRepoLinkElement);
    }

    function createProblemLinkElement(token) {
      const entry = problemLinkEntries.find((item) => item.regex.test(token));
      if (!entry) return document.createTextNode(token);
      const anchor = document.createElement('a');
      anchor.href = entry.href;
      anchor.textContent = token;
      anchor.className = 'problem-link';
      anchor.target = '_blank';
      anchor.rel = 'noopener noreferrer';
      anchor.setAttribute('aria-label', `${token.replace(/\s+/g, ' ').trim()} 문제 페이지 열기`);
      return anchor;
    }

    function linkifyProblemReferences(root) {
      linkifyTextNodes(root, problemLinkPattern, createProblemLinkElement);
    }


    function notifyHeight() {
      const height = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
      window.parent?.postMessage({ type: 'kp-study-docs-height', height }, '*');
    }

    function notifySelection(id) {
      window.parent?.postMessage({ type: 'kp-study-docs-selection', lessonId: id }, '*');
    }

    function selectLesson(id, updateUrl = true) {
      const lesson = lessonMap.get(id);
      if (!lesson) return;
      currentId = lesson.id;
      viewerTitle.textContent = lesson.displayTitle;
      viewerBody.innerHTML = docs[lesson.id] || '<div class="doc-prose"><p class="doc-empty">문서를 불러오지 못했습니다.</p></div>';
      linkifyRepoReferences(viewerBody);
      linkifyProblemReferences(viewerBody);
      menuButtons.forEach((button) => button.classList.toggle('active', button.dataset.lessonBtn === lesson.id));
      expandedWeek = lesson.week;
      syncExpandedWeek();
      viewerBody.scrollTop = 0;
      window.scrollTo?.({ top: 0, behavior: 'auto' });
      if (updateUrl) {
        const url = new URL(window.location.href);
        url.searchParams.set(isEmbed ? 'lesson' : 'scenario', lesson.id);
        history.replaceState(null, '', url.toString());
      }
      notifySelection(lesson.id);
      requestAnimationFrame(notifyHeight);
      setTimeout(notifyHeight, 120);
    }

    function syncExpandedWeek() {
      weekButtons.forEach((node) => {
        const isExpandedWeek = node.dataset.weekBtn === expandedWeek;
        node.classList.toggle('active', isExpandedWeek);
        node.setAttribute('aria-expanded', String(isExpandedWeek));
        const icon = node.querySelector('.week-toggle-icon');
        if (icon) icon.textContent = isExpandedWeek ? '−' : '+';
      });
      document.querySelectorAll('.week-list').forEach((list) => {
        const group = list.closest('.week-group');
        const weekButton = group?.querySelector('[data-week-btn]');
        list.hidden = weekButton?.dataset.weekBtn !== expandedWeek;
      });
    }

    weekButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const nextWeek = button.dataset.weekBtn;
        if (!nextWeek || nextWeek === expandedWeek) return;
        expandedWeek = nextWeek;
        const nextLesson = groups.find((group) => group.week === nextWeek)?.items?.[0];
        if (nextLesson) {
          selectLesson(nextLesson.id);
          return;
        }
        syncExpandedWeek();
      });
    });

    menuButtons.forEach((button) => {
      button.addEventListener('click', () => selectLesson(button.dataset.lessonBtn));
    });

    const initialId = params.get('lesson') || params.get('scenario');
    selectLesson(lessonMap.has(initialId) ? initialId : lessons[0].id, false);
    window.addEventListener('load', notifyHeight);
    window.addEventListener('resize', notifyHeight);
  })();
