<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DremDeveloper 블로그 메인 공유 썸네일</title>
  <desc id="desc">파스텔 배경 위에 웃는 캐릭터 아바타와 DremDeveloper 블로그 소개 문구가 배치된 대표 썸네일 이미지</desc>
  <defs>
