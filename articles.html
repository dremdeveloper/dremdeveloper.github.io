  <meta name="keywords" content="algorithm, coding test, AI, reinforcement learning, PPO, DPO, visualization" />
  <meta name="author" content="박경록" />
  <meta property="og:title" content="DremDeveloper Blog" />
  <meta property="og:description" content="AI 논문 정리 및 코딩 테스트 시각화 자료" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://dremdeveloper.github.io/" />
  <meta property="og:image" content="https://dremdeveloper.github.io/assets/preview.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="DremDeveloper Blog" />
  <meta name="twitter:description" content="AI 논문 정리 및 코딩 테스트 시각화 자료" />
  <link rel="canonical" href="https://dremdeveloper.github.io/" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />

  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="홈으로 이동">
        <span class="brand-text">
          <strong>Home</strong>
        </span>
      </a>

      <button class="menu-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>

      <nav id="site-nav" class="site-nav" aria-label="주요 메뉴">
        <a class="is-active" href="articles.html">Article</a>
        <a href="lectures.html">강의</a>
        <div class="site-nav-study" id="study-nav-item">
          <button
            id="study-nav-toggle"
            class="site-nav-study-toggle"
            type="button"
            aria-expanded="false"
            aria-haspopup="true"
            aria-controls="study-top-submenu"
          >
            코테자료
          </button>

          <section id="study-top-submenu" class="study-top-submenu" aria-label="코테자료 서브메뉴">
            <div class="study-submenu-roots" role="list">
              <a class="study-submenu-root" href="study.html?view=visualization">
                <span class="study-submenu-root-label">시각화</span>
              </a>
              <a class="study-submenu-root" href="study.html?view=plan">
                <span class="study-submenu-root-label">학습 플랜</span>
              </a>
              <a class="study-submenu-root" href="boj-archive-search.html">
                <span class="study-submenu-root-label">문제 검색</span>
              </a>
            </div>
          </section>
        </div>
      </nav>
    </header>

    <main class="page-shell section-tight stack-gap article-page-shell">
      <section class="browser-layout article-layout">
        <aside class="browser-sidebar card panel-pad-md article-sidebar">
          <button
            class="mobile-sidebar-toggle"
            id="article-sidebar-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="article-sidebar-body"
          >
            <span class="mobile-sidebar-toggle-copy">
              <span class="mobile-sidebar-toggle-label">Article 목록</span>
              <strong id="article-sidebar-current">아티클 선택</strong>
            </span>
            <span class="mobile-sidebar-toggle-icon" aria-hidden="true"></span>
          </button>

          <div class="mobile-sidebar-body" id="article-sidebar-body">
            <div class="sidebar-meta article-sidebar-meta">
              <h2>Articles</h2>
              <p id="article-count-label">불러오는 중...</p>
            </div>
            <div class="search-container article-search-container">
              <label class="sr-only" for="article-search-input">아티클 검색</label>
              <input id="article-search-input" class="article-search-input" type="search" placeholder="제목이나 카테고리로 빠르게 찾기" autocomplete="off" />
              <div id="article-search-results" class="search-results" aria-label="검색 결과" hidden></div>
            </div>
            <div id="article-list" class="menu-list" aria-label="Article 목록"></div>
          </div>
        </aside>

        <section class="browser-main">
          <article class="card panel-pad-lg article-viewer-card">
            <div id="article-status" class="article-status" aria-live="polite">GitHub 저장소의 articles 폴더를 확인하는 중입니다.</div>
            <div id="article-viewer" class="article-viewer markdown-body" hidden></div>
          </article>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      <p>Copyright © <span id="year"></span> Kyungrok Park (ultrasuperrok@gmail.com)</p>
    </footer>
  </div>

  <script src="assets/data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.5/dist/purify.min.js"></script>
  <script src="assets/site.js"></script>
  <script src="assets/articles.js"></script>
</body>
</html>
