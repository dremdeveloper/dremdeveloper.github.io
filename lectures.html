<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강의 | 박경록</title>
  <meta name="description" content="박경록 강의 페이지. 파이썬과 C++ 재생목록을 좌측 메뉴와 우측 플레이어로 볼 수 있습니다." />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="홈으로 이동">
        <span class="brand-text">
          <strong>Home</strong>
        </span>
      </a>

      <button class="menu-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>

      <nav id="site-nav" class="site-nav" aria-label="주요 메뉴">
        <a href="articles.html">Article</a>
        <a class="is-active" href="lectures.html">강의</a>
        <a href="free-posts.html">자유글</a>
        <div class="site-nav-study" id="study-nav-item">
          <button
            id="study-nav-toggle"
            class="site-nav-study-toggle"
            type="button"
            aria-expanded="false"
            aria-haspopup="true"
            aria-controls="study-top-submenu"
          >
            공부자료
          </button>

          <section id="study-top-submenu" class="study-top-submenu" aria-label="공부자료 서브메뉴">
            <div class="study-submenu-roots" role="list">
              <a class="study-submenu-root" href="study.html?view=visualization">
                <span class="study-submenu-root-label">시각화</span>
              </a>
              <a class="study-submenu-root" href="study.html?view=plan">
                <span class="study-submenu-root-label">학습 플랜</span>
              </a>
            </div>
          </section>
        </div>
      </nav>
    </header>

    <main class="page-shell section-tight">
      <section class="browser-layout lecture-layout">
        <aside class="browser-sidebar card panel-pad-md">
          <div class="track-switch" role="tablist" aria-label="강의 종류 선택">
            <button class="track-button is-active" type="button" data-track="python">Python</button>
            <button class="track-button" type="button" data-track="cpp">C++</button>
          </div>

          <div class="sidebar-meta" id="track-meta"></div>
          <div class="menu-list" id="lecture-list" aria-label="강의 목록"></div>
        </aside>

        <section class="browser-main stack-gap">
          <article class="card panel-pad-lg lecture-summary">
            <div class="summary-topline">
              <span class="eyebrow no-margin" id="lecture-course-label">Python</span>
              <a class="button button-secondary compact-button" id="lecture-book-link" href="#" target="_blank" rel="noopener noreferrer">책 구매하기</a>
            </div>
            <h2 id="lecture-title">전체 재생목록</h2>
            <div class="meta-grid" id="lecture-detail-grid"></div>
          </article>

          <article class="card video-card">
            <div class="video-frame-wrap">
              <div
                id="lecture-player"
                class="video-player-embed"
                role="img"
                aria-label="강의 재생 플레이어"></div>
            </div>
            <div class="video-controls" aria-label="영상 재생 컨트롤">
              <button class="video-control-button" id="lecture-play-toggle" type="button" aria-label="재생" disabled>
                재생
              </button>
              <label class="video-progress" for="lecture-progress">
                <span class="sr-only">영상 진행률</span>
                <input id="lecture-progress" type="range" min="0" max="1000" value="0" disabled />
              </label>
              <div class="video-time" aria-live="polite">
                <span id="lecture-current-time">00:00</span>
                <span aria-hidden="true">/</span>
                <span id="lecture-duration">00:00</span>
              </div>
            </div>
          </article>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      <p>Copyright © <span id="year"></span> Kyungrok Park (ultrasuperrok@gmail.com)</p>
    </footer>
  </div>

  <script src="assets/data.js"></script>
  <script src="assets/site.js"></script>
  <script src="assets/lectures.js"></script>
</body>
</html>
