    steps.push(createStep({
      lines: [1],
      title: '정렬 준비',
      summary: '맨 앞 원소 하나는 이미 정렬되었다고 보고 시작합니다.',
      detail: '삽입 정렬은 왼쪽 구간을 정렬된 상태로 유지하면서 새 값을 적절한 위치에 꽂아 넣습니다.',
      metrics: makeMetrics(1, null, null),
      visual: { items: arr.slice(), keyIndex: null, sorted: [0], activeRange: [0, 1] },
    }));

    for (let i = 1; i < arr.length; i++) {
      const key = arr[i];
      let j = i - 1;

      steps.push(createStep({
        lines: [2, 3, 4],
        title: `key 선택`,
        summary: `인덱스 ${i}의 값 ${key}를 정렬된 왼쪽 구간에 삽입합니다.`,
        detail: 'key는 지금 제자리를 찾아야 하는 값입니다. 왼쪽으로 이동하면서 들어갈 위치를 찾습니다.',
        metrics: makeMetrics(i, j, key),
        visual: { items: arr.slice(), keyIndex: i, sorted: Array.from({ length: i }, (_, idx) => idx), activeRange: [0, i] },
      }));

      while (j >= 0 && arr[j] > key) {
        steps.push(createStep({
          lines: [5],
          title: '왼쪽 값과 key 비교',
          summary: `${arr[j]}가 key ${key}보다 크므로 오른쪽으로 밀어야 합니다.`,
          detail: '삽입 정렬에서는 큰 값을 한 칸씩 오른쪽으로 밀면서 key가 들어갈 빈 자리를 만듭니다.',
          metrics: makeMetrics(i, j, key),
          visual: { items: arr.slice(), keyIndex: i, comparing: [j], sorted: Array.from({ length: i }, (_, idx) => idx), activeRange: [0, i] },
        }));

        arr[j + 1] = arr[j];
        steps.push(createStep({
          lines: [6, 7],
          title: '값 이동',
          summary: `${arr[j + 1]}를 오른쪽으로 한 칸 밀었습니다.`,
          detail: '교환이 아니라 값 복사입니다. key는 따로 들고 있고, 기존 값을 옆으로 옮깁니다.',
          metrics: makeMetrics(i, j, key),
          visual: { items: arr.slice(), keyIndex: i, shifted: [j, j + 1], sorted: Array.from({ length: i }, (_, idx) => idx), activeRange: [0, i] },
        }));
        j -= 1;
      }

      arr[j + 1] = key;
      steps.push(createStep({
        lines: [8],
        title: 'key 삽입',
        summary: `key ${key}를 인덱스 ${j + 1} 위치에 넣습니다.`,
        detail: '이제 key보다 큰 값들은 모두 오른쪽으로 밀렸기 때문에 현재 위치가 key의 자리입니다.',
        metrics: makeMetrics(i + 1, j, key),
        visual: { items: arr.slice(), keyIndex: j + 1, sorted: Array.from({ length: i + 1 }, (_, idx) => idx), activeRange: [0, i] },
      }));
    }

    steps.push(createStep({
      lines: [9],
      title: '정렬 완료',
      summary: '왼쪽부터 오른쪽까지 전체 구간이 정렬되었습니다.',
      detail: '삽입 정렬은 항상 왼쪽 구간을 정렬 상태로 유지한다는 점이 핵심입니다.',
      metrics: makeMetrics(arr.length, null, null),
      visual: { items: arr.slice(), sorted: Array.from({ length: arr.length }, (_, idx) => idx), activeRange: null },
    }));

    return baseScenario({
      id: 'insertion-sort',
      label: '삽입 정렬',
      subtitle: '정렬된 왼쪽 구간에 새 값을 끼워 넣듯 삽입한다.',
      complexity: '시간 O(n²)',
      spaceComplexity: '공간 O(1)',
      badges: ['부분 정렬 유지', '제자리 정렬', '거의 정렬된 데이터에 유리'],
      code: [
        'def insertion_sort(arr):',
        '    for i in range(1, len(arr)):',
        '        key = arr[i]',
        '        j = i - 1',
        '        while j >= 0 and arr[j] > key:',
        '            arr[j + 1] = arr[j]',
        '            j -= 1',
        '        arr[j + 1] = key',
        '    return arr',
      ],
      renderer: 'sorting',
      legend: [
        { label: 'key', tone: 'key' },
        { label: '밀리는 값', tone: 'shifted' },
        { label: '정렬된 구간', tone: 'good' },
      ],
      notes: [
        { title: '핵심 포인트', body: '삽입 정렬은 "빈 자리를 만들고 key를 꽂는다"는 그림으로 보면 이해가 빠릅니다.' },
        { title: '보기 좋은 포인트', body: '왼쪽 구간이 계속 정렬된 상태로 유지되는지 확인해 보세요.' },
        { title: '실수하기 쉬운 부분', body: 'while 안에서 key 자체를 움직이지 않습니다. key는 따로 들고 있고, 기존 값만 오른쪽으로 밀어냅니다.' },
      ],
      steps,
    });
  }

  function buildSelectionSortScenario() {
    const input = [9, 4, 7, 3, 6];
    const arr = input.slice();
    const steps = [];

    const sortedPrefix = (count) => Array.from({ length: count }, (_, idx) => idx);
    const makeMetrics = (i, minIndex, scanIndex) => [
      metric('배열 상태', fmtArray(arr)),
      metric('정렬된 왼쪽 구간', sortedPrefix(i).length ? sortedPrefix(i).join(', ') : '없음'),
      metric('현재 최소 후보', minIndex === null ? '없음' : `idx ${minIndex}`),
      metric('스캔 위치 j', scanIndex === null ? '없음' : scanIndex),
    ];

    steps.push(createStep({
      lines: [1],
      title: '정렬 준비',
      summary: '맨 왼쪽 자리부터 하나씩 최솟값을 골라 채울 준비를 합니다.',
      detail: '선택 정렬은 아직 정렬되지 않은 구간에서 최솟값을 찾아 앞쪽의 확정 구간 뒤에 놓는 방식입니다.',
      metrics: makeMetrics(0, null, null),
      visual: { items: arr.slice(), sorted: [], activeRange: [0, arr.length - 1] },
    }));

    for (let i = 0; i < arr.length - 1; i++) {
      let minIndex = i;
      steps.push(createStep({
        lines: [2, 3],
        title: `${i}번 자리에 들어갈 최솟값 찾기`,
        summary: `현재는 arr[${i}] = ${arr[i]}를 최소 후보로 두고 오른쪽 구간을 검사합니다.`,
        detail: '선택 정렬은 한 패스마다 최솟값 후보를 하나 잡고, 오른쪽을 끝까지 보면서 더 작은 값이 있는지 확인합니다.',
        metrics: makeMetrics(i, minIndex, null),
        visual: { items: arr.slice(), sorted: sortedPrefix(i), keyIndex: minIndex, activeRange: [i, arr.length - 1] },
      }));

      for (let j = i + 1; j < arr.length; j++) {
        steps.push(createStep({
          lines: [4, 5],
          title: '최소 후보와 비교',
          summary: `${arr[j]}와 현재 최소 후보 ${arr[minIndex]}를 비교합니다.`,
          detail: '더 작은 값이 나오면 최소 후보 위치를 그 인덱스로 바꿉니다.',
          metrics: makeMetrics(i, minIndex, j),
          visual: { items: arr.slice(), sorted: sortedPrefix(i), comparing: [minIndex, j], keyIndex: minIndex, activeRange: [i, arr.length - 1] },
        }));

        if (arr[j] < arr[minIndex]) {
          minIndex = j;
          steps.push(createStep({
            lines: [6],
            title: '최소 후보 갱신',
            summary: `${arr[minIndex]}가 더 작으므로 새로운 최소 후보가 됩니다.`,
            detail: '이 패스가 끝날 때까지 가장 작은 값을 기억해 두었다가 마지막에 한 번만 swap합니다.',
            metrics: makeMetrics(i, minIndex, j),
            visual: { items: arr.slice(), sorted: sortedPrefix(i), comparing: [i, minIndex], keyIndex: minIndex, activeRange: [i, arr.length - 1] },
          }));
        }
      }

      if (minIndex !== i) {
        const leftValue = arr[i];
        const minValue = arr[minIndex];
        [arr[i], arr[minIndex]] = [arr[minIndex], arr[i]];
        steps.push(createStep({
          lines: [7],
          title: '최솟값을 앞으로 이동',
          summary: `${minValue}를 인덱스 ${i}로 보내고 ${leftValue}와 자리를 바꿉니다.`,
          detail: '선택 정렬은 비교를 모두 마친 뒤, 최솟값을 현재 확정 자리로 한 번만 옮깁니다.',
          metrics: makeMetrics(i + 1, i, null),
          visual: { items: arr.slice(), sorted: sortedPrefix(i + 1), shifted: [i, minIndex], keyIndex: i, activeRange: [i + 1, arr.length - 1] },
        }));
      } else {
        steps.push(createStep({
          lines: [7],
          title: '이미 가장 작은 값',
          summary: `arr[${i}]가 이미 현재 구간의 최솟값이라 자리를 바꾸지 않습니다.`,
          detail: '최소 후보가 처음 위치 그대로라면 swap 없이 다음 자리로 넘어갑니다.',
          metrics: makeMetrics(i + 1, i, null),
          visual: { items: arr.slice(), sorted: sortedPrefix(i + 1), keyIndex: i, activeRange: [i + 1, arr.length - 1] },
        }));
      }
    }

    steps.push(createStep({
      lines: [8],
      title: '정렬 완료',
      summary: '왼쪽부터 차례대로 최솟값을 채워 배열이 모두 정렬되었습니다.',
      detail: '선택 정렬은 정렬된 구간이 왼쪽에서 오른쪽으로 한 칸씩 늘어나는 모습을 보면 이해하기 쉽습니다.',
      metrics: makeMetrics(arr.length, null, null),
      visual: { items: arr.slice(), sorted: Array.from({ length: arr.length }, (_, idx) => idx), activeRange: null },
    }));

    return baseScenario({
      id: 'selection-sort',
      label: '선택 정렬',
      subtitle: '정렬되지 않은 구간에서 최솟값을 골라 앞자리에 놓는다.',
      complexity: '시간 O(n²)',
      spaceComplexity: '공간 O(1)',
      badges: ['최솟값 선택', '제자리 정렬', '패스당 swap 1회'],
      code: [
        'def selection_sort(arr):',
        '    for i in range(len(arr) - 1):',
        '        min_idx = i',
        '        for j in range(i + 1, len(arr)):',
        '            if arr[j] < arr[min_idx]:',
        '                min_idx = j',
        '        arr[i], arr[min_idx] = arr[min_idx], arr[i]',
        '    return arr',
      ],
      renderer: 'sorting',
      legend: [
        { label: '현재 최소 후보', tone: 'key' },
        { label: '비교 중', tone: 'highlight' },
        { label: '정렬 완료 구간', tone: 'good' },
      ],
      notes: [
        { title: '핵심 포인트', body: '선택 정렬은 매 패스마다 최솟값 하나를 골라 맨 앞으로 보내는 방식입니다.' },
        { title: '보기 좋은 포인트', body: '왼쪽의 초록 구간이 확정 구간이고, 오른쪽에서 최소 후보가 어떻게 바뀌는지 보세요.' },
        { title: '실수하기 쉬운 부분', body: '최소 후보는 비교할 때마다 바로 swap하지 않고, 패스가 끝난 뒤 한 번만 교환합니다.' },
      ],
      steps,
    });
  }

  function buildMergeSortScenario() {
    const arr = [7, 2, 9, 1, 5, 3];
    const steps = [];
    const callStack = [];

    function pushStep(lines, title, summary, detail, visual) {
      steps.push(createStep({
        lines,
        title,
        summary,
        detail,
        metrics: [
          metric('배열 상태', fmtArray(arr)),
          metric('현재 호출 스택', callStack.length ? callStack.join(' → ') : '비어 있음'),
          metric('현재 병합 범위', visual.range ? `${visual.range[0]}..${visual.range[1]}` : '없음'),
          metric('임시 배열 temp', visual.temp ? fmtArray(visual.temp) : '비어 있음'),
        ],
        visual,
      }));
    }

    function mergeSort(left, right) {
      callStack.push(`${left}:${right}`);
      pushStep([1], '분할 호출', `merge_sort(arr, ${left}, ${right})를 호출했습니다.`, '머지 정렬은 배열을 절반씩 나눠서 더 이상 나눌 수 없을 때까지 내려간 뒤, 정렬된 상태로 다시 합칩니다.', {
        items: arr.slice(),
        activeRange: [left, right],
        range: [left, right],
        stack: callStack.slice(),
        merge: null,
      });

      if (left >= right) {
        pushStep([2, 3], '더 나눌 수 없는 구간', `인덱스 ${left}..${right}는 원소가 하나이므로 정렬이 끝난 상태입니다.`, '길이가 1인 구간은 이미 정렬된 것으로 봅니다.', {
          items: arr.slice(),
          activeRange: [left, right],
          range: [left, right],
          stack: callStack.slice(),
          temp: [],
        });
        callStack.pop();
        return;
      }

      const mid = Math.floor((left + right) / 2);
      pushStep([4], '중간 지점 계산', `현재 구간을 ${left}..${mid}, ${mid + 1}..${right}로 나눕니다.`, '중간 인덱스를 기준으로 왼쪽과 오른쪽 절반을 재귀적으로 정렬합니다.', {
        items: arr.slice(),
        activeRange: [left, right],
        range: [left, right],
        mid,
        stack: callStack.slice(),
        temp: [],
      });

      pushStep([5], '왼쪽 절반 정렬', `먼저 왼쪽 구간 ${left}..${mid}를 정렬합니다.`, '재귀 호출은 같은 일을 더 작은 문제에 다시 적용하는 과정입니다.', {
        items: arr.slice(),
        activeRange: [left, mid],
        range: [left, right],
        mid,
        stack: callStack.slice(),
        temp: [],
      });
      mergeSort(left, mid);

      pushStep([6], '오른쪽 절반 정렬', `이제 오른쪽 구간 ${mid + 1}..${right}를 정렬합니다.`, '왼쪽 절반이 정리된 뒤 오른쪽 절반으로 이동합니다.', {
        items: arr.slice(),
        activeRange: [mid + 1, right],
        range: [left, right],
        mid,
        stack: callStack.slice(),
        temp: [],
      });
      mergeSort(mid + 1, right);

      const leftPart = arr.slice(left, mid + 1);
      const rightPart = arr.slice(mid + 1, right + 1);
      let i = 0;
      let j = 0;
      const temp = [];

      pushStep([8, 9, 10, 11], '병합 준비', '정렬된 두 부분 배열을 꺼내 임시 배열에 병합할 준비를 합니다.', '이제부터는 두 배열의 맨 앞 값을 비교하며 더 작은 값을 temp에 넣습니다.', {
        items: arr.slice(),
        activeRange: [left, right],
        range: [left, right],
        stack: callStack.slice(),
        leftPart: leftPart.slice(),
        rightPart: rightPart.slice(),
        temp: temp.slice(),
      });

      while (i < leftPart.length && j < rightPart.length) {
        pushStep([12], '앞쪽 원소 비교', `${leftPart[i]}와 ${rightPart[j]}를 비교합니다.`, '두 부분 배열은 이미 각각 정렬되어 있으므로 앞쪽 값끼리만 보면 다음에 들어갈 값을 결정할 수 있습니다.', {
          items: arr.slice(),
          activeRange: [left, right],
          range: [left, right],
          stack: callStack.slice(),
          leftPart: leftPart.slice(i),
          rightPart: rightPart.slice(j),
          temp: temp.slice(),
        });

        if (leftPart[i] <= rightPart[j]) {
          temp.push(leftPart[i]);
          pushStep([13], `왼쪽 값 ${leftPart[i]} 선택`, '더 작은 왼쪽 값을 temp에 넣습니다.', '왼쪽 값이 더 작거나 같으므로 병합 결과에서 먼저 나와야 합니다.', {
            items: arr.slice(),
            activeRange: [left, right],
            range: [left, right],
            stack: callStack.slice(),
            leftPart: leftPart.slice(i + 1),
            rightPart: rightPart.slice(j),
            temp: temp.slice(),
          });
          i += 1;
        } else {
          temp.push(rightPart[j]);
          pushStep([13], `오른쪽 값 ${rightPart[j]} 선택`, '더 작은 오른쪽 값을 temp에 넣습니다.', '오른쪽 값이 더 작기 때문에 병합 결과에서 먼저 나와야 합니다.', {
            items: arr.slice(),
            activeRange: [left, right],
            range: [left, right],
            stack: callStack.slice(),
            leftPart: leftPart.slice(i),
            rightPart: rightPart.slice(j + 1),
            temp: temp.slice(),
          });
          j += 1;
        }
      }

      while (i < leftPart.length) {
        temp.push(leftPart[i]);
        pushStep([14], `왼쪽 나머지 ${leftPart[i]} 추가`, '왼쪽 부분 배열에 남아 있는 값을 뒤에 붙입니다.', '한쪽 배열이 먼저 비면 다른 쪽 나머지는 그대로 뒤에 붙이면 됩니다.', {
          items: arr.slice(),
          activeRange: [left, right],
          range: [left, right],
          stack: callStack.slice(),
          leftPart: leftPart.slice(i + 1),
          rightPart: rightPart.slice(j),
          temp: temp.slice(),
        });
        i += 1;
      }

      while (j < rightPart.length) {
        temp.push(rightPart[j]);
        pushStep([14], `오른쪽 나머지 ${rightPart[j]} 추가`, '오른쪽 부분 배열에 남아 있는 값을 뒤에 붙입니다.', '남은 값들은 이미 정렬 상태를 유지하므로 순서대로 이어 붙이면 됩니다.', {
          items: arr.slice(),
          activeRange: [left, right],
          range: [left, right],
          stack: callStack.slice(),
          leftPart: leftPart.slice(i),
          rightPart: rightPart.slice(j + 1),
          temp: temp.slice(),
        });
        j += 1;
      }

      temp.forEach((value, offset) => {
        arr[left + offset] = value;
        pushStep([14], `원본 배열에 되돌리기`, `temp[${offset}] = ${value}를 arr[${left + offset}]에 씁니다.`, '병합 결과를 원래 배열 구간에 다시 덮어써야 다음 상위 호출에서 정렬된 부분 배열로 사용할 수 있습니다.', {
          items: arr.slice(),
          activeRange: [left, right],
          range: [left, right],
          currentWrite: left + offset,
          stack: callStack.slice(),
          leftPart: [],
          rightPart: [],
          temp: temp.slice(),
        });
      });

      pushStep([7], '현재 구간 병합 완료', `${left}..${right} 구간이 정렬되었습니다.`, '작게 나눠서 정렬한 뒤 다시 합치는 것이 머지 정렬의 핵심입니다.', {
        items: arr.slice(),
        activeRange: [left, right],
        range: [left, right],
        stack: callStack.slice(),
        leftPart: [],
        rightPart: [],
        temp: temp.slice(),
      });

      callStack.pop();
    }

    mergeSort(0, arr.length - 1);

    steps.push(createStep({
      lines: [1, 7],
      title: '정렬 완료',
      summary: '전체 구간 병합이 끝나 배열이 정렬되었습니다.',
      detail: '머지 정렬은 분할 과정과 병합 과정을 각각 눈으로 따로 보는 것이 중요합니다.',
      metrics: [
        metric('배열 상태', fmtArray(arr)),
        metric('최종 결과', fmtArray(arr)),
        metric('호출 스택', '비어 있음'),
        metric('전체 범위', `0..${arr.length - 1}`),
      ],
      visual: {
        items: arr.slice(),
        activeRange: null,
        range: [0, arr.length - 1],
        stack: [],
        leftPart: [],
        rightPart: [],
        temp: arr.slice(),
      },
    }));

    return baseScenario({
      id: 'merge-sort',
      label: '머지 정렬',
      subtitle: '배열을 절반씩 나누고, 정렬된 구간을 다시 합쳐 전체를 만든다.',
      complexity: '시간 O(n log n)',
      spaceComplexity: '공간 O(n)',
      badges: ['분할 정복', '재귀 기반', '안정 정렬'],
      code: [
        'def merge_sort(arr, left, right):',
        '    if left >= right:',
        '        return',
        '    mid = (left + right) // 2',
        '    merge_sort(arr, left, mid)',
        '    merge_sort(arr, mid + 1, right)',
        '    merge(arr, left, mid, right)',
        '',
        'def merge(arr, left, mid, right):',
        '    left_part = arr[left:mid + 1]',
        '    right_part = arr[mid + 1:right + 1]',
        '    temp = []',
        '    while left_part and right_part:',
        '        temp.append(smaller value)',
        '    arr[left:right + 1] = temp + remaining values',
      ],
      renderer: 'sorting-merge',
      legend: [
        { label: '현재 분할/병합 구간', tone: 'range' },
        { label: '현재 비교 중', tone: 'highlight' },
        { label: '원본에 쓰는 위치', tone: 'write' },
      ],
      notes: [
        { title: '핵심 포인트', body: '머지 정렬은 분할과 병합을 따로 봐야 이해가 됩니다. 분할은 재귀, 병합은 두 정렬 배열의 앞값 비교입니다.' },
        { title: '보기 좋은 포인트', body: 'temp가 어떻게 채워지고 다시 원본 배열로 돌아오는지 보세요.' },
        { title: '실수하기 쉬운 부분', body: '병합 단계에서 남은 원소를 빼먹으면 정렬 결과가 깨집니다.' },
      ],
      steps,
    });
  }

  function buildQuickSortScenario() {
    const arr = [6, 3, 8, 4, 2, 7];
    const steps = [];
    const fixed = new Set();
    const stack = [];

    function metrics(low, high, pivotIndex, i, j) {
      return [
        metric('배열 상태', fmtArray(arr)),
        metric('현재 파티션 범위', low === null ? '없음' : `${low}..${high}`),
        metric('pivot 인덱스', pivotIndex === null ? '없음' : pivotIndex),
        metric('포인터 i / j', `${i === null ? '-' : i} / ${j === null ? '-' : j}`),
      ];
    }

    function push(lines, title, summary, detail, low, high, pivotIndex, i, j, extras = {}) {
      steps.push(createStep({
        lines,
        title,
        summary,
        detail,
        metrics: metrics(low, high, pivotIndex, i, j),
        visual: {
          items: arr.slice(),
          activeRange: low === null ? null : [low, high],
          pivotIndex,
          pointerI: i,
          pointerJ: j,
          fixed: Array.from(fixed),
          stack: stack.slice(),
          ...extras,
        },
      }));
    }

    function quickSort(low, high) {
      stack.push(`${low}:${high}`);
      push([1], '퀵 정렬 호출', `quick_sort(arr, ${low}, ${high})를 호출했습니다.`, '퀵 정렬은 pivot을 하나 잡아 기준보다 작은 값과 큰 값을 양쪽으로 가르는 방식입니다.', low, high, null, null, null);

      if (low >= high) {
        if (low === high) fixed.add(low);
        push([2, 3], '더 나눌 필요 없음', '원소가 하나 이하인 구간이라 바로 반환합니다.', '길이가 0 또는 1인 구간은 이미 정렬되어 있습니다.', low, high, null, null, null);
        stack.pop();
        return;
      }

      const pivot = arr[high];
      let i = low;
      push([4, 5], `pivot 선택`, `맨 오른쪽 값 ${pivot}를 pivot으로 사용합니다.`, '여기서는 Lomuto partition 방식을 사용해 맨 끝 값을 pivot으로 둡니다.', low, high, high, i, null);

      for (let j = low; j < high; j++) {
        push([6, 7], `pivot과 비교`, `arr[${j}] = ${arr[j]}가 pivot ${pivot}보다 작거나 같은지 확인합니다.`, '작거나 같은 값은 왼쪽 그룹으로 보내야 하므로 i 위치와 교환합니다.', low, high, high, i, j);
        if (arr[j] <= pivot) {
          const leftValue = arr[i];
          const rightValue = arr[j];
          [arr[i], arr[j]] = [arr[j], arr[i]];
          push([8], '작은 값 그룹으로 이동', `${rightValue}를 인덱스 ${i} 쪽으로 보냅니다.`, 'pivot 이하인 값은 왼쪽 그룹에 모아 둡니다.', low, high, high, i, j, { swapped: [i, j] });
          i += 1;
          push([9], 'i 한 칸 이동', '왼쪽 그룹의 끝을 한 칸 오른쪽으로 옮깁니다.', `이제 다음 pivot 이하 값은 인덱스 ${i} 위치에 들어가게 됩니다.`, low, high, high, i, j);
        } else {
          push([7], '오른쪽 그룹에 유지', `${arr[j]}는 pivot보다 크므로 그대로 둡니다.`, 'pivot보다 큰 값은 오른쪽 그룹에 남겨 둡니다.', low, high, high, i, j);
        }
      }

      [arr[i], arr[high]] = [arr[high], arr[i]];
      fixed.add(i);
      push([10], 'pivot 자리 확정', `pivot ${pivot}을 인덱스 ${i} 위치에 놓았습니다.`, '이제 pivot 왼쪽은 pivot 이하, 오른쪽은 pivot 초과 구간이 됩니다.', low, high, i, i, high, { swapped: [i, high] });

      push([11], '왼쪽 구간 재귀 호출', `${low}..${i - 1} 구간을 다시 정렬합니다.`, 'pivot보다 작은 쪽을 별도 문제로 보고 재귀 호출합니다.', low, i - 1, null, null, null);
      quickSort(low, i - 1);

      push([12], '오른쪽 구간 재귀 호출', `${i + 1}..${high} 구간을 다시 정렬합니다.`, 'pivot보다 큰 쪽도 같은 방식으로 정렬합니다.', i + 1, high, null, null, null);
      quickSort(i + 1, high);

      stack.pop();
    }

    quickSort(0, arr.length - 1);

    steps.push(createStep({
      lines: [1, 12],
      title: '정렬 완료',
      summary: '모든 파티션 분할이 끝나 배열이 정렬되었습니다.',
      detail: '퀵 정렬은 pivot을 어디에 두는지, 그리고 분할 뒤 재귀 범위가 어떻게 줄어드는지를 보는 것이 핵심입니다.',
      metrics: [
        metric('배열 상태', fmtArray(arr)),
        metric('고정된 인덱스', Array.from({ length: arr.length }, (_, idx) => idx).join(', ')),
        metric('재귀 스택', '비어 있음'),
        metric('최종 결과', fmtArray(arr)),
      ],
      visual: { items: arr.slice(), activeRange: null, pivotIndex: null, fixed: Array.from({ length: arr.length }, (_, idx) => idx), stack: [] },
    }));

    return baseScenario({
      id: 'quick-sort',
      label: '퀵 정렬',
      subtitle: 'pivot을 기준으로 작은 값과 큰 값을 나눠 가며 정렬한다.',
      complexity: '평균 O(n log n)',
      spaceComplexity: '평균 공간 O(log n)',
      badges: ['분할 정복', 'pivot 기반', '평균 성능 우수'],
      code: [
        'def quick_sort(arr, low, high):',
        '    if low >= high:',
        '        return',
        '    pivot = arr[high]',
        '    i = low',
        '    for j in range(low, high):',
        '        if arr[j] <= pivot:',
        '            arr[i], arr[j] = arr[j], arr[i]',
        '            i += 1',
        '    arr[i], arr[high] = arr[high], arr[i]',
        '    quick_sort(arr, low, i - 1)',
        '    quick_sort(arr, i + 1, high)',
      ],
      renderer: 'sorting-quick',
      legend: [
        { label: 'pivot', tone: 'key' },
        { label: '현재 비교', tone: 'highlight' },
        { label: '자리 확정', tone: 'good' },
      ],
      notes: [
        { title: '핵심 포인트', body: '퀵 정렬은 pivot 하나가 최종 위치를 찾아가는 과정으로 이해하면 쉽습니다.' },
        { title: '보기 좋은 포인트', body: 'i와 j 포인터가 각각 어떤 역할을 하는지 보세요. i는 "작은 값 구간의 끝"입니다.' },
        { title: '실수하기 쉬운 부분', body: '재귀 범위를 잘못 잡으면 무한 재귀나 누락 구간이 생깁니다.' },
      ],
      steps,
    });
  }

  function buildCountingSortScenario() {
    const input = [4, 2, 2, 8, 3, 3, 1];
    const maxValue = Math.max(...input);
    const count = new Array(maxValue + 1).fill(0);
    const output = [];
    const steps = [];

    function push(lines, title, summary, detail, currentInputIndex, currentCountValue, currentOutputValue) {
      steps.push(createStep({
        lines,
        title,
        summary,
        detail,
        metrics: [
          metric('입력 배열', fmtArray(input)),
          metric('count 배열', fmtArray(count)),
          metric('output 배열', fmtArray(output)),
          metric('현재 값', currentCountValue === null ? '없음' : currentCountValue),
        ],
        visual: {
          input: input.slice(),
          count: count.slice(),
          output: output.slice(),
          currentInputIndex,
          currentCountValue,
          currentOutputValue,
        },
      }));
    }

    push([1, 2, 3], 'count 배열 준비', `입력에서 최대값 ${maxValue}를 찾고 count 배열을 만듭니다.`, '계수 정렬은 값 자체를 인덱스로 사용하기 때문에 값의 범위를 먼저 알아야 합니다.', null, null, null);

    input.forEach((value, index) => {
      push([4, 5], `빈도 누적 전`, `입력 값 ${value}를 count 배열에 반영합니다.`, 'count[value]를 1 증가시켜 해당 값이 몇 번 나왔는지 기록합니다.', index, value, null);
      count[value] += 1;
      push([5], `빈도 누적 완료`, `count[${value}]가 ${count[value]}가 되었습니다.`, '같은 값이 여러 번 나오면 count가 그 횟수만큼 증가합니다.', index, value, null);
    });

    push([6], '출력 배열 준비', '이제 count 배열을 왼쪽부터 읽으면서 정렬된 결과를 만듭니다.', 'count 배열이 완성되면 실제 정렬 결과는 작은 값부터 빈도만큼 반복해서 출력하면 됩니다.', null, null, null);

    count.forEach((freq, value) => {
      if (freq === 0) {
        push([7], `값 ${value} 건너뜀`, `count[${value}]가 0이므로 output에 추가할 값이 없습니다.`, '빈도가 0인 값은 결과 배열에 등장하지 않습니다.', null, value, null);
        return;
      }

      push([7, 8], `값 ${value}를 ${freq}번 출력`, `count[${value}] = ${freq}이므로 ${value}를 ${freq}번 추가합니다.`, '이 단계에서 실제 정렬된 순서가 만들어집니다.', null, value, null);

      for (let repeat = 0; repeat < freq; repeat++) {
        output.push(value);
        push([9], `output에 ${value} 추가`, `${value}를 output 뒤에 붙였습니다.`, '작은 값부터 차례대로 추가하므로 output은 이미 정렬된 상태를 유지합니다.', null, value, value);
      }
    });

    push([10], '정렬 완료', 'output 배열이 최종 정렬 결과입니다.', '계수 정렬은 비교하지 않고 빈도를 세서 정렬한다는 점이 다른 비교 기반 정렬과 다릅니다.', null, null, null);

    return baseScenario({
      id: 'counting-sort',
      label: '계수 정렬',
      subtitle: '값의 빈도를 세어 정렬 결과를 바로 구성한다.',
      complexity: '시간 O(n + k)',
      spaceComplexity: '공간 O(k)',
      badges: ['비교하지 않음', '정수 범위 기반', '빈도 배열 사용'],
      code: [
        'def counting_sort(arr):',
        '    max_value = max(arr)',
        '    count = [0] * (max_value + 1)',
        '    for value in arr:',
        '        count[value] += 1',
        '    output = []',
        '    for value, freq in enumerate(count):',
        '        for _ in range(freq):',
        '            output.append(value)',
        '    return output',
      ],
      renderer: 'counting',
      legend: [
        { label: '현재 읽는 입력', tone: 'highlight' },
        { label: '현재 count 값', tone: 'key' },
        { label: '완성된 output', tone: 'good' },
      ],
      notes: [
        { title: '핵심 포인트', body: '계수 정렬은 비교가 아니라 "값이 몇 번 나왔는가"를 세는 방식입니다.' },
        { title: '보기 좋은 포인트', body: 'count 배열이 채워진 뒤 output이 작은 값부터 채워지는 흐름을 보세요.' },
        { title: '실수하기 쉬운 부분', body: '값 범위가 매우 클 때는 count 배열 메모리 사용량이 커질 수 있습니다.' },
      ],
      steps,
    });
  }


  function buildStackScenario() {
    const stack = [];
    const steps = [];

    function snapshot(lines, title, summary, detail, operation, focusValue = null) {
      steps.push(createStep({
        lines,
        title,
        summary,
        detail,
        metrics: [
          metric('자료구조', '스택 (LIFO)'),
          metric('현재 스택', fmtArray(stack)),
          metric('top', stack.length ? stack[stack.length - 1] : '없음'),
          metric('현재 동작', operation),
        ],
        visual: {
          structureType: 'stack',
          items: stack.slice(),
          operation,
          focusValue,
        },
      }));
    }

    snapshot([1], '스택 준비', '빈 스택으로 시작합니다.', '스택은 마지막에 넣은 값이 가장 먼저 나오는 LIFO 구조입니다.', 'init');

    stack.push(10);
    snapshot([2], 'push 10', '10을 스택 top에 올립니다.', 'push는 항상 스택의 맨 위(top)에서 일어납니다.', 'push', 10);

    stack.push(20);
    snapshot([3], 'push 20', '20을 다시 top에 올립니다.', '이제 가장 위 값은 20이고, 다음 pop도 20부터 일어납니다.', 'push', 20);

    snapshot([4], 'peek top', '현재 top 값을 확인합니다.', 'peek는 값을 꺼내지 않고, 맨 위 값이 무엇인지 보기만 합니다.', 'peek', stack[stack.length - 1]);

    stack.push(30);
    snapshot([5], 'push 30', '30을 top에 올립니다.', '새 값이 들어오면 그 값이 새로운 top이 됩니다.', 'push', 30);

    stack.push(40);
    snapshot([6], 'push 40', '40을 top에 올립니다.', 'top 쪽으로 값이 계속 쌓이는 모습에 주목해 보세요.', 'push', 40);

    const popped1 = stack.pop();
    snapshot([7], 'pop', `${popped1}을 top에서 꺼냅니다.`, 'pop도 항상 top에서만 일어납니다. 그래서 가장 최근 값이 먼저 빠집니다.', 'pop', popped1);

    stack.push(50);
    snapshot([8], 'push 50', '50을 top에 올립니다.', '값 개수가 늘어나도 연산 위치는 항상 top 한 곳뿐입니다.', 'push', 50);

    const popped2 = stack.pop();
    snapshot([9], 'pop 50', `${popped2}을 다시 top에서 꺼냅니다.`, '스택은 가장 나중에 들어간 50이 가장 먼저 빠집니다.', 'pop', popped2);

    const popped3 = stack.pop();
    snapshot([10], '마지막 pop', `${popped3}을 이어서 꺼냅니다.`, '맨 위부터 차례대로 빠지므로 30보다 40이 먼저 나옵니다.', 'pop', popped3);

    return baseScenario({
      id: 'stack-basic',
      label: '스택',
      subtitle: 'push와 pop이 모두 top 한쪽에서만 일어나는 LIFO 구조',
      complexity: '연산 O(1)',
      spaceComplexity: '공간 O(n)',
      badges: ['LIFO', 'top 중심', '한쪽 끝 연산'],
      code: [
        'stack = []',
        'stack.append(10)',
        'stack.append(20)',
        'top = stack[-1]',
        'stack.append(30)',
        'stack.append(40)',
        'popped = stack.pop()',
        'stack.append(50)',
        'popped = stack.pop()',
        'popped = stack.pop()',
      ],
      renderer: 'linear-structure',
      legend: [
        { label: '현재 동작 위치(top)', tone: 'highlight' },
        { label: '방금 들어오거나 나간 값', tone: 'warn' },
        { label: '스택 내부 값', tone: 'good' },
      ],
      notes: [
        { title: '핵심 포인트', body: '스택은 top 한쪽에서만 값이 들어오고 나갑니다.' },
        { title: '보기 좋은 포인트', body: '위에 쌓인 값이 먼저 빠진다는 점만 확실히 잡으면 됩니다.' },
        { title: '실수하기 쉬운 부분', body: 'peek와 pop을 헷갈리기 쉽습니다. peek는 보기만 하고, pop은 실제로 꺼냅니다.' },
      ],
      steps,
    });
  }

  function buildQueueScenario() {
    const queue = [];
    const steps = [];

    function snapshot(lines, title, summary, detail, operation, focusValue = null) {
      steps.push(createStep({
        lines,
        title,
        summary,
        detail,
        metrics: [
          metric('자료구조', '큐 (FIFO)'),
          metric('현재 큐', fmtArray(queue)),
          metric('front', queue.length ? queue[0] : '없음'),
          metric('rear', queue.length ? queue[queue.length - 1] : '없음'),
          metric('현재 동작', operation),
        ],
        visual: {
          structureType: 'queue',
          items: queue.slice(),
          operation,
          focusValue,
        },
      }));
    }

    snapshot([1, 2], '큐 준비', '빈 큐로 시작합니다.', '큐는 먼저 들어온 값이 먼저 나오는 FIFO 구조입니다.', 'init');

    queue.push(10);
    snapshot([3], 'enqueue 10', '10을 큐의 뒤(rear)에 넣습니다.', 'enqueue는 항상 rear에서 일어납니다.', 'enqueue', 10);

    queue.push(20);
    snapshot([4], 'enqueue 20', '20도 rear에 넣습니다.', '먼저 들어온 10은 여전히 front에 남아 있습니다.', 'enqueue', 20);

    snapshot([5], 'peek front', 'front 값을 확인합니다.', '큐에서 다음에 나갈 값은 항상 front에 있습니다.', 'peek', queue[0]);

    const firstOut = queue.shift();
    snapshot([6], 'dequeue', `${firstOut}을 front에서 꺼냅니다.`, 'dequeue는 항상 앞(front)에서 일어납니다.', 'dequeue', firstOut);

    queue.push(30);
    snapshot([7], 'enqueue 30', '30을 rear에 넣습니다.', '새 값은 뒤에 서고, 앞쪽 값이 먼저 처리됩니다.', 'enqueue', 30);

    queue.push(40);
    snapshot([8], 'enqueue 40', '40을 rear에 넣습니다.', '줄 서는 구조라고 생각하면 이해가 쉽습니다.', 'enqueue', 40);

    queue.push(50);
    snapshot([9], 'enqueue 50', '50도 rear에 넣습니다.', '원소 수가 늘어나도 먼저 들어온 값은 front에서 차례대로 빠져나갑니다.', 'enqueue', 50);

    const secondOut = queue.shift();
    snapshot([10], 'dequeue', `${secondOut}을 다시 front에서 꺼냅니다.`, '큐는 먼저 들어온 값이 먼저 나가는 구조를 유지합니다.', 'dequeue', secondOut);

    const thirdOut = queue.shift();
    snapshot([11], '마지막 dequeue', `${thirdOut}을 이어서 front에서 꺼냅니다.`, '10이 나간 뒤에는 20, 그다음 30처럼 들어온 순서대로 처리됩니다.', 'dequeue', thirdOut);

    return baseScenario({
      id: 'queue-basic',
      label: '큐',
      subtitle: 'enqueue는 rear에서, dequeue는 front에서 일어나는 FIFO 구조',
      complexity: '연산 O(1)',
      spaceComplexity: '공간 O(n)',
      badges: ['FIFO', 'front / rear', '줄 서기 구조'],
      code: [
        'from collections import deque',
        'queue = deque()',
        'queue.append(10)',
        'queue.append(20)',
        'front = queue[0]',
        'popped = queue.popleft()',
        'queue.append(30)',
        'queue.append(40)',
        'queue.append(50)',
        'popped = queue.popleft()',
        'popped = queue.popleft()',
      ],
      renderer: 'linear-structure',
      legend: [
        { label: 'front (나가는 쪽)', tone: 'highlight' },
        { label: 'rear (들어오는 쪽)', tone: 'warn' },
        { label: '큐 내부 값', tone: 'good' },
      ],
      notes: [
        { title: '핵심 포인트', body: '큐는 앞에서 나가고 뒤로 들어오는 구조입니다.' },
        { title: '보기 좋은 포인트', body: 'front와 rear가 서로 반대쪽에 있다는 점을 눈으로 익히면 됩니다.' },
        { title: '실수하기 쉬운 부분', body: 'append와 popleft의 방향을 반대로 기억하면 BFS 같은 알고리즘도 함께 헷갈리게 됩니다.' },
      ],
      steps,
    });
  }

  function buildDfsScenario() {
    const graph = GRAPH_DATA.adjacency;
    const steps = [];
    const stack = ['A'];
    const discovered = new Set(['A']);
    const order = [];
    const parent = { A: null };

    function getPath(node) {
      if (!node) return [];
      const path = [];
      let cursor = node;
      while (cursor) {
        path.push(cursor);
        cursor = parent[cursor] || null;
      }
      return path.reverse();
    }

    function push(lines, title, summary, detail, current, neighbor, extra = {}) {
      const currentPath = extra.path || getPath(current);
      const metrics = [
        metric('스택', fmtArray(stack)),
        metric('방문 순서', order.join(' → ') || '아직 없음'),
      ];
      if (!extra.hideVisitedMetric && !extra.hideVisitedByDefault) {
        metrics.splice(1, 0, metric('발견 집합', Array.from(discovered).join(', ') || '비어 있음'));
      }
      if (!extra.hidePathMetric && !extra.hidePathByDefault) {
        metrics.push(metric('탐색 경로', currentPath.join(' → ') || '아직 없음'));
      }
      steps.push(createStep({
        lines,
        title,
        summary,
        detail,
        metrics,
        visual: {
          graph: GRAPH_DATA,
          structureType: 'stack',
          structure: stack.slice(),
          visited: Array.from(discovered),
          visitedLabel: '발견 집합',
          order: order.slice(),
          path: currentPath,
          hideVisitedPanel: extra.hideVisitedPanel !== undefined ? Boolean(extra.hideVisitedPanel) : true,
          hidePathPanel: extra.hidePathPanel !== undefined ? Boolean(extra.hidePathPanel) : true,
          current,
          neighbor,
          backtracking: Boolean(extra.backtracking),
          neighborLabel: extra.neighborLabel || '다음',
          currentLabel: extra.currentLabel || '현재',
        },
      }));
    }

    push([1, 2], 'DFS 시작', '시작 노드 A를 스택에 넣습니다.', 'DFS는 스택에 새 노드를 넣고, 스택 TOP부터 다음 순서를 이어서 확인합니다.', 'A', null, { currentLabel: '시작', hideVisitedByDefault: true, hidePathByDefault: true });

    while (stack.length) {
      const node = stack.pop();
      const currentPath = getPath(node);
      push([3, 4], '스택에서 꺼내기', `스택에서 ${node}를 꺼내 현재 처리할 노드로 잡습니다.`, 'DFS는 가장 나중에 들어간 노드를 먼저 꺼내므로 한 갈래를 깊게 따라갑니다.', node, null, { path: currentPath, hideVisitedByDefault: true, hidePathByDefault: true });
      order.push(node);
      push([5], '방문 순서 기록', `${node}를 방문 순서에 추가했습니다.`, '방문 순서는 실제로 pop되어 처리된 순서입니다.', node, null, { path: currentPath, hideVisitedByDefault: true, hidePathByDefault: true });

      const neighbors = graph[node].slice().reverse();
      let foundNewNeighbor = false;
      neighbors.forEach((nextNode) => {
        push([6, 7], '인접 노드 확인', `${node}와 연결된 ${nextNode}를 확인합니다.`, '화면에서는 왼쪽부터 보이도록 reversed 순서로 확인합니다.', node, nextNode, { path: currentPath, neighborLabel: '확인 중', hideVisitedByDefault: true, hidePathByDefault: true });
        if (!discovered.has(nextNode)) {
          discovered.add(nextNode);
          parent[nextNode] = node;
          stack.push(nextNode);
          foundNewNeighbor = true;
          push([8, 9], '새 노드 발견', `${nextNode}를 처음 발견해 스택에 넣었습니다.`, '새 후보를 스택에 넣으면 DFS는 가장 위에 있는 노드부터 이어서 확인합니다.', node, nextNode, { path: currentPath, neighborLabel: '새로 발견', hideVisitedByDefault: true, hidePathByDefault: true });
        }
      });

      if (stack.length) {
        const nextCandidate = stack[stack.length - 1];
        if (foundNewNeighbor) {
          push([3, 4], '더 깊이 이동', `${node}에서 새로 발견한 갈래를 따라 다음에는 ${nextCandidate}를 꺼내 봅니다.`, 'DFS는 스택 top에 있는 가장 최근 후보를 먼저 처리하면서 더 깊이 내려갑니다.', node, nextCandidate, { path: currentPath, neighborLabel: '다음 후보', hideVisitedByDefault: true, hidePathByDefault: true });
        } else {
          push(
            [3, 4],
            '백트래킹',
            `모든 방문을 마쳤으므로 스택의 top에 있는 ${nextCandidate}노드로 갑니다.`,
            '노란 노드는 지금 스택에서 꺼내 처리하는 노드입니다. 화살표로 가리키는 노드 즉 스택 TOP이 실제 다음 차례입니다.',
            node,
            nextCandidate,
            {
              path: currentPath,
              backtracking: true,
              neighborLabel: '스택 TOP',
              hideVisitedByDefault: true,
              hidePathByDefault: true,
            },
          );
        }
      }
    }

    steps.push(createStep({
      lines: [10],
      title: 'DFS 종료',
      summary: '스택이 비어 탐색이 끝났습니다.',
      detail: '더 이상 확인할 후보가 없어 DFS가 종료되었습니다.',
      metrics: [
        metric('스택', '비어 있음'),
        metric('방문 순서', order.join(' → ')),
        metric('탐색 종료', '완료'),
      ],
      visual: {
        graph: GRAPH_DATA,
        structureType: 'stack',
        structure: [],
        visited: Array.from(discovered),
        visitedLabel: '발견 집합',
        order: order.slice(),
        path: [],
        hideVisitedPanel: true,
        hidePathPanel: true,
        current: null,
        neighbor: null,
        backtracking: false,
        neighborLabel: '다음',
        currentLabel: '현재',
      },
    }));

    return baseScenario({
      id: 'dfs',
      label: '깊이 우선 탐색',
      subtitle: '스택을 사용해 한 갈래를 끝까지 내려간 뒤 되돌아온다.',
      complexity: '시간 O(V + E)',
      spaceComplexity: '공간 O(V)',
      badges: ['스택 기반', '한 갈래 우선', '방문 기록 중요'],
      code: [
        'def dfs(graph, start):',
        '    stack = [start]; visited = {start}; order = []',
        '    while stack:',
        '        node = stack.pop()',
        '        order.append(node)',
        '        for neighbor in reversed(graph[node]):',
        '            if neighbor not in visited:',
        '                visited.add(neighbor)',
        '                stack.append(neighbor)',
        '    return order',
      ],
      renderer: 'graph',
      legend: [
        { label: '현재 노드', tone: 'highlight' },
        { label: '스택에 들어간 노드', tone: 'range' },
        { label: '처리 완료 노드', tone: 'good' },
      ],
      notes: [
        { title: '핵심 포인트', body: 'DFS는 가장 최근에 발견한 노드를 먼저 처리하는 구조입니다. 그래서 스택이 자연스럽게 맞습니다.' },
        { title: '보기 좋은 포인트', body: '스택의 top이 바뀔 때 실제 방문 순서가 어떻게 깊게 내려가는지 보세요.' },
        { title: '실수하기 쉬운 부분', body: '방문 체크를 빼먹으면 사이클이 있는 그래프에서 무한 반복으로 이어질 수 있습니다.' },
      ],
      steps,
    });
  }

  function buildBfsScenario() {
    const graph = GRAPH_DATA.adjacency;
    const steps = [];
    const queue = ['A'];
    const visited = new Set(['A']);
    const order = [];

    function push(lines, title, summary, detail, current, neighbor) {
      steps.push(createStep({
        lines,
        title,
        summary,
        detail,
        metrics: [
          metric('큐', fmtArray(queue)),
          metric('방문 집합', Array.from(visited).join(', ') || '비어 있음'),
          metric('방문 순서', order.join(' → ') || '아직 없음'),
          metric('현재 노드', current || '없음'),
        ],
        visual: {
          graph: GRAPH_DATA,
          structureType: 'queue',
          structure: queue.slice(),
          visited: Array.from(visited),
          order: order.slice(),
          current,
          neighbor,
        },
      }));
    }

    push([1, 2], 'BFS 시작', '시작 노드 A를 큐에 넣고 방문 처리합니다.', 'BFS는 먼저 발견한 노드를 먼저 처리하므로 큐를 사용합니다.', null, null);

    while (queue.length) {
      const node = queue.shift();
      push([3, 4], '큐에서 꺼내기', `큐의 맨 앞에서 ${node}를 꺼냈습니다.`, 'BFS는 먼저 들어간 노드를 먼저 처리해서 가까운 레벨부터 탐색합니다.', node, null);
      order.push(node);
      push([5], '방문 순서 기록', `${node}를 방문 순서에 추가했습니다.`, '현재 레벨의 노드를 처리하는 시점입니다.', node, null);

      graph[node].forEach((nextNode) => {
        push([6, 7], '인접 노드 확인', `${node}와 연결된 ${nextNode}를 확인합니다.`, '인접한 노드들을 차례대로 큐 뒤에 넣으면 레벨 순서가 유지됩니다.', node, nextNode);
        if (!visited.has(nextNode)) {
          visited.add(nextNode);
          queue.push(nextNode);
          push([8, 9], '큐에 enqueue', `${nextNode}를 방문 처리하고 큐 뒤에 넣었습니다.`, '먼저 들어간 노드가 먼저 나오므로 가까운 거리의 노드를 먼저 모두 처리하게 됩니다.', node, nextNode);
        } else {
          push([7], '이미 방문됨', `${nextNode}는 이미 방문 집합에 있으므로 다시 넣지 않습니다.`, 'BFS도 방문 기록이 없으면 같은 노드를 여러 번 큐에 넣게 됩니다.', node, nextNode);
        }
      });
    }

    steps.push(createStep({
      lines: [10],
      title: 'BFS 종료',
      summary: '큐가 비어 탐색이 끝났습니다.',
      detail: 'BFS는 시작점에서 가까운 순서대로 레벨을 확장해 나갑니다.',
      metrics: [
        metric('큐', '비어 있음'),
        metric('방문 집합', Array.from(visited).join(', ')),
        metric('방문 순서', order.join(' → ')),
        metric('탐색 종료', '완료'),
      ],
      visual: {
        graph: GRAPH_DATA,
        structureType: 'queue',
        structure: [],
        visited: Array.from(visited),
        order: order.slice(),
        current: null,
        neighbor: null,
      },
    }));

    return baseScenario({
      id: 'bfs',
      label: '너비 우선 탐색',
      subtitle: '큐를 사용해 가까운 노드부터 차례대로 탐색한다.',
      complexity: '시간 O(V + E)',
      spaceComplexity: '공간 O(V)',
      badges: ['큐 기반', '레벨 순회', '최단 거리 탐색 기반'],
      code: [
        'from collections import deque',
        'def bfs(graph, start):',
        '    queue = deque([start]); visited = {start}; order = []',
        '    while queue:',
        '        node = queue.popleft()',
        '        order.append(node)',
        '        for neighbor in graph[node]:',
        '            if neighbor not in visited:',
        '                visited.add(neighbor)',
        '                queue.append(neighbor)',
        '    return order',
      ],
      renderer: 'graph',
      legend: [
        { label: '현재 노드', tone: 'highlight' },
        { label: '큐에 들어간 노드', tone: 'range' },
        { label: '처리 완료 노드', tone: 'good' },
      ],
      notes: [
        { title: '핵심 포인트', body: 'BFS는 "가까운 것부터 처리한다"는 규칙 하나로 이해하면 됩니다. 큐가 그 규칙을 보장합니다.' },
        { title: '보기 좋은 포인트', body: '큐의 앞쪽에서 빠지고 뒤쪽으로 들어가는 흐름을 보세요.' },
        { title: '실수하기 쉬운 부분', body: 'BFS도 방문 체크 시점을 잘못 잡으면 같은 노드가 큐에 여러 번 들어갈 수 있습니다.' },
      ],
      steps,
    });
  }


  function buildBstSearchScenario() {
    const steps = [];
    const target = 7;
    let current = BST_DATA.root;
    const path = [];

    const makeMetrics = (currentNode, direction, nextNode) => [
      metric('목표 값', target),
      metric('현재 노드', currentNode || '없음'),
      metric('탐색 경로', path.join(' → ') || '아직 없음'),
      metric('다음 이동', direction ? `${direction} → ${nextNode || '없음'}` : '비교 중'),
    ];

    while (current !== null) {
      const value = Number(current);
      path.push(current);

      steps.push(createStep({
        lines: [3, 4],
        title: `현재 노드 ${current} 확인`,
        summary: `현재 노드 ${current}에서 목표 ${target}를 비교합니다.`,
        detail: 'BST 탐색은 현재 값과 목표 값을 비교해 다음에 내려갈 방향을 정합니다.',
        metrics: makeMetrics(current, null, null),
        visual: {
          tree: BST_DATA,
          current,
          path: path.slice(),
          found: value === target ? current : null,
          target,
          edge: null,
        },
      }));

      if (value === target) {
        steps.push(createStep({
          lines: [5],
          title: '목표 값 발견',
          summary: `현재 노드 ${current}가 목표 ${target}와 같으므로 탐색을 끝냅니다.`,
          detail: '비교 결과가 일치하면 더 내려갈 필요 없이 바로 성공입니다.',
          metrics: [
            metric('목표 값', target),
            metric('현재 노드', current),
            metric('탐색 경로', path.join(' → ')),
            metric('결과', '탐색 성공'),
          ],
          visual: {
            tree: BST_DATA,
            current,
            path: path.slice(),
            found: current,
            target,
            edge: null,
          },
        }));
        break;
      }

      if (target < value) {
        const nextNode = BST_DATA.nodes[current].left;
        steps.push(createStep({
          lines: [6, 7],
          title: '왼쪽으로 이동',
          summary: `목표 ${target}가 ${value}보다 작아서 왼쪽 자식으로 갑니다.`,
          detail: 'BST에서는 더 작은 값이 왼쪽에 있으므로, 현재 위치에서 왼쪽 가지 하나만 보면 됩니다.',
          metrics: makeMetrics(current, '왼쪽', nextNode),
          visual: {
            tree: BST_DATA,
            current,
            path: path.slice(),
            target,
            edge: [current, nextNode],
          },
        }));
        current = nextNode;
      } else {
        const nextNode = BST_DATA.nodes[current].right;
        steps.push(createStep({
          lines: [8, 9],
          title: '오른쪽으로 이동',
          summary: `목표 ${target}가 ${value}보다 커서 오른쪽 자식으로 갑니다.`,
          detail: 'BST에서는 더 큰 값이 오른쪽에 있으므로, 필요한 방향으로만 내려갑니다.',
          metrics: makeMetrics(current, '오른쪽', nextNode),
          visual: {
            tree: BST_DATA,
            current,
            path: path.slice(),
            target,
            edge: [current, nextNode],
          },
        }));
        current = nextNode;
      }
    }

    return baseScenario({
      id: 'bst-search',
      label: 'BST 탐색',
      subtitle: '현재 값과 목표 값을 비교해 왼쪽 또는 오른쪽으로 내려간다.',
      complexity: '평균 O(log n)',
      spaceComplexity: '공간 O(1)',
      badges: ['이진 탐색 트리', '비교로 방향 결정', '불필요한 가지 생략'],
      code: [
        'def bst_search(node, target):',
        '    current = node',
        '    while current is not None:',
        '        if current.value == target:',
        '            return current',
        '        if target < current.value:',
        '            current = current.left',
        '        else:',
        '            current = current.right',
        '    return None',
      ],
      renderer: 'tree-search',
      legend: [
        { label: '현재 노드', tone: 'highlight' },
        { label: '지나온 경로', tone: 'range' },
        { label: '다음 이동 화살표', tone: 'warn' },
        { label: '찾은 노드', tone: 'good' },
      ],
      notes: [
        { title: '핵심 포인트', body: 'BST는 비교 한 번으로 다음에 볼 서브트리를 하나로 줄입니다.' },
        { title: '보기 좋은 포인트', body: '현재 노드와 다음 이동 화살표를 같이 보면, 왜 반대쪽 가지를 안 보는지 감이 잡힙니다.' },
        { title: '실수하기 쉬운 부분', body: '비교 결과에 따라 왼쪽과 오른쪽을 정확히 구분해야 합니다. 조건을 반대로 쓰면 탐색이 바로 어긋납니다.' },
      ],
      steps,
    });
  }
  function buildTraversalScenario(type) {
    const labels = {
      preorder: '전위 순회',
      inorder: '중위 순회',
      postorder: '후위 순회',
    };

    const subtitles = {
      preorder: '현재 노드를 먼저 방문한 뒤 왼쪽, 오른쪽으로 내려간다.',
      inorder: '왼쪽을 먼저 보고, 현재 노드를 방문한 뒤 오른쪽으로 간다.',
      postorder: '왼쪽과 오른쪽을 모두 처리한 뒤 현재 노드를 방문한다.',
    };

    const codeByType = {
      preorder: [
        'def preorder(node):',
        '    if node is None:',
        '        return',
        '    visit(node)',
        '    preorder(node.left)',
        '    preorder(node.right)',
      ],
      inorder: [
        'def inorder(node):',
        '    if node is None:',
        '        return',
        '    inorder(node.left)',
        '    visit(node)',
        '    inorder(node.right)',
      ],
      postorder: [
        'def postorder(node):',
        '    if node is None:',
        '        return',
        '    postorder(node.left)',
        '    postorder(node.right)',
        '    visit(node)',
      ],
    };

    const steps = [];
    const visitedOrder = [];
    const callStack = [];

    function push(lines, title, summary, detail, current, action, edge) {
      steps.push(createStep({
        lines,
        title,
        summary,
        detail,
        metrics: [
          metric('현재 노드', current || 'None'),
          metric('호출 스택', callStack.length ? callStack.join(' → ') : '비어 있음'),
          metric('방문 순서', visitedOrder.join(' → ') || '아직 없음'),
          metric('현재 액션', action),
        ],
        visual: {
          tree: TRAVERSAL_TREE,
          current,
          callStack: callStack.slice(),
          visitedOrder: visitedOrder.slice(),
          edge,
        },
      }));
    }

    function traverse(nodeId) {
      push([1], '함수 진입', `${nodeId || 'None'}에 대한 ${labels[type]} 함수를 호출했습니다.`, '재귀는 같은 함수를 더 작은 문제에 다시 적용하는 방식입니다.', nodeId, 'call', null);

      if (nodeId === null) {
        push([2, 3], '기저 사례', 'node가 None이므로 바로 반환합니다.', '리프 노드 아래에서 재귀가 멈추는 지점입니다.', nodeId, 'return', null);
        return;
      }

      callStack.push(nodeId);
      const node = TRAVERSAL_TREE.nodes[nodeId];

      if (type === 'preorder') {
        visitedOrder.push(nodeId);
        push([4], '현재 노드 방문', `${nodeId}를 먼저 방문합니다.`, '전위 순회는 현재 노드를 가장 먼저 처리합니다.', nodeId, 'visit', null);
      }

      push([type === 'preorder' ? 5 : 4], '왼쪽 서브트리 호출', `${nodeId}의 왼쪽 자식으로 내려갑니다.`, '왼쪽 가지를 먼저 처리하는 흐름입니다.', nodeId, 'left', [nodeId, node.left]);
      traverse(node.left);

      if (type === 'inorder') {
        visitedOrder.push(nodeId);
        push([5], '현재 노드 방문', `${nodeId}를 왼쪽 처리 후 방문합니다.`, '중위 순회는 "왼쪽 - 현재 - 오른쪽" 순서를 가집니다.', nodeId, 'visit', null);
      }

      push([type === 'postorder' ? 5 : 6], '오른쪽 서브트리 호출', `${nodeId}의 오른쪽 자식으로 내려갑니다.`, '오른쪽 가지를 처리하는 단계입니다.', nodeId, 'right', [nodeId, node.right]);
      traverse(node.right);

      if (type === 'postorder') {
        visitedOrder.push(nodeId);
        push([6], '현재 노드 방문', `${nodeId}를 마지막에 방문합니다.`, '후위 순회는 자식 처리가 모두 끝난 뒤 현재 노드를 방문합니다.', nodeId, 'visit', null);
      }

      push([1], '호출 종료', `${nodeId} 처리가 끝나 상위 호출로 돌아갑니다.`, '재귀 함수는 현재 프레임 작업이 끝나면 한 단계 위 호출로 되돌아갑니다.', nodeId, 'return', null);
      callStack.pop();
    }

    traverse(TRAVERSAL_TREE.root);

    return baseScenario({
      id: `${type}`,
      label: labels[type],
      subtitle: subtitles[type],
      complexity: '시간 O(n)',
      spaceComplexity: '공간 O(h)',
      badges: ['재귀 기반', '방문 시점 차이', '같은 트리 다른 결과'],
      code: codeByType[type],
      renderer: 'tree-traversal',
      legend: [
        { label: '현재 노드', tone: 'highlight' },
        { label: '호출 스택에 있는 노드', tone: 'range' },
        { label: '방문 완료 노드', tone: 'good' },
      ],
      notes: [
        { title: '핵심 포인트', body: '트리 순회는 "언제 visit을 호출하느냐" 하나로 구분됩니다.' },
        { title: '보기 좋은 포인트', body: '같은 트리를 같은 경로로 내려가도 방문 순서가 어떻게 달라지는지 확인해 보세요.' },
        { title: '실수하기 쉬운 부분', body: '전위/중위/후위는 이동 순서가 아니라 visit 호출 시점이 다릅니다.' },
      ],
      steps,
    });
  }


  function buildSubsetSumPruningScenario() {
    const nums = [3, 4, 5, 6];
    const target = 9;
    const suffix = Array(nums.length + 1).fill(0);
    for (let i = nums.length - 1; i >= 0; i--) {
      suffix[i] = suffix[i + 1] + nums[i];
    }

    let nodeCounter = 0;
    const root = {
      id: `subset-${nodeCounter}`,
      label: '0',
      meta: { idx: 0, sum: 0, path: [], decision: 'start' },
      left: null,
      right: null,
    };
    const nodeMap = { [root.id]: root };
    const stateMap = {
      [root.id]: { status: 'idle', note: 'start' },
    };
    const draftSteps = [];
    const callStack = [];
    const nodePath = [];

    function currentMeta(currentNodeId) {
      return currentNodeId ? nodeMap[currentNodeId].meta : { idx: null, sum: null, path: [] };
    }

    function push(lines, title, summary, detail, currentNodeId, edge) {
      const meta = currentMeta(currentNodeId);
      const remaining = meta.idx === null || meta.idx >= nums.length ? 0 : suffix[meta.idx];
      draftSteps.push({
        lines,
        title,
        summary,
        detail,
        metrics: [
          metric('현재 합', meta.sum === null ? '없음' : meta.sum),
          metric('다음 인덱스', meta.idx === null ? '없음' : meta.idx),
          metric('선택한 수', meta.path && meta.path.length ? meta.path.join(' + ') : '없음'),
          metric('남은 최대 합', remaining),
        ],
        visual: {
          nodeStates: deepClone(stateMap),
          currentNodeId,
          callStack: callStack.slice(),
          nodePath: nodePath.slice(),
          edge,
          visibleNodeIds: Object.keys(nodeMap),
          target,
          nums: nums.slice(),
        },
      });
    }

    function createNode(idx, sum, path, decision) {
      nodeCounter += 1;
      const node = {
        id: `subset-${nodeCounter}`,
        label: String(sum),
        meta: { idx, sum, path, decision },
        left: null,
        right: null,
      };
      nodeMap[node.id] = node;
      stateMap[node.id] = { status: 'idle', note: decision };
      return node;
    }

    function search(node) {
      const { idx, sum, path } = node.meta;
      callStack.push(`i=${idx}, sum=${sum}`);
      nodePath.push(node.id);
      stateMap[node.id].status = 'current';
      push([1], '상태 진입', `현재 합 ${sum}에서 목표 ${target}를 만들 수 있는지 봅니다.`, '가지치기 전에는 항상 현재 상태가 정답인지, 더 내려갈 가치가 있는지부터 확인합니다.', node.id, null);

      if (sum === target) {
        stateMap[node.id] = { status: 'done', note: 'target' };
        push([2, 3], '해 발견', `현재 합 ${sum}이 목표 ${target}와 같아 더 내려가지 않습니다.`, '정답을 찾았으므로 이 아래 분기는 만들 필요가 없습니다.', node.id, null);
        callStack.pop();
        nodePath.pop();
        return true;
      }

      if (idx === nums.length) {
        stateMap[node.id] = { status: 'dead', note: 'leaf' };
        push([4], '리프 종료', '더 볼 숫자가 없어 현재 가지를 종료합니다.', '모든 수를 다 봤는데 목표 합을 만들지 못한 상태입니다.', node.id, null);
        callStack.pop();
        nodePath.pop();
        return false;
      }

      if (sum > target) {
        stateMap[node.id] = { status: 'pruned', note: 'sum > target' };
        push([5, 6], '합 초과 가지치기', `현재 합 ${sum}이 목표 ${target}를 넘었으므로 이 아래는 전부 잘라냅니다.`, '합이 이미 커졌기 때문에 이 상태에서 더 값을 더하면 절대 답이 될 수 없습니다.', node.id, null);
        callStack.pop();
        nodePath.pop();
        return false;
      }

      if (sum + suffix[idx] < target) {
        stateMap[node.id] = { status: 'pruned', note: 'bound prune' };
        push([7, 8], '상한 기반 가지치기', `남은 수를 모두 더해도 ${sum + suffix[idx]}라서 목표 ${target}에 못 미칩니다.`, '남은 최대 가능 합으로도 목표에 도달할 수 없으면 그 분기는 미리 끊어도 됩니다.', node.id, null);
        callStack.pop();
        nodePath.pop();
        return false;
      }

      const value = nums[idx];
      const includeNode = createNode(idx + 1, sum + value, [...path, value], `+${value}`);
      node.left = includeNode;
      push([9], `${value} 포함 분기`, `${value}를 포함하는 왼쪽 가지로 내려갑니다.`, '먼저 현재 숫자를 선택한 경우를 탐색합니다.', node.id, [node.id, includeNode.id]);

      if (search(includeNode)) {
        stateMap[node.id] = { status: 'done', note: 'success path' };
        push([10], '성공 경로 확정', '왼쪽 가지에서 답을 찾았으므로 현재 호출도 성공입니다.', '재귀 호출이 True를 반환하면 더 다른 분기를 볼 필요가 없습니다.', node.id, null);
        callStack.pop();
        nodePath.pop();
        return true;
      }

      stateMap[node.id].status = 'current';
      const excludeNode = createNode(idx + 1, sum, path.slice(), `skip ${value}`);
      node.right = excludeNode;
      push([11], `${value} 제외 분기`, `${value}를 제외하는 오른쪽 가지로 이동합니다.`, '포함 분기에서 답이 나오지 않았으므로, 이번에는 현재 숫자를 쓰지 않는 경우를 봅니다.', node.id, [node.id, excludeNode.id]);

      const found = search(excludeNode);
      stateMap[node.id] = { status: found ? 'done' : 'dead', note: found ? 'success path' : 'return' };
      push([12], found ? '성공 반환' : '실패 반환', found ? '아래 분기에서 답을 찾았으므로 현재 호출도 성공입니다.' : '포함/제외 두 분기 모두 실패했으므로 현재 상태를 종료합니다.', '이 단계에서 현재 상태의 최종 결과가 결정됩니다.', node.id, null);
      callStack.pop();
      nodePath.pop();
      return found;
    }

    search(root);
    const layout = layoutBinaryTree(root);

    const steps = draftSteps.map((draft) => createStep({
      lines: draft.lines,
      title: draft.title,
      summary: draft.summary,
      detail: draft.detail,
      metrics: draft.metrics,
      visual: {
        layout,
        nodeStates: draft.visual.nodeStates,
        currentNodeId: draft.visual.currentNodeId,
        callStack: draft.visual.callStack,
        nodePath: draft.visual.nodePath,
        edge: draft.visual.edge,
        visibleNodeIds: draft.visual.visibleNodeIds,
        target: draft.visual.target,
        nums: draft.visual.nums,
      },
    }));

    return baseScenario({
      id: 'subset-sum-pruning',
      label: '부분집합 합 가지치기',
      subtitle: '포함/제외 트리를 내려가되, 답이 될 수 없는 가지는 중간에 잘라낸다.',
      complexity: '최악 O(2^n)',
      spaceComplexity: '공간 O(n)',
      badges: ['백트래킹', '가지치기', '상한 검사'],
      code: [
        'def subset_sum(idx, current_sum):',
        '    if current_sum == target:',
        '        return True',
        '    if idx == len(nums):',
        '        return False',
        '    if current_sum > target:',
        '        return False',
        '    if current_sum + suffix[idx] < target:',
        '        return False',
        '    if subset_sum(idx + 1, current_sum + nums[idx]):',
        '        return True',
        '    return subset_sum(idx + 1, current_sum)',
      ],
      renderer: 'pruning-tree',
      legend: [
        { label: '현재 상태', tone: 'highlight' },
        { label: '다음 분기 화살표', tone: 'warn' },
        { label: '정답 경로', tone: 'good' },
        { label: '잘린 가지', tone: 'danger' },
      ],
      notes: [
        { title: '핵심 포인트', body: '가지치기는 "어차피 답이 될 수 없는 분기"를 미리 끊어서 탐색량을 줄이는 기법입니다.' },
        { title: '보기 좋은 포인트', body: '현재 합, 남은 최대 합, 잘린 가지를 같이 보면 왜 그 분기를 더 보지 않는지 바로 이해됩니다.' },
        { title: '실수하기 쉬운 부분', body: '가지치기 조건이 너무 강하면 정답까지 잘라버리고, 너무 약하면 탐색량이 크게 줄지 않습니다.' },
      ],
      steps,
    });
  }

  function buildNQueenScenario() {
    const n = 4;
    const board = Array(n).fill(-1);
    const steps = [];
    const callStack = [];

    function attackedCells(row, col) {
      const cells = [];
      for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
          const occupied = board[r] === c;
          const sameCol = board.some((queenCol, queenRow) => queenCol === c);
          const diag = board.some((queenCol, queenRow) => queenCol !== -1 && Math.abs(queenRow - r) === Math.abs(queenCol - c));
          if (!occupied && (sameCol || diag)) cells.push([r, c]);
        }
      }
      return cells;
    }

    function isSafe(row, col) {
      for (let prevRow = 0; prevRow < row; prevRow++) {
        const prevCol = board[prevRow];
        if (prevCol === col) return false;
        if (Math.abs(prevCol - col) === Math.abs(prevRow - row)) return false;
      }
      return true;
    }

    function formatRowStack() {
      return callStack.length ? callStack.map((stackRow) => `row ${stackRow}`).join(' → ') : '비어 있음';
    }

    function push(lines, title, summary, detail, row, col, safe, solutionFound) {
      steps.push(createStep({
        lines,
        title,
        summary,
        detail,
        metrics: [
          metric('현재 row', row === null ? '없음' : row),
          metric('현재 col', col === null ? '없음' : col),
          metric('배치 상태', board.map((queenCol, queenRow) => queenCol === -1 ? `r${queenRow}: -` : `r${queenRow}: c${queenCol}`).join('\n')),
          metric('호출 스택', formatRowStack()),
        ],
        visual: {
          size: n,
          queens: board.slice(),
          candidate: row === null || col === null ? null : [row, col],
          attacked: attackedCells(row, col),
          safe,
          solutionFound: !!solutionFound,
          stack: callStack.slice(),
        },
      }));
    }

    function solve(row) {
      callStack.push(row);
      push([1], '행 진입', `${row}번째 행에 퀸을 둘 위치를 찾습니다.`, '한 행에 퀸 하나만 두고, 충돌하면 다음 열을 시도하거나 이전 행으로 되돌아갑니다.', row, null, null, false);

      if (row === n) {
        push([2, 3], '해를 찾음', '모든 행에 퀸을 배치했으므로 해를 찾았습니다.', 'N-Queen은 보통 백트래킹 예제로 분류합니다. 여기서는 상태 변화 시각화 관점에서 포함했습니다.', row, null, true, true);
        callStack.pop();
        return true;
      }

      for (let col = 0; col < n; col++) {
        push([4], '열 선택', `${row}행 ${col}열을 후보로 봅니다.`, '현재 행에서 가능한 열을 왼쪽부터 순서대로 시도합니다.', row, col, null, false);

        const safe = isSafe(row, col);
        push([5], safe ? '충돌 없음' : '충돌 발생', safe ? '기존 퀸과 충돌하지 않는 자리입니다.' : '같은 열 또는 대각선 충돌이 있어 둘 수 없습니다.', '안전한 자리인지 확인할 때는 이전 행의 퀸들과 같은 열, 같은 대각선을 검사합니다.', row, col, safe, false);

        if (!safe) continue;

        board[row] = col;
        push([6], '퀸 배치', `${row}행 ${col}열에 퀸을 놓았습니다.`, '안전한 자리를 찾았으므로 현재 행 배치를 확정하고 다음 행으로 내려갑니다.', row, col, true, false);

        push([7], '다음 행 재귀 호출', `${row + 1}행을 채우기 위해 재귀 호출합니다.`, '이 한 단계가 상태 공간 탐색의 핵심입니다.', row, col, true, false);
        if (solve(row + 1)) {
          callStack.pop();
          return true;
        }

        board[row] = -1;
        push([9], '백트래킹', `${row}행 ${col}열 배치를 취소하고 다음 열을 시도합니다.`, '아래쪽에서 해를 찾지 못하면 이전 상태로 되돌아와 다른 선택지를 시도합니다.', row, col, false, false);
      }

      push([10], '현재 행 실패', `${row}행에서는 더 이상 시도할 열이 없습니다.`, '이 시점에서 상위 호출로 false를 반환하고, 그 상위 호출은 다른 열을 시도합니다.', row, null, false, false);
      callStack.pop();
      return false;
    }

    solve(0);

    return baseScenario({
      id: 'n-queen',
      label: 'N-Queen',
      subtitle: '한 행씩 내려가며 퀸을 배치하고, 막히면 되돌아가 다른 선택지를 시도한다.',
      complexity: '최악 O(n!)',
      spaceComplexity: '공간 O(n)',
      badges: ['백트래킹', '상태 공간 탐색', '재귀 기반'],
      code: [
        'def solve(row):',
        '    if row == n:',
        '        return True',
        '    for col in range(n):',
        '        if is_safe(row, col):',
        '            board[row] = col',
        '            if solve(row + 1):',
        '                return True',
        '            board[row] = -1',
        '    return False',
      ],
      renderer: 'nqueen',
      legend: [
        { label: '현재 후보 칸', tone: 'highlight' },
        { label: '배치된 퀸', tone: 'range' },
        { label: '안전한 칸/해', tone: 'good' },
      ],
      notes: [
        { title: '핵심 포인트', body: 'N-Queen은 한 선택이 막히면 이전 선택으로 되돌아가는 전형적인 백트래킹 패턴입니다.' },
        { title: '보기 좋은 포인트', body: '현재 후보 칸이 안전한지 확인한 뒤, 배치하고 재귀 호출한 다음 되돌아오는 흐름을 보세요.' },
        { title: '분류 메모', body: '요청에 맞춰 동적 계획법 섹션에 포함했지만, 일반적인 알고리즘 분류에서는 백트래킹 예제로 다룹니다.' },
      ],
      steps,
    });
  }

  function buildFactorialScenario() {
    const n = 4;
    const tree = buildFactorialTree(n);
    const steps = [];
    const stack = [];
    const stateMap = {};

    tree.nodes.forEach((node) => {
      stateMap[node.id] = { status: 'idle', result: null };
    });

    function snapshot(lines, title, summary, detail, currentNodeId, extraResult) {
      steps.push(createStep({
        lines,
        title,
        summary,
        detail,
        metrics: [
          metric('현재 호출 스택', stack.length ? stack.join(' → ') : '비어 있음'),
          metric('현재 프레임', currentNodeId || '없음'),
          metric('중간 결과', extraResult === undefined ? '없음' : extraResult),
          metric('기저 사례', 'n <= 1'),
        ],
        visual: {
          layout: tree,
          nodeStates: deepClone(stateMap),
          currentNodeId,
          callStack: stack.slice(),
          sequence: Array.from({ length: n }, (_, idx) => n - idx),
          baseCase: 'n <= 1 이면 1 반환',
          recurrence: 'n! = n × (n-1)!',
        },
      }));
    }

    function factorial(value) {
      const nodeId = `fact-${value}`;
      stack.push(`fact(${value})`);
      stateMap[nodeId].status = 'current';
      snapshot([1], '함수 호출', `factorial(${value})를 호출했습니다.`, '재귀는 현재 문제를 더 작은 같은 문제로 바꾸는 방식입니다.', nodeId);

      if (value <= 1) {
        stateMap[nodeId].status = 'done';
        stateMap[nodeId].result = 1;
        snapshot([2, 3], '기저 사례 도달', `factorial(${value})는 1을 반환합니다.`, '더 이상 내려갈 수 없는 최소 문제입니다.', nodeId, 1);
        stack.pop();
        return 1;
      }

      stateMap[nodeId].status = 'waiting';
      snapshot([4], '하위 호출 준비', `factorial(${value - 1}) 값을 먼저 구합니다.`, '현재 프레임은 하위 호출 결과를 기다리는 상태가 됩니다.', nodeId);

      const sub = factorial(value - 1);
      stateMap[nodeId].status = 'current';
      const result = value * sub;
      stateMap[nodeId].status = 'done';
      stateMap[nodeId].result = result;
      snapshot([5], '반환값 계산', `${value} * ${sub} = ${result}를 계산합니다.`, '재귀는 내려갈 때 문제를 쪼개고, 올라올 때 결과를 합칩니다.', nodeId, result);
      stack.pop();
      return result;
    }

    factorial(n);

    return baseScenario({
      id: 'factorial',
      label: '팩토리얼',
      subtitle: 'n! = n × (n-1)! 구조를 호출 스택으로 본다.',
      complexity: '시간 O(n)',
      spaceComplexity: '공간 O(n)',
      badges: ['재귀 입문', '호출 스택', '기저 사례'],
      code: [
        'def factorial(n):',
        '    if n <= 1:',
        '        return 1',
        '    sub = factorial(n - 1)',
        '    return n * sub',
      ],
      renderer: 'factorial-recursion',
      legend: [
        { label: '현재 실행 프레임', tone: 'highlight' },
        { label: '결과 대기 프레임', tone: 'range' },
        { label: '반환 완료 프레임', tone: 'good' },
      ],
      notes: [
        { title: '핵심 포인트', body: '팩토리얼은 재귀의 가장 기본적인 형태입니다. 호출이 내려갈 때와 올라올 때를 분리해서 보세요.' },
        { title: '보기 좋은 포인트', body: '하위 호출을 기다리는 프레임과 이미 값을 반환한 프레임이 어떻게 다른지 보세요.' },
        { title: '실수하기 쉬운 부분', body: '기저 사례가 없으면 호출이 끝나지 않고 무한히 내려갑니다.' },
      ],
      steps,
    });
  }

  function buildFibonacciScenario() {
    const n = 5;
    const treeLayout = buildFibTree(n);
    const steps = [];
    const stack = [];
    const stateMap = {};
    const nodeMeta = {};

    treeLayout.nodes.forEach((node) => {
      const match = /fib\((\d+)\)/.exec(node.label);
      nodeMeta[node.id] = { value: Number(match[1]) };
      stateMap[node.id] = { status: 'idle', result: null };
    });

    const childrenMap = {};
    treeLayout.edges.forEach(([parent, child]) => {
      if (!childrenMap[parent]) childrenMap[parent] = [];
      childrenMap[parent].push(child);
    });

    function snapshot(lines, title, summary, detail, currentNodeId, partial) {
      steps.push(createStep({
        lines,
        title,
        summary,
        detail,
        metrics: [
          metric('현재 호출 스택', stack.length ? stack.join(' → ') : '비어 있음'),
          metric('현재 프레임', currentNodeId ? treeLayout.nodes.find((node) => node.id === currentNodeId).label : '없음'),
          metric('부분 결과', partial === undefined ? '없음' : partial),
          metric('기저 사례', 'n <= 1'),
        ],
        visual: {
          layout: treeLayout,
          nodeStates: deepClone(stateMap),
          currentNodeId,
          callStack: stack.slice(),
          recursionKind: 'fibonacci',
          explanation: 'fib(n)은 n번째 피보나치 수입니다. 기저값은 fib(0)=0, fib(1)=1 이고, 그 이후는 fib(n-1)+fib(n-2)로 만듭니다.',
        },
      }));
    }

    function evaluate(nodeId) {
      const value = nodeMeta[nodeId].value;
      stack.push(`fib(${value})`);
      stateMap[nodeId].status = 'current';
      snapshot([1], '함수 호출', `fib(${value})를 호출했습니다.`, '피보나치는 동일한 하위 문제가 반복해서 등장하는 대표적인 재귀 예제입니다.', nodeId);

      if (value <= 1) {
        stateMap[nodeId].status = 'done';
        stateMap[nodeId].result = value;
        snapshot([2, 3], '기저 사례 도달', `fib(${value})는 ${value}를 반환합니다.`, '0과 1은 더 이상 쪼개지지 않는 기본값입니다.', nodeId, value);
        stack.pop();
        return value;
      }

      stateMap[nodeId].status = 'split';
      snapshot([4], '왼쪽 하위 호출', `fib(${value - 1})를 먼저 계산합니다.`, '재귀 트리가 왼쪽으로 먼저 확장됩니다.', nodeId);
      const [leftChild, rightChild] = childrenMap[nodeId];
      const leftValue = evaluate(leftChild);

      stateMap[nodeId].status = 'split';
      snapshot([5], '오른쪽 하위 호출', `fib(${value - 2})를 이어서 계산합니다.`, '첫 번째 하위 호출이 끝난 뒤 두 번째 하위 호출로 이동합니다.', nodeId, leftValue);
      const rightValue = evaluate(rightChild);

      const result = leftValue + rightValue;
      stateMap[nodeId].status = 'done';
      stateMap[nodeId].result = result;
      snapshot([6], '반환값 계산', `${leftValue} + ${rightValue} = ${result}를 반환합니다.`, '피보나치는 두 하위 호출 결과를 더해 현재 결과를 만듭니다.', nodeId, result);
      stack.pop();
      return result;
    }

    evaluate(treeLayout.nodes[0].id);

    return baseScenario({
      id: 'fibonacci',
      label: '피보나치',
      subtitle: '두 하위 호출이 갈라지는 재귀 트리를 따라간다.',
      complexity: '시간 O(2^n)',
      spaceComplexity: '공간 O(n)',
      badges: ['분기 재귀', '중복 호출', '재귀 트리'],
      code: [
        'def fib(n):',
        '    if n <= 1:',
        '        return n',
        '    left = fib(n - 1)',
        '    right = fib(n - 2)',
        '    return left + right',
      ],
      renderer: 'recursion',
      legend: [
        { label: '현재 실행 프레임', tone: 'highlight' },
        { label: '분기 중인 프레임', tone: 'range' },
        { label: '반환 완료 프레임', tone: 'good' },
      ],
      notes: [
        { title: '핵심 포인트', body: '피보나치는 호출이 두 갈래로 갈라진다는 점 때문에 호출 수가 급격히 늘어납니다.' },
        { title: '보기 좋은 포인트', body: '같은 형태의 하위 문제가 여러 번 등장하는지 재귀 트리에서 확인해 보세요.' },
        { title: '실수하기 쉬운 부분', body: '단순 재귀 구현은 중복 계산이 많아 비효율적입니다. 메모이제이션과 대비해서 보는 데도 좋습니다.' },
      ],
      steps,
    });
  }

  function buildCombinationScenario() {
    const treeLayout = buildCombTree(4, 2);
    const steps = [];
    const stack = [];
    const stateMap = {};
    const nodeMeta = {};

    treeLayout.nodes.forEach((node) => {
      const match = /C\((\d+), (\d+)\)/.exec(node.label);
      nodeMeta[node.id] = { n: Number(match[1]), k: Number(match[2]) };
      stateMap[node.id] = { status: 'idle', result: null };
    });

    const childrenMap = {};
    treeLayout.edges.forEach(([parent, child]) => {
      if (!childrenMap[parent]) childrenMap[parent] = [];
      childrenMap[parent].push(child);
    });

    function snapshot(lines, title, summary, detail, currentNodeId, partial) {
      const label = currentNodeId ? treeLayout.nodes.find((node) => node.id === currentNodeId).label : '없음';
      steps.push(createStep({
        lines,
        title,
        summary,
        detail,
        metrics: [
          metric('현재 호출 스택', stack.length ? stack.join(' → ') : '비어 있음'),
          metric('현재 프레임', label),
          metric('부분 결과', partial === undefined ? '없음' : partial),
          metric('기저 사례', 'k == 0 또는 k == n'),
        ],
        visual: {
          layout: treeLayout,
          nodeStates: deepClone(stateMap),
          currentNodeId,
          callStack: stack.slice(),
          recursionKind: 'combination',
          explanation: 'C(n, k)는 n개 중 k개를 고르는 경우의 수입니다. 예를 들어 C(4,2)는 4개 중 2개를 뽑는 방법 수이고, 왼쪽 가지는 선택, 오른쪽 가지는 선택하지 않음을 뜻합니다.',
        },
      }));
    }

    function evaluate(nodeId) {
      const { n, k } = nodeMeta[nodeId];
      stack.push(`C(${n},${k})`);
      stateMap[nodeId].status = 'current';
      snapshot([1], '함수 호출', `comb(${n}, ${k})를 호출했습니다.`, '조합 재귀는 "선택한다 / 선택하지 않는다" 두 갈래로 문제를 쪼개는 구조입니다.', nodeId);

      if (k === 0 || k === n) {
        stateMap[nodeId].status = 'done';
        stateMap[nodeId].result = 1;
        snapshot([2, 3], '기저 사례 도달', `C(${n}, ${k})는 1입니다.`, '모두 선택하거나 하나도 선택하지 않는 경우의 수는 1입니다.', nodeId, 1);
        stack.pop();
        return 1;
      }

      stateMap[nodeId].status = 'split';
      snapshot([4], '첫 번째 하위 호출', `C(${n - 1}, ${k - 1})를 계산합니다.`, '현재 원소를 선택한 경우를 의미합니다.', nodeId);
      const [leftChild, rightChild] = childrenMap[nodeId];
      const leftValue = evaluate(leftChild);

      stateMap[nodeId].status = 'split';
      snapshot([5], '두 번째 하위 호출', `C(${n - 1}, ${k})를 계산합니다.`, '현재 원소를 선택하지 않은 경우를 의미합니다.', nodeId, leftValue);
      const rightValue = evaluate(rightChild);

      const result = leftValue + rightValue;
      stateMap[nodeId].status = 'done';
      stateMap[nodeId].result = result;
      snapshot([6], '반환값 계산', `${leftValue} + ${rightValue} = ${result}를 반환합니다.`, '두 경우의 수를 합쳐 현재 조합 값을 만듭니다.', nodeId, result);
      stack.pop();
      return result;
    }

    evaluate(treeLayout.nodes[0].id);

    return baseScenario({
      id: 'combination',
      label: '조합',
      subtitle: '현재 원소를 선택하는 경우와 선택하지 않는 경우로 나눠 본다.',
      complexity: '시간 O(2^n)',
      spaceComplexity: '공간 O(n)',
      badges: ['분기 재귀', '조합 공식', '재귀 트리'],
      code: [
        'def comb(n, k):',
        '    if k == 0 or k == n:',
        '        return 1',
        '    left = comb(n - 1, k - 1)',
        '    right = comb(n - 1, k)',
        '    return left + right',
      ],
      renderer: 'recursion',
      legend: [
        { label: '현재 실행 프레임', tone: 'highlight' },
        { label: '분기 중인 프레임', tone: 'range' },
        { label: '반환 완료 프레임', tone: 'good' },
      ],
      notes: [
        { title: '핵심 포인트', body: '조합 재귀는 현재 원소를 포함하는 경우와 포함하지 않는 경우로 갈라집니다.' },
        { title: '보기 좋은 포인트', body: 'C(n, k) = C(n-1, k-1) + C(n-1, k) 구조가 트리 모양으로 어떻게 펼쳐지는지 보세요.' },
        { title: '실수하기 쉬운 부분', body: '기저 사례를 빠뜨리면 호출이 끝나지 않거나 잘못된 결과가 나옵니다.' },
      ],
      steps,
    });
  }

function selectScenarioPublic(scenarioId) {
