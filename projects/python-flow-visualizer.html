function applyInitialRoute() {
  try {
    const params = new URLSearchParams(window.location.search);
    if (params.get('embed') === '1') installEmbedMode();
    const scenarioId = params.get('scenario');
    if (scenarioId && APP.scenarios && APP.scenarios[scenarioId]) {
      APP.currentSection = APP.scenarios[scenarioId].sectionKey;
      APP.currentScenario = scenarioId;
    }
  } catch (error) {
    // ignore route parsing errors
  }
}

function exposePublicApi() {
  window.visualizerApi = {
    setScenario: selectScenarioPublic,
    goTo: selectScenarioPublic,
    getCurrentScenario: () => APP.currentScenario,
    getCurrentSection: () => APP.currentSection,
    goToStep(stepIndex) {
      const scenario = getCurrentScenario();
      const maxIndex = scenario ? scenario.steps.length - 1 : 0;
      APP.stepIndex = Math.max(0, Math.min(Number(stepIndex) || 0, maxIndex));
      stopPlayback();
      renderStep();
      return APP.stepIndex;
    },
  };
}

  function bindEvents() {
    els.prevBtn.addEventListener('click', () => {
      stopPlayback();
      APP.stepIndex = Math.max(0, APP.stepIndex - 1);
      renderStep();
    });

    els.nextBtn.addEventListener('click', () => {
      stopPlayback();
      APP.stepIndex = Math.min(getCurrentScenario().steps.length - 1, APP.stepIndex + 1);
      renderStep();
    });

    els.resetBtn.addEventListener('click', () => {
      stopPlayback();
      APP.stepIndex = 0;
      renderStep();
    });

    els.playBtn.addEventListener('click', () => {
      if (APP.playing) stopPlayback();
      else startPlayback();
    });

    els.stepRange.addEventListener('input', (event) => {
      stopPlayback();
      APP.stepIndex = Number(event.target.value);
      renderStep();
    });

    els.speedRange.addEventListener('input', (event) => {
      APP.speed = Number(event.target.value);
      els.speedLabel.textContent = speedLabel(APP.speed);
      if (APP.playing) {
        stopPlayback();
        startPlayback();
      }
    });
  }

  function getCurrentScenario() {
    return APP.scenarios[APP.currentScenario];
  }

  function startPlayback() {
    APP.playing = true;
    els.playBtn.textContent = '정지';
    const tick = () => {
      const scenario = getCurrentScenario();
      if (APP.stepIndex >= scenario.steps.length - 1) {
        stopPlayback();
        return;
      }
      APP.stepIndex += 1;
      renderStep();
      APP.timer = window.setTimeout(tick, speedMs(APP.speed));
    };
    APP.timer = window.setTimeout(tick, speedMs(APP.speed));
  }

  function stopPlayback() {
    APP.playing = false;
    els.playBtn.textContent = '재생';
    if (APP.timer) {
      window.clearTimeout(APP.timer);
      APP.timer = null;
    }
  }

  function switchSection(sectionKey) {
    stopPlayback();
    APP.currentSection = sectionKey;
    APP.currentScenario = APP.sections[sectionKey][0].id;
    APP.stepIndex = 0;
    render();
  }

  function switchScenario(scenarioId) {
    stopPlayback();
    APP.currentScenario = scenarioId;
    APP.stepIndex = 0;
    render();
  }


  function render() {
    renderSectionNav();
    renderScenarioTabs();
    renderHeader();
    renderStep();
  }

  function renderSectionNav() {
    els.sectionNav.innerHTML = Object.entries(SECTION_INFO).map(([sectionKey, info]) => {
      const count = APP.sections[sectionKey].length;
      return `
        <button class="section-button ${APP.currentSection === sectionKey ? 'active' : ''}" data-section="${sectionKey}">
          <div class="section-title">${info.label}</div>
          <div class="section-desc">${info.navDesc} · ${count}개 시나리오</div>
        </button>
      `;
    }).join('');

    els.sectionNav.querySelectorAll('[data-section]').forEach((button) => {
      button.addEventListener('click', () => switchSection(button.dataset.section));
    });
  }

  function renderScenarioTabs() {
    const scenarios = APP.sections[APP.currentSection];
    els.algorithmTabs.innerHTML = scenarios.map((scenario) => `
      <button class="algorithm-tab ${APP.currentScenario === scenario.id ? 'active' : ''}" data-scenario="${scenario.id}">
        ${scenario.label}
      </button>
    `).join('');

    els.algorithmTabs.querySelectorAll('[data-scenario]').forEach((button) => {
      button.addEventListener('click', () => switchScenario(button.dataset.scenario));
    });
  }


  function renderHeader() {
    const section = SECTION_INFO[APP.currentSection];
    const scenario = getCurrentScenario();
    els.sectionLabel.textContent = section.label;
    els.heroTitle.textContent = scenario.label;
    els.heroSummary.textContent = `${scenario.subtitle} ${section.summary}`;
    els.heroBadges.innerHTML = [
      `<span class="badge badge-highlight">${scenario.complexity}</span>`,
      `<span class="badge">${scenario.spaceComplexity}</span>`,
      ...scenario.badges.map((badge) => `<span class="badge">${badge}</span>`),
    ].join('');
  }

  function getStageLabel(scenario, step) {
    const visual = step.visual || {};
    if (scenario.renderer === 'syntax-reference') return visual.stageLabel || '문법 포인트 정리';
    if (scenario.renderer === 'graph') return visual.structureType === 'stack' ? 'DFS 진행 중' : 'BFS 진행 중';
    if (scenario.renderer === 'linear-structure') return visual.structureType === 'stack' ? '스택 연산 확인' : '큐 연산 확인';
    if (scenario.renderer === 'tree-traversal') return visual.backtracking ? '재귀 복귀(백트래킹)' : '재귀 방문 진행';
    if (scenario.renderer === 'pruning-tree') return '가지치기 여부 판단';
    if (scenario.renderer === 'nqueen') return visual.safe === false ? '충돌 감지' : (visual.safe === true ? '배치 가능 확인' : '후보 칸 검사');
    if (scenario.renderer === 'heap-sort') return visual.phase === 'build' ? '최소 힙 구축' : (visual.phase === 'done' ? '정렬 완료' : '최소값 추출 / 힙 복구');
    if (scenario.renderer === 'counting') return visual.output && visual.output.some((value) => value !== null && value !== undefined && value !== '') ? '출력 배열 채우기' : '빈도 세기';
    if (scenario.renderer === 'tree-search') return visual.found ? '탐색 성공' : '비교 후 방향 선택';
    if (scenario.renderer === 'factorial-recursion') return '선형 재귀 호출/반환';
    if (scenario.renderer === 'recursion') return '분기 재귀 호출/반환';
    if (scenario.renderer.startsWith('sorting')) return '비교 / 이동 / 구간 확정';
    return '현재 단계 해석';
  }

  function getCurrentFocusLabel(scenario, step) {
    const visual = step.visual || {};
    if (scenario.renderer === 'syntax-reference') return visual.focusLabel || step.title;
    if (scenario.renderer.startsWith('sorting')) {
      if (visual.pivotIndex !== undefined && visual.pivotIndex !== null) return `pivot idx ${visual.pivotIndex}`;
      if (visual.keyIndex !== undefined && visual.keyIndex !== null) return `key idx ${visual.keyIndex}`;
      if (visual.comparing && visual.comparing.length) return `비교 중 idx ${visual.comparing.join(', ')}`;
    }
    if (scenario.renderer === 'graph') return visual.current || '대기 중';
    if (scenario.renderer === 'tree-search') return visual.current || '루트 비교 전';
    if (scenario.renderer === 'tree-traversal') return visual.current || (visual.callStack && visual.callStack[visual.callStack.length - 1]) || '호출 없음';
    if (scenario.renderer === 'linear-structure') return visual.focusValue !== null && visual.focusValue !== undefined ? String(visual.focusValue) : (visual.items && visual.items.length ? fmtArray(visual.items) : '비어 있음');
    if (scenario.renderer === 'counting') return visual.currentValue !== null && visual.currentValue !== undefined ? `값 ${visual.currentValue}` : '입력 스캔 중';
    if (scenario.renderer === 'nqueen') return visual.candidate ? `(${visual.candidate[0]}, ${visual.candidate[1]})` : '후보 없음';
    if (scenario.renderer === 'heap-sort') return visual.activeIndex !== null && visual.activeIndex !== undefined ? `heap[${visual.activeIndex}]` : '루트/배열 상태';
    if (scenario.renderer === 'pruning-tree' || scenario.renderer === 'recursion' || scenario.renderer === 'factorial-recursion') return visual.currentNodeId || (visual.callStack && visual.callStack[visual.callStack.length - 1]) || '호출 없음';
    return step.title;
  }

  function getNextFocusLabel(scenario, step) {
    const visual = step.visual || {};
    if (scenario.renderer === 'syntax-reference') return visual.nextFocus || '다음 문법 카드';
    if (visual.edge && visual.edge[1] !== undefined && visual.edge[1] !== null) return String(visual.edge[1]);
    if (scenario.renderer === 'graph') {
      if (visual.structureType === 'stack') return visual.stack && visual.stack.length ? `stack top ${visual.stack[visual.stack.length - 1]}` : '스택 비움';
      return visual.queue && visual.queue.length ? `queue front ${visual.queue[0]}` : '큐 비움';
    }
    if (scenario.renderer === 'tree-search') return visual.found ? '탐색 종료' : (visual.direction || '비교 결과 확인');
    if (scenario.renderer === 'nqueen') return visual.safe === false ? '이전 행으로 복귀 또는 다음 열 검사' : '다음 행 검사';
    if (scenario.renderer === 'heap-sort') return visual.phase === 'build' ? '부모 비교 또는 sift up 정지' : '자식 비교 또는 sift down 정지';
    if (scenario.renderer.startsWith('sorting')) return '다음 비교/쓰기 위치';
    return '다음 강조 요소 확인';
  }

  function renderStatePanel(scenario, step) {
    if (!els.stateArea) return;
    const progress = scenario.steps.length ? Math.round(((APP.stepIndex + 1) / scenario.steps.length) * 100) : 0;
    const overviewLabel = scenario.overviewLabel || '알고리즘 개요';
    els.stateArea.innerHTML = `
      <div class="description-card">
        <div class="description-top">
          <div class="line-chip">${APP.stepIndex + 1} / ${scenario.steps.length} 단계 · ${escapeHtml(getStageLabel(scenario, step))}</div>
          <div class="note-chip-row">
            <span class="note-chip">현재 초점: ${escapeHtml(getCurrentFocusLabel(scenario, step))}</span>
          </div>
        </div>
        <div class="description-title">${escapeHtml(step.title)}</div>
        <p class="description-summary">${escapeHtml(step.summary)}</p>
        <p class="description-detail">${escapeHtml(step.detail || step.summary)}</p>
        <div class="progress-wrap">
          <div class="progress-head">
            <span>진행률 ${progress}%</span>
            <span>다음에 볼 포인트: ${escapeHtml(getNextFocusLabel(scenario, step))}</span>
          </div>
          <div class="progress-track"><div class="progress-value" style="width: ${progress}%"></div></div>
        </div>
        <div class="state-grid">
          <div class="state-card">
            <div class="state-label">${escapeHtml(overviewLabel)}</div>
            <div class="state-value">${escapeHtml(scenario.subtitle)}</div>
          </div>
          <div class="state-card">
            <div class="state-label">이번 단계 핵심</div>
            <div class="state-value">${escapeHtml(step.summary)}</div>
          </div>
          <div class="state-card">
            <div class="state-label">다음 관찰 포인트</div>
            <div class="state-value">${escapeHtml(getNextFocusLabel(scenario, step))}</div>
          </div>
        </div>
      </div>
    `;
  }

  function getEmbedDocumentHeight() {
    const appShell = document.querySelector('.app-shell');
    if (appShell) {
      return Math.ceil(appShell.getBoundingClientRect().height);
    }

    const body = document.body;
    const root = document.documentElement;
    return Math.ceil(Math.max(
      body ? body.offsetHeight : 0,
      root ? root.offsetHeight : 0,
    ));
  }

  function renderStep() {
    const scenario = getCurrentScenario();
    const step = scenario.steps[APP.stepIndex];
    els.stepRange.max = Math.max(0, scenario.steps.length - 1);
    els.stepRange.value = APP.stepIndex;
    els.stepMeta.textContent = `${APP.stepIndex + 1} / ${scenario.steps.length} · ${step.title}`;
    els.speedLabel.textContent = speedLabel(APP.speed);
    renderPanelTitles(scenario, step);
    renderCode(scenario, step);
    renderLegend(scenario);
    renderStatePanel(scenario, step);
    renderVisual(scenario, step);
    try {
      window.parent && window.parent !== window && window.parent.postMessage({
        type: 'kp-visualizer-height',
        height: getEmbedDocumentHeight(),
        scenario: APP.currentScenario,
      }, '*');
    } catch (error) {
      // ignore cross-origin messaging errors
    }
  }

  function renderPanelTitles(scenario, step) {
    if (els.visualPanelTitle) {
      els.visualPanelTitle.textContent = scenario.visualPanelTitle || '실행 흐름 시각화';
    }
    if (els.codePanelTitle) {
      const fallback = scenario.renderer === 'syntax-reference'
        ? `실전 ${step.visual?.language || ''} 템플릿`.trim()
        : '실행 중인 Python 코드';
      els.codePanelTitle.textContent = scenario.codePanelTitle || fallback;
    }
  }

  function renderCode(scenario, step) {
    const codeLines = step.codeLines || scenario.code;
    const activeLines = step.lines && step.lines.length ? step.lines : codeLines.map((_, index) => index + 1);
    els.codeArea.innerHTML = `
      <div class="code-block">
        ${codeLines.map((line, index) => `
          <div class="code-line ${activeLines.includes(index + 1) ? 'active' : ''}">
            <div class="code-line-num">${index + 1}</div>
            <div class="code-line-text">${escapeHtml(line || ' ')}</div>
          </div>
        `).join('')}
      </div>
    `;
  }


  function renderLegend(scenario) {
    const toneClass = {
      highlight: 'legend-highlight',
      good: 'legend-good',
      warn: 'legend-warn',
      danger: 'legend-danger',
      range: 'legend-range',
      key: 'legend-key',
      shifted: 'legend-danger',
    };
    els.legendArea.innerHTML = scenario.legend.map((item) => `
      <div class="legend-item ${toneClass[item.tone] || ''}">
        ${item.label}
      </div>
    `).join('');
  }

  function createArrowDefs(prefix) {
    return `
      <defs>
        <marker id="${prefix}-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255, 191, 95, 0.96)"></path>
        </marker>
        <marker id="${prefix}-good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(50, 213, 131, 0.96)"></path>
        </marker>
        <marker id="${prefix}-danger" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255, 107, 129, 0.96)"></path>
        </marker>
      </defs>
    `;
  }

  function arrowLineData(fromNode, toNode, pad = 30) {
    const dx = toNode.x - fromNode.x;
    const dy = toNode.y - fromNode.y;
    const length = Math.hypot(dx, dy) || 1;
    return {
      x1: fromNode.x + (dx / length) * pad,
      y1: fromNode.y + (dy / length) * pad,
      x2: toNode.x - (dx / length) * pad,
      y2: toNode.y - (dy / length) * pad,
    };
  }

  function renderArrowLine(className, fromId, toId, nodesById, markerId) {
    if (!fromId || !toId || !nodesById[fromId] || !nodesById[toId]) return '';
    const { x1, y1, x2, y2 } = arrowLineData(nodesById[fromId], nodesById[toId]);
    return `
      <line class="${className}"
            x1="${x1}" y1="${y1}"
            x2="${x2}" y2="${y2}"
            marker-end="url(#${markerId})"></line>
    `;
  }

  function pathPairs(items) {
    const set = new Set();
    for (let i = 0; i < items.length - 1; i++) {
      set.add(`${items[i]}->${items[i + 1]}`);
      set.add(`${items[i + 1]}->${items[i]}`);
    }
    return set;
  }

  function flowLine(currentLabel, nextLabel) {
    if (currentLabel && nextLabel) {
      return `
        <div class="flow-line">
          <span class="flow-pill current">${escapeHtml(currentLabel)}</span>
          <span class="flow-arrow">→</span>
          <span class="flow-pill next">${escapeHtml(nextLabel)}</span>
        </div>
      `;
    }
    if (currentLabel) {
      return `
        <div class="flow-line">
          <span class="flow-pill current">${escapeHtml(currentLabel)}</span>
        </div>
      `;
    }
    return '';
  }


  function visualHint(scenario, step) {
    const visual = step.visual || {};
    const renderer = scenario.renderer;
    if (renderer === 'graph') {
      return visual.structureType === 'stack'
        ? '노란 노드는 지금 스택에서 꺼내 처리하는 노드이고, 파란 배지는 다음에 확인할 이웃입니다. 아래 스택의 TOP이 다음 차례입니다.'
        : '노란 노드는 지금 큐 front에서 꺼낸 노드이고, 파란 배지는 다음에 확인할 이웃입니다. 아래 큐의 FRONT가 다음 차례입니다.';
    }
    if (renderer === 'tree-search') {
      return '현재 노드의 값과 목표 값을 비교한 뒤, 한 단계 아래의 왼쪽 또는 오른쪽 자식으로만 내려갑니다. 화살표가 바로 그 이동입니다.';
    }
    if (renderer === 'tree-traversal') {
      return '노란 노드가 지금 함수가 보고 있는 위치이고, 파란 배지가 다음 재귀 이동입니다. 아래 호출 스택 TOP이 지금 실행 중인 함수 프레임입니다.';
    }
    if (renderer === 'factorial-recursion') {
      return '팩토리얼은 가지가 갈라지지 않는 선형 재귀입니다. 왼쪽에서 오른쪽으로 갈수록 더 작은 문제로 내려가고, 다시 오른쪽에서 왼쪽으로 값이 반환됩니다.';
    }
    if (renderer === 'recursion') {
      return '노란 프레임이 지금 실행 중인 호출입니다. 하위 호출을 만들 때는 더 아래로 내려가고, 계산이 끝나면 반환값을 들고 위로 올라옵니다.';
    }
    if (renderer === 'pruning-tree') {
      return '빨간 분기는 더 내려가도 답이 될 수 없어서 잘라낸 가지입니다. 노란 위치에서 조건을 확인한 뒤, 가능한 경우에만 다음 분기로 이동합니다.';
    }
    if (renderer === 'nqueen') {
      return '노란 칸을 먼저 검사하고, 안전하면 퀸을 놓은 뒤 다음 행으로 내려갑니다. 막히면 이전 행으로 돌아와 다른 열을 다시 시도합니다.';
    }
    if (renderer === 'linear-structure') {
      return visual.structureType === 'stack'
        ? '스택은 TOP 한 곳에서만 넣고(push) 빼는(pop) LIFO 구조입니다. 가장 위 칸이 지금 연산이 일어나는 자리입니다.'
        : '큐는 REAR로 넣고(enqueue), FRONT로 빼는(dequeue) FIFO 구조입니다. 양 끝의 역할이 서로 다르다는 점을 같이 보세요.';
    }
    if (renderer === 'counting') {
      return '입력 배열을 한 칸씩 읽으면서 count 배열의 해당 숫자 칸을 증가시키고, 마지막에는 그 개수만큼 output을 채웁니다.';
    }
    if (renderer.startsWith('sorting')) {
      return '노란 요소가 지금 비교하거나 움직이는 대상입니다. 초록은 이미 위치가 확정된 값이고, 보라색 표식은 key 또는 pivot 같은 기준값입니다.';
    }
    return '현재 강조된 요소와 화살표를 따라가면 이번 단계에서 어디를 보고, 다음에 어디로 이동하는지 바로 확인할 수 있습니다.';
  }

  function renderVisualGuide(scenario, step) {
    return `
      <div class="visual-guide">
        <div class="visual-guide-title">${escapeHtml(step.summary)}</div>
        <div class="visual-guide-detail">${escapeHtml(visualHint(scenario, step))}</div>
      </div>
    `;
  }

  function renderMetricStrip(step) {
    if (!step.metrics || !step.metrics.length) return '';
    const tones = ['highlight', 'warn', 'good', 'range'];
    return `
      <div class="direction-strip metric-strip">
        ${step.metrics.map((item, index) => `
          <div class="direction-card metric-card ${tones[index % tones.length]}">
            <div class="direction-label">${escapeHtml(item.label)}</div>
            <div class="direction-value">${escapeHtml(fmtValue(item.value))}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function renderVisual(scenario, step) {
    let body = '';
    if (scenario.renderer.startsWith('sorting')) {
      body = renderSortingVisual(step.visual, scenario.renderer, step);
    } else if (scenario.renderer === 'counting') {
      body = renderCountingVisual(step.visual, step);
    } else if (scenario.renderer === 'linear-structure') {
      body = renderLinearStructureVisual(step.visual, step);
    } else if (scenario.renderer === 'graph') {
      body = renderGraphVisual(step.visual, step);
    } else if (scenario.renderer === 'tree-search') {
      body = renderTreeSearchVisual(step.visual, step);
    } else if (scenario.renderer === 'tree-traversal') {
      body = renderTreeTraversalVisual(step.visual, step);
    } else if (scenario.renderer === 'factorial-recursion') {
      body = renderFactorialVisual(step.visual, step);
    } else if (scenario.renderer === 'recursion') {
      body = renderRecursionVisual(step.visual, step);
    } else if (scenario.renderer === 'pruning-tree') {
      body = renderPruningTreeVisual(step.visual, step);
    } else if (scenario.renderer === 'nqueen') {
      body = renderNQueenVisual(step.visual, step);
    }
    els.visualArea.innerHTML = renderVisualGuide(scenario, step) + body;
  }


  function renderDirectionStrip(cards) {
    const filtered = cards.filter((card) => card && card.label);
    if (!filtered.length) return '';
    return `
      <div class="direction-strip">
        ${filtered.map((card) => `
          <div class="direction-card ${card.tone || ''}">
            <div class="direction-label">${escapeHtml(card.tag || '포인트')}</div>
            <div class="direction-value">${escapeHtml(card.label)}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function renderSvgBadge(node, label, tone = 'current', dx = 0, dy = -42) {
    if (!node) return '';
    const width = Math.max(48, 18 + label.length * 12);
    const x = node.x + dx - width / 2;
    const y = node.y + dy;
    return `
      <g class="svg-badge ${tone}">
        <rect x="${x}" y="${y}" rx="11" ry="11" width="${width}" height="24"></rect>
        <text x="${node.x + dx}" y="${y + 12}">${escapeHtml(label)}</text>
      </g>
    `;
  }

  function renderMotionArrow(className, fromId, toId, nodesById, markerId, tone = 'warn') {
    if (!fromId || !toId || !nodesById[fromId] || !nodesById[toId]) return '';
    const { x1, y1, x2, y2 } = arrowLineData(nodesById[fromId], nodesById[toId]);
    return `
      <g class="motion-group ${tone}">
        <path class="${className}" d="M ${x1} ${y1} L ${x2} ${y2}" marker-end="url(#${markerId})"></path>
        <circle class="motion-dot ${tone}" cx="${x2}" cy="${y2}" r="5"></circle>
      </g>
    `;
  }

  function renderStackBox(items, options = {}) {
    const topLabel = options.topLabel || 'TOP';
    const bottomLabel = options.bottomLabel || 'BOTTOM';
    const focusValue = options.focusValue;
    const values = items.slice().reverse();
    return `
      <div class="stack-box ${options.compact ? 'compact' : ''}">
        <div class="stack-side-label top">${escapeHtml(topLabel)}</div>
        <div class="stack-column">
          ${values.length ? values.map((item, index) => {
            const originalIndex = items.length - 1 - index;
            const classes = ['stack-slot'];
            if (index === 0) classes.push('top-slot');
            if (focusValue !== null && focusValue !== undefined && String(item) === String(focusValue)) classes.push('focus-slot');
            if (options.currentIndex === originalIndex) classes.push('current-slot');
            return `<div class="${classes.join(' ')}"><span class="slot-index">${originalIndex}</span><span>${escapeHtml(String(item))}</span></div>`;
          }).join('') : '<div class="stack-slot empty">비어 있음</div>'}
        </div>
        <div class="stack-side-label bottom">${escapeHtml(bottomLabel)}</div>
      </div>
    `;
  }

  function renderQueueBox(items, options = {}) {
    const focusValue = options.focusValue;
    return `
      <div class="queue-box ${options.compact ? 'compact' : ''}">
        <div class="queue-cap front">FRONT<div class="queue-cap-sub">여기서 나감</div></div>
        <div class="queue-lane">
          ${items.length ? items.map((item, index) => {
            const classes = ['queue-slot'];
            if (index === 0) classes.push('front-slot');
            if (index === items.length - 1) classes.push('rear-slot');
            if (focusValue !== null && focusValue !== undefined && String(item) === String(focusValue)) classes.push('focus-slot');
            return `<div class="${classes.join(' ')}"><span class="slot-index">${index}</span><span>${escapeHtml(String(item))}</span></div>`;
          }).join('') : '<div class="queue-slot empty">비어 있음</div>'}
        </div>
        <div class="queue-cap rear">REAR<div class="queue-cap-sub">여기로 들어옴</div></div>
      </div>
    `;

  function renderLinearStructureVisual(visual, step) {
    const isStack = visual.structureType === 'stack';
    const cards = isStack
      ? [
          { tag: '현재 값', label: visual.focusValue === null || visual.focusValue === undefined ? '없음' : String(visual.focusValue), tone: 'highlight' },
          { tag: '핵심 규칙', label: 'push / pop은 top 한 곳에서만 일어남', tone: 'warn' },
        ]
      : [
          { tag: '현재 값', label: visual.focusValue === null || visual.focusValue === undefined ? '없음' : String(visual.focusValue), tone: 'highlight' },

    return `
      <div class="structure-layout scene-stable">
        ${renderDirectionStrip(cards)}
        <div class="structure-stage compact-stage">
          ${isStack
            ? renderStackBox(visual.items, { topLabel: 'TOP · push / pop', bottomLabel: 'BOTTOM', focusValue: visual.focusValue, currentIndex: visual.items.length - 1 })

        <div class="workspace-box">
          <div class="workspace-card">
            <div class="workspace-head">배열로 본 내부 저장 상태</div>

              title: isStack ? 'stack 리스트' : 'queue 리스트',
              arrayName: isStack ? 'stack' : 'queue',
              currentIndices: isStack
                ? (visual.items.length ? [visual.items.length - 1] : [])
                : (visual.items.length ? [0] : []),
              frontIndices: !isStack && visual.items.length ? [0] : [],
              rearIndices: !isStack && visual.items.length ? [visual.items.length - 1] : [],
              keyIndices: isStack && visual.items.length ? [visual.items.length - 1] : [],
            })}
          </div>
          <div class="workspace-card">
            <div class="workspace-head">핵심 규칙</div>
            <div class="token-row">${isStack ? renderTokens(['마지막에 넣은 값이 먼저 나감', 'top만 사용']) : renderTokens(['먼저 들어온 값이 먼저 나감', 'front / rear 구분'])}</div>
          </div>
        </div>
      </div>

  function renderSortingVisual(visual, renderer, step) {
    const [rangeStart, rangeEnd] = visual.activeRange || [null, null];
    const mergeWorkspace = visual.leftPart || visual.rightPart || visual.temp;
    const infoCards = [];
    if (visual.comparing && visual.comparing.length) infoCards.push({ tag: '비교 중', label: visual.comparing.map((index) => `arr[${index}]`).join(' ↔ '), tone: 'highlight' });
    if (visual.keyIndex !== undefined && visual.keyIndex !== null) infoCards.push({ tag: 'key', label: `arr[${visual.keyIndex}]`, tone: 'warn' });
    if (visual.pivotIndex !== undefined && visual.pivotIndex !== null) infoCards.push({ tag: 'pivot', label: `arr[${visual.pivotIndex}]`, tone: 'warn' });
    if (visual.currentWrite !== undefined && visual.currentWrite !== null) infoCards.push({ tag: '쓰기 위치', label: `arr[${visual.currentWrite}]`, tone: 'good' });
    if (visual.activeRange && rangeStart !== null && rangeEnd !== null) infoCards.push({ tag: '현재 구간', label: `${rangeStart} ~ ${rangeEnd}`, tone: 'range' });
    const rangeIndices = visual.activeRange && rangeStart !== null && rangeEnd !== null
      ? Array.from({ length: rangeEnd - rangeStart + 1 }, (_, offset) => rangeStart + offset)
      : visual.items.map((_, index) => index);
    const dimIndices = visual.activeRange && rangeStart !== null && rangeEnd !== null
      ? visual.items.map((_, index) => index).filter((index) => index < rangeStart || index > rangeEnd)
      : [];

    const workspaceCards = [];
    if (mergeWorkspace) {
      workspaceCards.push(`
        <div class="workspace-card">
          <div class="workspace-head">left_part</div>
          <div class="token-row">${renderTokens(visual.leftPart)}</div>
        </div>
      `);
      workspaceCards.push(`
        <div class="workspace-card">
          <div class="workspace-head">right_part</div>
          <div class="token-row">${renderTokens(visual.rightPart)}</div>
        </div>
      `);
      workspaceCards.push(`
        <div class="workspace-card">
          <div class="workspace-head">temp</div>
          <div class="token-row">${renderTokens(visual.temp)}</div>
        </div>
      `);
    }

    if (visual.stack) {
      workspaceCards.push(`
        <div class="workspace-card">
          <div class="workspace-head">재귀 호출 스택</div>
          ${renderStackBox(visual.stack, { compact: true, topLabel: 'TOP · 지금 처리 중', bottomLabel: 'BOTTOM · 먼저 호출됨', currentIndex: visual.stack.length - 1 })}
        </div>
      `);
    }

    return `
      <div class="sort-layout scene-fade">
        ${renderDirectionStrip(infoCards)}
        ${renderArrayTable(visual.items, {
          title: '배열 상태',
          rangeIndices,
          dimIndices,
          comparingIndices: visual.comparing || [],
          currentIndices: [visual.currentWrite].filter((value) => value !== null && value !== undefined),
          keyIndices: [visual.keyIndex, visual.pivotIndex].filter((value) => value !== null && value !== undefined),
          shiftedIndices: visual.shifted || [],
          sortedIndices: visual.sorted || [],
          fixedIndices: visual.fixed || [],
        })}
        ${workspaceCards.length ? `<div class="workspace-box">${workspaceCards.join('')}</div>` : ''}
      </div>
    `;
  }

  function renderCountingVisual(visual, step) {
    const cards = [
      { tag: '읽는 위치', label: visual.currentInputIndex === null || visual.currentInputIndex === undefined ? '없음' : `input[${visual.currentInputIndex}]`, tone: 'highlight' },

  function renderGraphVisual(visual, step) {
    const nodes = visual.graph.nodes;

    const structureTitle = isStack ? 'DFS 작업 스택' : 'BFS 작업 큐';
    const cards = [
      { tag: '현재 처리', label: visual.current ? visual.current : '없음', tone: 'highlight' },
      { tag: '다음 확인', label: visual.neighbor ? visual.neighbor : '없음', tone: 'warn' },
      { tag: isStack ? '스택 top' : '큐 front', label: visual.structure.length ? String(isStack ? visual.structure[visual.structure.length - 1] : visual.structure[0]) : '비어 있음', tone: 'good' },

    return `
      <div class="graph-layout scene-fade">
        ${renderDirectionStrip(cards)}
        <div class="graph-stage compact-stage">
          <svg viewBox="0 0 460 220" role="img" aria-label="graph">
            ${createArrowDefs('graph-flow')}
            ${edges.map(([from, to]) => `
              <line class="graph-edge"

                    x2="${nodes[to].x}" y2="${nodes[to].y}"></line>

            ${Object.entries(nodes).map(([id, pos]) => {
              const classes = ['graph-node'];
              if (visual.current === id) classes.push('current');
              else if (visual.order.includes(id)) classes.push('done');
              else if (visual.structure.includes(id) || visual.visited.includes(id)) classes.push('frontier');
              if (visual.neighbor === id) classes.push('checking');
              return `
                <g class="${classes.join(' ')}">
                  <circle cx="${pos.x}" cy="${pos.y}" r="25"></circle>

        </div>

        <div class="workspace-box">
          <div class="workspace-card structure-card">
            <div class="workspace-head">${structureTitle}</div>
            ${isStack
              ? renderStackBox(visual.structure, { compact: true, topLabel: 'TOP · 다음에 꺼냄', bottomLabel: 'BOTTOM', currentIndex: visual.structure.length - 1, focusValue: visual.current || visual.neighbor })
              : renderQueueBox(visual.structure, { compact: true, focusValue: visual.current || visual.neighbor })}
          </div>
          <div class="workspace-card">

            <div class="token-row">${renderTokens(visual.order)}</div>
          </div>
          <div class="workspace-card">
            <div class="workspace-head">방문 집합</div>
            <div class="token-row">${renderTokens(visual.visited)}</div>
          </div>
        </div>
      </div>
    `;
  }

  function renderTreeSearchVisual(visual, step) {
    const tree = visual.tree.nodes;
    const edges = Object.entries(tree).flatMap(([id, node]) => {
      const result = [];
      if (node.left) result.push([id, node.left]);
      if (node.right) result.push([id, node.right]);
      return result;
    });
    const pathEdgeSet = pathPairs(visual.path);
    const direction = visual.edge && visual.edge[1]
      ? (tree[visual.edge[0]].left === visual.edge[1] ? '왼쪽으로 내려감' : '오른쪽으로 내려감')
      : '현재 값을 비교 중';
    const cards = [
      { tag: '현재 노드', label: visual.current || '없음', tone: 'highlight' },
      { tag: '다음 이동', label: visual.edge && visual.edge[1] ? `${visual.edge[1]} (${direction})` : '없음', tone: 'warn' },
      { tag: '목표 값', label: String(visual.target), tone: 'good' },
    ];

    return `
      <div class="tree-layout scene-fade">
        ${renderDirectionStrip(cards)}
        <div class="tree-stage compact-stage">
          <svg viewBox="0 0 600 410" role="img" aria-label="tree-search">
            ${createArrowDefs('tree-search')}
            ${edges.map(([from, to]) => `
              <line class="tree-edge ${pathEdgeSet.has(`${from}->${to}`) ? 'active' : ''}"
                    x1="${tree[from].x}" y1="${tree[from].y}"
                    x2="${tree[to].x}" y2="${tree[to].y}"></line>
            `).join('')}
            ${visual.edge && visual.edge[1] ? renderMotionArrow('tree-edge arrow', visual.edge[0], visual.edge[1], tree, 'tree-search-warn') : ''}
            ${Object.entries(tree).map(([id, node]) => {
              const classes = ['tree-node'];
              if (visual.found === id) classes.push('done');
              else if (visual.current === id) classes.push('current');
              else if (visual.path.includes(id)) classes.push('path');
              return `
                <g class="${classes.join(' ')}">
                  <circle cx="${node.x}" cy="${node.y}" r="24"></circle>
                  <text x="${node.x}" y="${node.y + 1}">${id}</text>
                </g>
              `;
            }).join('')}
            ${visual.current ? renderSvgBadge(tree[visual.current], '현재', 'current') : ''}
            ${visual.edge && visual.edge[1] ? renderSvgBadge(tree[visual.edge[1]], '다음', 'next') : ''}
            ${visual.found ? renderSvgBadge(tree[visual.found], '찾음', 'done', 0, 30) : ''}
          </svg>
        </div>
        <div class="workspace-box">
          <div class="workspace-card">
            <div class="workspace-head">탐색 경로</div>
            <div class="token-row">${renderTokens(visual.path)}</div>
          </div>
          <div class="workspace-card">
            <div class="workspace-head">목표 값</div>
            <div class="token-row">${renderTokens([visual.target])}</div>
          </div>
        </div>
      </div>
    `;
  }

  function renderTreeTraversalVisual(visual, step) {

      const result = [];
      if (node.left) result.push([id, node.left]);
      if (node.right) result.push([id, node.right]);

    const cards = [

      <div class="tree-layout scene-fade">

            ${createArrowDefs('tree-traversal')}
            ${edges.map(([from, to]) => `
              <line class="tree-edge ${stackPathEdges.has(`${from}->${to}`) ? 'active' : ''}"
                    x1="${tree[from].x}" y1="${tree[from].y}"
                    x2="${tree[to].x}" y2="${tree[to].y}"></line>
            `).join('')}
            ${visual.edge && visual.edge[1] ? renderMotionArrow('tree-edge arrow', visual.edge[0], visual.edge[1], tree, 'tree-traversal-warn') : ''}
            ${Object.entries(tree).map(([id, node]) => {
              const classes = ['tree-node'];
              if (visual.current === id) classes.push('current');

          </svg>
        </div>
        <div class="workspace-box">
          <div class="workspace-card structure-card">
            <div class="workspace-head">호출 스택</div>
            ${renderStackBox(visual.callStack, { compact: true, topLabel: 'TOP · 지금 확인 중', bottomLabel: 'BOTTOM', currentIndex: visual.callStack.length - 1, focusValue: stackTop })}
          </div>
          <div class="workspace-card">
            <div class="workspace-head">방문 순서</div>
            <div class="token-row">${renderTokens(visual.visitedOrder)}</div>
          </div>
        </div>
      </div>
    `;

  function renderFactorialVisual(visual) {
    const values = visual.sequence || [4, 3, 2, 1];
    const nodeByValue = {};
    (visual.layout.nodes || []).forEach((node) => {
      const match = /fact\((\d+)\)/.exec(node.label);
      if (match) nodeByValue[Number(match[1])] = node;
    });
    const currentMatch = visual.currentNodeId ? /fact-(\d+)/.exec(visual.currentNodeId) : null;
    const currentValue = currentMatch ? Number(currentMatch[1]) : null;
    const currentStatus = visual.currentNodeId ? visual.nodeStates[visual.currentNodeId]?.status : null;
    const maxValue = Math.max(...values);
    let moveText = '현재 프레임을 확인 중';
    let moveDirection = '';
    if ((currentStatus === 'waiting' || currentStatus === 'current') && currentValue && currentValue > 1) {
      moveText = `더 작은 문제 factorial(${currentValue - 1})로 내려가는 중`;
      moveDirection = `${currentValue} → ${currentValue - 1}`;
    } else if (currentStatus === 'done' && currentValue && currentValue < maxValue) {
      moveText = `계산된 값을 부모 factorial(${currentValue + 1})로 반환하는 중`;
      moveDirection = `${currentValue} → ${currentValue + 1}`;
    } else if (currentStatus === 'done' && currentValue === 1) {
      moveText = '기저 사례에서 1을 반환하고 위로 올라가는 시작점';
      moveDirection = '1 → 2';
    }

    return `
      <div class="factorial-layout">
        ${renderDirectionStrip([
          { tag: '현재 프레임', label: currentValue ? `factorial(${currentValue})` : '없음', tone: 'highlight' },
          { tag: '이동 방향', label: moveDirection || '현재 프레임 내부 처리', tone: 'warn' },
          { tag: '의미', label: moveText, tone: 'good' },
        ])}
        <div class="factorial-stage compact-stage">
          <div class="factorial-chain">
            ${values.map((value, index) => {
              const node = nodeByValue[value];
              const state = node ? (visual.nodeStates[node.id] || { status: 'idle', result: null }) : { status: 'idle', result: null };
              const classes = ['factorial-card'];
              if (state.status === 'current') classes.push('current');
              else if (state.status === 'waiting') classes.push('waiting');
              else if (state.status === 'done') classes.push('done');
              const resultHtml = state.result !== null && state.result !== undefined
                ? `<div class="factorial-result">return ${state.result}</div>`
                : `<div class="factorial-result muted">return ?</div>`;
              const statusLabel = state.status === 'current' ? '지금 계산 중'
                : state.status === 'waiting' ? '하위 호출 결과 대기'
                : state.status === 'done' ? '반환 완료'
                : '아직 실행 전';
              let arrowText = '더 작은 문제로 호출 ⟶';
              if (currentStatus === 'done' && currentValue === value + 1) arrowText = '⟵ 값 반환';
              const nextArrow = index < values.length - 1 ? `<div class="factorial-arrow ${arrowText.includes('반환') ? 'back' : ''}">${arrowText}</div>` : '';
              return `
                <div class="factorial-step-wrap">
                  <div class="${classes.join(' ')}">
                    <div class="factorial-card-tag">frame ${index}</div>
                    <div class="factorial-label">factorial(${value})</div>
                    <div class="factorial-status">${statusLabel}</div>
                    ${resultHtml}
                  </div>
                  ${nextArrow}
                </div>
              `;
            }).join('')}
          </div>
        </div>
        <div class="workspace-box">
          <div class="workspace-card structure-card">
            <div class="workspace-head">현재 호출 스택</div>
            ${renderStackBox(visual.callStack, { compact: true, topLabel: 'TOP · 지금 실행 중', bottomLabel: 'BOTTOM · 가장 먼저 호출됨', currentIndex: visual.callStack.length - 1, focusValue: visual.callStack.length ? visual.callStack[visual.callStack.length - 1] : null })}
          </div>
          <div class="workspace-card">
            <div class="workspace-head">보는 포인트</div>
            <div class="token-row">${renderTokens(['왼쪽 → 오른쪽: 더 작은 문제로 호출', '오른쪽 → 왼쪽: 계산 결과 반환'])}</div>
          </div>
        </div>
      </div>
    `;
  }

  function renderRecursionVisual(visual, step) {
    const fitted = fitLayout(visual.layout, 760, 300, 42);
    const nodesById = {};
    fitted.nodes.forEach((node) => {
      nodesById[node.id] = node;
    });
    const currentState = visual.currentNodeId ? visual.nodeStates[visual.currentNodeId]?.status : null;
    const statusLabel = {
      current: '현재 프레임을 실행 중',
      waiting: '하위 호출의 반환을 기다리는 중',
      split: '두 갈래 하위 호출을 만드는 중',
      done: '반환값 계산을 마친 상태',
    };
    const cards = [

function arrowLineData(fromNode, toNode, pad = 25) {
  const dx = toNode.x - fromNode.x;
  const dy = toNode.y - fromNode.y;
  const length = Math.hypot(dx, dy) || 1;
  return {
    x1: fromNode.x + (dx / length) * pad,
    y1: fromNode.y + (dy / length) * pad,
    x2: toNode.x - (dx / length) * pad,
    y2: toNode.y - (dy / length) * pad,
  };
}

function renderSvgBadge(node, label, tone = 'current', dx = 0, dy = -34) {
  if (!node) return '';
  const width = Math.max(38, 14 + label.length * 10);
  const x = node.x + dx - width / 2;
  const y = node.y + dy;
  return `
    <g class="svg-badge ${tone}">
      <rect x="${x}" y="${y}" rx="10" ry="10" width="${width}" height="20"></rect>
      <text x="${node.x + dx}" y="${y + 10}">${escapeHtml(label)}</text>
    </g>
  `;
}

function renderMotionArrow(className, fromId, toId, nodesById, markerId, tone = 'warn') {
  if (!fromId || !toId || !nodesById[fromId] || !nodesById[toId]) return '';
  const { x1, y1, x2, y2 } = arrowLineData(nodesById[fromId], nodesById[toId]);
  return `
    <g class="motion-group ${tone}">
      <path class="${className}" d="M ${x1} ${y1} L ${x2} ${y2}" marker-end="url(#${markerId})"></path>
      <circle class="motion-dot ${tone}" cx="${x2}" cy="${y2}" r="3.6"></circle>
    </g>
  `;
}

function expandValuesToLength(values, length, fill = '') {

function arrayStateClasses(index, options) {

  addIf('range', options.rangeIndices);

  addIf('key', options.keyIndices);
  addIf('pivot', options.pivotIndices);
  addIf('shifted', options.shiftedIndices);
  addIf('done', options.sortedIndices);

  addIf('danger', options.dangerIndices);
  addIf('success', options.successIndices);
  addIf('front', options.frontIndices);

function heapLayoutFromArray(heap) {
  const nodes = {};
  const edges = [];
  const width = 720;
  const levelGap = 104;
  const levels = heap.length ? Math.floor(Math.log2(heap.length)) + 1 : 1;
  heap.forEach((value, index) => {
    const level = Math.floor(Math.log2(index + 1));
    const position = index - (2 ** level - 1);
    const countOnLevel = 2 ** level;
    const x = width / (countOnLevel + 1) * (position + 1);
    const y = 62 + level * levelGap;
    nodes[index] = { x, y, value };
    const left = index * 2 + 1;
    const right = index * 2 + 2;
    if (left < heap.length) edges.push([index, left]);
    if (right < heap.length) edges.push([index, right]);
  });
  return { nodes, edges, width, height: 96 + (levels - 1) * levelGap + 60 };
}

function buildHeapSortScenario() {
  const input = [7, 3, 6, 2, 9, 1];
  const heap = [];
  const output = [];
  const steps = [];
  const totalSize = input.length;

  function left(idx) { return idx * 2 + 1; }
  function right(idx) { return idx * 2 + 2; }
  function parent(idx) { return Math.floor((idx - 1) / 2); }

  function heapVisual(extra = {}) {
    return {
      input: input.slice(),
      heap: heap.slice(),
      output: output.slice(),
      totalSize,
      phase: extra.phase || 'build',
      activeIndex: extra.activeIndex ?? null,
      compareIndices: extra.compareIndices ? extra.compareIndices.slice() : [],
      swapIndices: extra.swapIndices ? extra.swapIndices.slice() : [],
      edge: extra.edge || null,
      extracted: extra.extracted ?? null,
      lastValue: extra.lastValue ?? null,
      note: extra.note || '',
    };
  }

  function push(lines, title, summary, detail, extra = {}) {
    steps.push(createStep({
      lines,
      title,
      summary,
      detail,
      metrics: [
        metric('입력 배열', fmtArray(input)),
        metric('현재 힙 배열', heap.length ? fmtArray(heap) : '비어 있음'),
        metric('정렬 결과', output.length ? fmtArray(output) : '아직 없음'),
        metric('현재 단계', extra.phase === 'sort' ? '최소값을 꺼내 정렬 결과로 이동' : '최소 힙 구축'),
      ],
      visual: heapVisual(extra),
    }));
  }

  push([20], '입력 배열 준비', '아직 힙은 비어 있고, 입력 배열의 값을 하나씩 최소 힙에 넣을 준비를 합니다.', '최소 힙에서는 부모가 자식보다 작거나 같아야 하고, 루트에는 항상 가장 작은 값이 올라옵니다.', {
    phase: 'build',
    note: '시작 상태',
  });

  input.forEach((value) => {
    heap.push(value);
    let idx = heap.length - 1;

    push([22, 23], '힙 끝에 값 추가', `${value}를 힙 배열 맨 뒤에 넣습니다.`, '힙은 완전 이진 트리이기 때문에 새 값은 항상 배열의 마지막 칸에 먼저 들어갑니다.', {
      phase: 'build',
      activeIndex: idx,
      note: `heap[${idx}] = ${value}`,
    });

    while (idx > 0) {
      const p = parent(idx);
      push([2, 3], '부모와 비교', `부모 ${heap[p]}와 자식 ${heap[idx]}를 비교합니다.`, '자식이 더 작으면 최소 힙 조건이 깨지므로, 그 자식을 위로 올려야 합니다.', {
        phase: 'build',
        activeIndex: idx,
        compareIndices: [p, idx],
        edge: [p, idx],
      });

      if (heap[p] <= heap[idx]) {
        push([4], '현재 위치에서 정지', `${heap[p]} ≤ ${heap[idx]} 이므로 더 위로 올릴 필요가 없습니다.`, '이 위치까지는 부모가 더 작거나 같으므로 최소 힙 조건이 맞습니다.', {
          phase: 'build',
          activeIndex: idx,
          compareIndices: [p, idx],
        });
        break;
      }

      const childValue = heap[idx];
      const parentValue = heap[p];
      [heap[p], heap[idx]] = [heap[idx], heap[p]];
      push([5, 6], '더 작은 값을 위로 올리기', `${childValue}가 ${parentValue}보다 작으므로 부모와 자리를 바꿉니다.`, '이 과정을 sift up이라고 합니다. 더 작은 값이 위로 올라가면서 루트 쪽이 점점 정리됩니다.', {
        phase: 'build',
        activeIndex: p,
        swapIndices: [p, idx],
        edge: [idx, p],
      });
      idx = p;
    }
  });

  push([24], '최소 힙 구축 완료', '모든 입력값이 최소 힙 조건을 만족하는 형태로 정리되었습니다.', '이제 루트 heap[0]에는 항상 현재 힙에서 가장 작은 값이 들어 있습니다.', {
    phase: 'build',
    activeIndex: 0,
  });

  while (heap.length) {
    const minValue = heap[0];
    push([26], '루트가 현재 최소값', `heap[0] = ${minValue}가 지금 힙에서 가장 작은 값입니다.`, '최소 힙의 핵심은 루트만 보면 최소값을 즉시 알 수 있다는 점입니다.', {
      phase: 'sort',
      activeIndex: 0,
      extracted: minValue,
    });

    output.push(minValue);

    if (heap.length === 1) {
      heap.pop();
      push([27], '마지막 값 꺼내기', `${minValue}를 정렬 결과 뒤에 붙이고 힙이 비었습니다.`, '원소가 하나뿐이면 별도의 복구 과정 없이 그대로 정렬 결과에 넣으면 됩니다.', {
        phase: 'sort',
        extracted: minValue,
      });
      break;
    }

    const lastValue = heap.pop();
    heap[0] = lastValue;

    push([27, 28, 29], '루트 제거 후 마지막 값을 루트로 올리기', `${minValue}를 output으로 보내고 마지막 값 ${lastValue}를 루트 자리로 옮깁니다.`, '루트 자리가 비면 마지막 원소를 맨 위로 가져온 다음, 다시 아래로 내려 보내며 힙을 복구합니다.', {
      phase: 'sort',
      activeIndex: 0,
      extracted: minValue,
      lastValue,
    });

    let idx = 0;
    while (true) {
      const l = left(idx);
      const r = right(idx);

      if (l >= heap.length) {
        push([12], '더 내려갈 자식 없음', `인덱스 ${idx} 아래에 자식이 없으므로 sift down을 멈춥니다.`, '더 이상 비교할 자식이 없으면 현재 위치가 이 값의 자리입니다.', {
          phase: 'sort',
          activeIndex: idx,
        });
        break;
      }

      let smallest = l;
      if (r < heap.length) {
        push([13, 14], '두 자식 중 더 작은 쪽 고르기', `${heap[l]}와 ${heap[r]} 중 더 작은 자식을 찾습니다.`, '부모는 더 작은 자식과 비교해야 최소 힙 조건을 가장 빠르게 회복할 수 있습니다.', {
          phase: 'sort',
          activeIndex: idx,
          compareIndices: [l, r],
          edge: [idx, l],
        });
        if (heap[r] < heap[l]) smallest = r;
      }

      push([15], '부모와 더 작은 자식 비교', `${heap[idx]}와 ${heap[smallest]}를 비교합니다.`, '부모가 더 크면 그 값은 아래로 내려가야 합니다.', {
        phase: 'sort',
        activeIndex: idx,
        compareIndices: [idx, smallest],
        edge: [idx, smallest],
      });

      if (heap[idx] <= heap[smallest]) {
        push([16], '힙 조건 복구 완료', `${heap[idx]} ≤ ${heap[smallest]} 이므로 현재 위치에서 정지합니다.`, '부모가 이미 더 작거나 같다면 이 아래 부분은 최소 힙이 됩니다.', {
          phase: 'sort',
          activeIndex: idx,
          compareIndices: [idx, smallest],
        });
        break;
      }

      const parentValue = heap[idx];
      const childValue = heap[smallest];
      [heap[idx], heap[smallest]] = [heap[smallest], heap[idx]];
      push([17, 18], '큰 값을 아래로 내리기', `${parentValue}가 ${childValue}보다 크므로 아래로 내려 보냅니다.`, '이 과정을 sift down이라고 합니다. 큰 값이 아래로 내려가면서 힙 구조가 다시 정리됩니다.', {
        phase: 'sort',
        activeIndex: smallest,
        swapIndices: [idx, smallest],
        edge: [idx, smallest],
      });
      idx = smallest;
    }
  }

  push([30], '힙 정렬 완료', '최소 힙에서 값을 하나씩 꺼내 오름차순 결과를 완성했습니다.', '이번 장면에서는 힙 구축과 최소값 추출이 분리되어 보이도록, 정렬 결과를 별도 output 배열에 쌓는 방식으로 표현했습니다.', {
    phase: 'done',
  });

  return baseScenario({
    id: 'heap-sort',
    label: '힙 정렬',
    subtitle: '최소 힙을 만든 뒤 루트의 최소값을 하나씩 꺼내 정렬 결과를 만든다.',
    complexity: '시간 O(n log n)',
    spaceComplexity: '공간 O(n)',
    badges: ['최소 힙', '힙 구축', 'sift up / sift down'],
    code: [
      'def sift_up(heap, idx):',
      '    while idx > 0:',
      '        parent = (idx - 1) // 2',
      '        if heap[parent] <= heap[idx]:',
      '            break',
      '        heap[parent], heap[idx] = heap[idx], heap[parent]',
      '        idx = parent',
      '',
      'def sift_down(heap, idx):',
      '    n = len(heap)',
      '    while True:',
      '        left = idx * 2 + 1',
      '        right = idx * 2 + 2',
      '        smallest = left',
      '        if right < n and heap[right] < heap[left]:',
      '            smallest = right',
      '        if heap[idx] <= heap[smallest]:',
      '            break',
      '        heap[idx], heap[smallest] = heap[smallest], heap[idx]',
      '        idx = smallest',
      '',
      'def heap_sort_min(input_arr):',
      '    heap = []',
      '    for value in input_arr:',
      '        heap.append(value)',
      '        sift_up(heap, len(heap) - 1)',
      '    output = []',
      '    while heap:',
      '        output.append(heap[0])',
      '        last = heap.pop()',
      '        if heap:',
      '            heap[0] = last',
      '            sift_down(heap, 0)',
      '    return output',
    ],
    renderer: 'heap-sort',
    legend: [
      { label: '현재 보는 노드/칸', tone: 'highlight' },
      { label: '비교 중인 칸', tone: 'key' },
      { label: '교환 중인 칸', tone: 'danger' },
      { label: '정렬 결과에 들어간 값', tone: 'good' },
    ],
    notes: [
      { title: '핵심 포인트', body: '힙 정렬은 "완전 이진 트리 + 부모/자식 비교" 흐름으로 이해하면 가장 쉽습니다.' },
      { title: '보기 좋은 포인트', body: '힙 구축 단계에서는 작은 값이 위로 올라오고, 정렬 단계에서는 루트의 최소값이 output으로 빠져나갑니다.' },
      { title: '실수하기 쉬운 부분', body: '최소 힙을 쓴다고 해서 배열 전체가 바로 정렬되는 것은 아닙니다. 최소값을 꺼낸 뒤에도 다시 힙을 복구해야 합니다.' },
    ],
    steps,
  });
}

function buildTraversalScenario(type) {
  const labels = {
    preorder: '전위 순회',
    inorder: '중위 순회',
    postorder: '후위 순회',
  };

  const subtitles = {
    preorder: '현재 노드를 먼저 방문한 뒤 왼쪽, 오른쪽으로 내려간다.',
    inorder: '왼쪽을 먼저 보고, 현재 노드를 방문한 뒤 오른쪽으로 간다.',
    postorder: '왼쪽과 오른쪽을 모두 처리한 뒤 현재 노드를 방문한다.',
  };

  const codeByType = {
    preorder: [
      'def preorder(node):',
      '    if node is None:',
      '        return',
      '    visit(node)',
      '    preorder(node.left)',
      '    preorder(node.right)',
    ],
    inorder: [
      'def inorder(node):',
      '    if node is None:',
      '        return',
      '    inorder(node.left)',
      '    visit(node)',
      '    inorder(node.right)',
    ],
    postorder: [
      'def postorder(node):',
      '    if node is None:',
      '        return',
      '    postorder(node.left)',
      '    preorder(node.right)',
      '    visit(node)',
    ],
  };
  codeByType.postorder[4] = '    postorder(node.right)';

  const steps = [];
  const visitedOrder = [];
  const callStack = [];

  function push(lines, title, summary, detail, current, action, edge, extra = {}) {
    const actionLabels = {
      call: '재귀 함수 진입',
      visit: 'visit(node) 수행',
      left: '왼쪽 자식으로 이동',
      right: '오른쪽 자식으로 이동',
      return: '상위 호출로 복귀',
      base: '기저 사례에서 즉시 반환',
      idle: '현재 노드를 확인하는 중',
    };
    steps.push(createStep({
      lines,
      title,
      summary,
      detail,
      metrics: [
        metric('현재 노드', current || 'None'),
        metric('호출 스택', callStack.length ? callStack.join(' → ') : '비어 있음'),
        metric('방문 순서', visitedOrder.join(' → ') || '아직 없음'),
        metric('현재 동작', extra.actionText || actionLabels[action] || '없음'),
      ],
      visual: {
        tree: TRAVERSAL_TREE,
        current,
        callStack: callStack.slice(),
        visitedOrder: visitedOrder.slice(),
        edge,
        action,
        backtracking: Boolean(extra.backtracking),
        returnTarget: extra.returnTarget || null,
      },
    }));
  }

  function traverse(nodeId) {
    push([1], '함수 진입', `${nodeId || 'None'}에 대한 ${labels[type]} 함수를 호출했습니다.`, '재귀는 같은 일을 더 작은 부분 문제에 다시 적용하는 방식입니다.', nodeId, 'call', null);

    if (nodeId === null) {
      push([2, 3], '기저 사례', 'node가 None이므로 더 내려가지 않고 바로 되돌아갑니다.', '리프 노드 아래에서는 더 방문할 노드가 없기 때문에 이 자리에서 곧바로 반환합니다.', null, 'base', null);
      return;
    }

    callStack.push(nodeId);
    const node = TRAVERSAL_TREE.nodes[nodeId];

    if (type === 'preorder') {
      visitedOrder.push(nodeId);
      push([4], '현재 노드 방문', `${nodeId}를 먼저 방문합니다.`, '전위 순회는 현재 노드를 가장 먼저 visit합니다.', nodeId, 'visit', null);
    }

    if (node.left) {
      push([type === 'preorder' ? 5 : 4], '왼쪽 서브트리로 이동', `${nodeId}에서 왼쪽 자식 ${node.left}(으)로 내려갑니다.`, '재귀 호출이 실제로 내려가는 방향은 현재 노드에서 왼쪽 자식으로 향하는 화살표입니다.', nodeId, 'left', [nodeId, node.left]);
      traverse(node.left);
    } else {
      push([type === 'preorder' ? 5 : 4], '왼쪽 자식 없음', `${nodeId}의 왼쪽 자식이 없어 더 내려가지 않습니다.`, '이 방향에서는 더 볼 노드가 없으므로 현재 노드로 다시 제어가 돌아옵니다.', nodeId, 'idle', null, { actionText: '왼쪽 방향 종료' });
    }

    if (type === 'inorder') {
      visitedOrder.push(nodeId);
      push([5], '현재 노드 방문', `${nodeId}를 왼쪽 처리 후 방문합니다.`, '중위 순회는 왼쪽을 모두 본 뒤 현재 노드를 visit합니다.', nodeId, 'visit', null);
    }

    if (node.right) {
      push([type === 'postorder' ? 5 : 6], '오른쪽 서브트리로 이동', `${nodeId}에서 오른쪽 자식 ${node.right}(으)로 내려갑니다.`, '왼쪽 처리가 끝난 뒤에는 같은 방식으로 오른쪽 가지를 탐색합니다.', nodeId, 'right', [nodeId, node.right]);
      traverse(node.right);
    } else {
      push([type === 'postorder' ? 5 : 6], '오른쪽 자식 없음', `${nodeId}의 오른쪽 자식이 없어 더 내려가지 않습니다.`, '이제 현재 노드에서 할 일이 남아 있는지 확인한 뒤, 없으면 부모로 돌아갑니다.', nodeId, 'idle', null, { actionText: '오른쪽 방향 종료' });
    }

    if (type === 'postorder') {
      visitedOrder.push(nodeId);
      push([6], '현재 노드 방문', `${nodeId}를 가장 마지막에 방문합니다.`, '후위 순회는 왼쪽과 오른쪽을 모두 처리한 뒤 마지막에 현재 노드를 visit합니다.', nodeId, 'visit', null);
    }

    const parent = callStack.length > 1 ? callStack[callStack.length - 2] : null;
    push([1], parent ? '백트래킹' : '순회 종료', parent ? `${nodeId}에서 더 방문할 노드가 없어 부모 ${parent}(으)로 돌아갑니다.` : `${nodeId}까지 처리되어 전체 순회가 끝났습니다.`, parent ? '현재 노드의 왼쪽/오른쪽 처리가 모두 끝났으므로 상위 호출로 복귀합니다. 이 장면이 백트래킹입니다.' : '루트 호출까지 끝나면 재귀 호출 스택이 비고 순회가 종료됩니다.', nodeId, 'return', parent ? [nodeId, parent] : null, { backtracking: Boolean(parent), returnTarget: parent, actionText: parent ? '더 방문할 자식이 없어 부모로 복귀' : '전체 순회 종료' });
    callStack.pop();
  }

  traverse(TRAVERSAL_TREE.root);

  return baseScenario({
    id: `${type}`,
    label: labels[type],
    subtitle: subtitles[type],
    complexity: '시간 O(n)',
    spaceComplexity: '공간 O(h)',
    badges: ['재귀 기반', 'visit 시점 차이', '백트래킹 표시'],
    code: codeByType[type],
    renderer: 'tree-traversal',
    legend: [
      { label: '현재 보고 있는 노드', tone: 'highlight' },
      { label: '스택에 남아 있는 경로', tone: 'range' },
      { label: 'visit 완료 노드', tone: 'good' },
      { label: '부모로 복귀 중', tone: 'warn' },
    ],
    notes: [
      { title: '핵심 포인트', body: '전위/중위/후위의 차이는 이동 순서가 아니라 visit(node)를 언제 호출하느냐입니다.' },
      { title: '보기 좋은 포인트', body: '같은 트리를 같은 방향으로 내려가도, visit 시점과 백트래킹 시점 때문에 최종 순서가 달라집니다.' },
      { title: '실수하기 쉬운 부분', body: '리프 아래의 None은 "아무 일도 안 하는 빈 호출"처럼 보이지만, 재귀가 멈추고 되돌아오는 기준점이라는 점이 중요합니다.' },
    ],
    steps,
  });
}

function makeSyntaxStep({
  title,
  summary,
  detail,
  codeLines,
  language,
  chips,
  useCase,
  pitfall,
  checklist,
  nextFocus,
  focusLabel,
  metrics,
}) {
  return {
    lines: codeLines.map((_, index) => index + 1),
    title,
    summary,
    detail,
    codeLines,
    metrics,
    visual: {
      language,
      chips,
      useCase,
      pitfall,
      checklist,
      nextFocus,
      focusLabel,
      stageLabel: `${language} 핵심 문법`,
      hint: '위 카드는 언제 꺼내 쓰는지, 오른쪽 코드 패널은 바로 다시 타이핑하기 좋은 최소 템플릿을 보여줍니다.',
    },
  };
}
