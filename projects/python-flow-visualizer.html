    ],
    dynamic: [
      buildNQueenScenario(),
      buildSubsetSumPruningScenario(),
    ],
    recursion: [
      buildFactorialScenario(),
      buildFibonacciScenario(),
      buildCombinationScenario(),
    ],
    syntax: [
      buildPythonSyntaxScenario(),
      buildCppSyntaxScenario(),
    ],
  };

  const byId = {};
  Object.entries(sections).forEach(([sectionKey, list]) => {
    list.forEach((scenario, index) => {
      scenario.sectionKey = sectionKey;
      scenario.sectionOrder = index;
      byId[scenario.id] = scenario;
    });
  });

  return { sections, byId };
}

function visualHint(scenario, step) {
  const visual = step.visual || {};
  const renderer = scenario.renderer;
  if (renderer === 'syntax-reference') {
    return visual.hint || '문법 카드는 개념, 사용 맥락, 실수 포인트를 동시에 보여 주도록 구성했습니다.';
  }
  if (renderer === 'graph') {
    if (visual.structureType === 'stack' && visual.backtracking) {
      return '노란 노드는 지금 스택에서 꺼내 처리하는 노드입니다. 화살표로 가리키는 노드 즉 스택 TOP이 실제 다음 차례입니다.';
    }
    return visual.structureType === 'stack'
      ? '노란 노드는 지금 스택에서 꺼내 처리하는 노드입니다. 파란 배지는 다음에 확인할 이웃이고, 아래 스택 TOP이 실제 다음 차례입니다.'
      : '노란 노드는 지금 큐 FRONT에서 꺼낸 노드입니다. 파란 배지는 다음에 확인할 이웃이고, 아래 큐 FRONT가 실제 다음 차례입니다.';
  }
  if (renderer === 'tree-search') {
    return '현재 노드에서 값 비교를 끝내면 왼쪽 또는 오른쪽 자식 한 쪽으로만 내려갑니다. 아래 화살표가 바로 이번 단계의 이동 방향입니다.';
  }
  if (renderer === 'tree-traversal') {
    return visual.backtracking
      ? '이번 장면은 백트래킹입니다. 더 볼 자식이 없어서 현재 노드에서 부모 호출로 제어가 돌아갑니다.'
      : '노란 노드는 지금 함수가 보고 있는 노드이고, 점선이 있는 노드들은 아직 호출 스택 안에 남아 있는 경로입니다. 초록 노드는 visit가 끝난 노드입니다.';
  }
  if (renderer === 'factorial-recursion') {
    return '팩토리얼은 한 줄로 내려가는 선형 재귀입니다. 왼쪽 카드에서 오른쪽 카드로 갈수록 더 작은 문제를 호출하고, 반환 단계에서는 다시 오른쪽에서 왼쪽으로 값이 올라옵니다.';
  }
  if (renderer === 'recursion') {
    return '노란 프레임이 지금 실행 중인 호출입니다. 하위 호출을 만들 때는 더 아래로 내려가고, 계산이 끝나면 반환값을 들고 위로 올라옵니다.';
  }
  if (renderer === 'pruning-tree') {
    return '빨간 분기는 더 내려가도 답이 될 수 없어서 잘라낸 가지입니다. 노란 위치에서 조건을 확인한 뒤, 가능한 경우에만 다음 분기로 이동합니다.';
  }
  if (renderer === 'nqueen') {
    return '노란 칸이 지금 검사 중인 자리입니다. 안전하면 퀸을 놓고 다음 행으로 내려가고, 막히면 이전 행으로 돌아와 다른 열을 시도합니다.';
  }
  if (renderer === 'linear-structure') {
    return visual.structureType === 'stack'
      ? '스택은 TOP 한 곳에서만 넣고(push) 빼는(pop) 구조입니다. 가장 위 칸이 지금 연산이 일어나는 위치입니다.'
      : '큐는 REAR로 넣고(enqueue), FRONT로 빼는(dequeue) 구조입니다. 양 끝의 역할이 서로 다르다는 점을 같이 보세요.';
  }
  if (renderer === 'counting') {
    return '계수 정렬은 입력 배열을 읽어 count 배열에 빈도를 누적하고, 마지막에는 그 개수만큼 output 배열에 값을 채워 넣는 과정입니다.';
  }
  if (renderer === 'heap-sort') {
    return visual.phase === 'build'
      ? '지금은 최소 힙을 만드는 단계입니다. 더 작은 값은 부모보다 위로 올라오고, 루트에는 항상 최소값이 오도록 정리됩니다.'
      : '지금은 최소 힙에서 루트값을 꺼내 정렬 결과로 보내는 단계입니다. 루트에 마지막 값을 올린 뒤, 다시 아래로 내려 보내며 힙을 복구합니다.';
  }
  if (renderer.startsWith('sorting')) {
    return '막대와 배열 표는 같은 배열을 두 방식으로 보여줍니다. 노란 칸은 지금 비교하거나 움직이는 대상이고, 초록 칸은 위치가 확정된 값입니다.';
  }
  return '현재 강조된 요소와 화살표를 따라가면 이번 단계에서 어디를 보고, 다음에 어디로 이동하는지 바로 확인할 수 있습니다.';
}

function getSceneMotionClass(renderer, visual = {}) {
  if (Array.isArray(visual.stack) || Array.isArray(visual.callStack) || visual.structureType === 'stack') {
    return 'scene-stable';
  }
  if (renderer === 'tree-traversal' || renderer === 'factorial-recursion' || renderer === 'recursion' || renderer === 'pruning-tree' || renderer === 'nqueen') {
    return 'scene-stable';
  }
  return 'scene-fade';
}

function renderSortingVisual(visual, renderer, step) {
  const [rangeStart, rangeEnd] = visual.activeRange || [null, null];
  const mergeWorkspace = visual.leftPart || visual.rightPart || visual.temp;
  const infoCards = [];
  if (visual.comparing && visual.comparing.length) infoCards.push({ tag: '비교 중', label: visual.comparing.map((index) => `인덱스 ${index}`).join(' ↔ '), tone: 'highlight' });
  if (visual.keyIndex !== undefined && visual.keyIndex !== null) infoCards.push({ tag: '기준값', label: `인덱스 ${visual.keyIndex}`, tone: 'warn' });
  if (visual.pivotIndex !== undefined && visual.pivotIndex !== null) infoCards.push({ tag: 'pivot', label: `인덱스 ${visual.pivotIndex}`, tone: 'warn' });
  if (visual.currentWrite !== undefined && visual.currentWrite !== null) infoCards.push({ tag: '쓰기 위치', label: `인덱스 ${visual.currentWrite}`, tone: 'good' });
  if (visual.activeRange && rangeStart !== null && rangeEnd !== null) infoCards.push({ tag: '현재 구간', label: `${rangeStart} ~ ${rangeEnd}`, tone: 'range' });

  const rangeIndices = visual.activeRange && rangeStart !== null && rangeEnd !== null
    ? Array.from({ length: rangeEnd - rangeStart + 1 }, (_, offset) => rangeStart + offset)
    : visual.items.map((_, index) => index);
  const dimIndices = visual.activeRange && rangeStart !== null && rangeEnd !== null
    ? visual.items.map((_, index) => index).filter((index) => index < rangeStart || index > rangeEnd)
    : [];

  const workspaceCards = [];
  if (mergeWorkspace) {
    workspaceCards.push(renderArrayTable(visual.leftPart || [], { title: 'left_part', arrayName: 'left_part', compact: true }));
    workspaceCards.push(renderArrayTable(visual.rightPart || [], { title: 'right_part', arrayName: 'right_part', compact: true }));
    workspaceCards.push(renderArrayTable(visual.temp || [], { title: 'temp', arrayName: 'temp', compact: true }));
  }

  if (visual.stack) {
    workspaceCards.push(`
      <div class="workspace-card">
        <div class="workspace-head">재귀 호출 스택</div>
        ${renderStackBox(visual.stack, { compact: true, topLabel: 'TOP · 지금 처리 중', bottomLabel: 'BOTTOM · 먼저 호출됨', currentIndex: visual.stack.length - 1 })}
      </div>
    `);
  }

  return `
    <div class="sort-layout ${getSceneMotionClass(renderer, visual)}">
      ${renderDirectionStrip(infoCards)}
      ${renderArrayTable(visual.items, {
        title: '배열 상태',
        arrayName: 'arr',
        rangeIndices,
        dimIndices,
        comparingIndices: visual.comparing || [],
        currentIndices: [visual.currentWrite].filter((value) => value !== null && value !== undefined),
        keyIndices: [visual.keyIndex].filter((value) => value !== null && value !== undefined),
        pivotIndices: [visual.pivotIndex].filter((value) => value !== null && value !== undefined),
        shiftedIndices: visual.shifted || [],
        sortedIndices: visual.sorted || [],
        fixedIndices: visual.fixed || [],
      })}
      ${workspaceCards.length ? `<div class="workspace-box">${workspaceCards.join('')}</div>` : ''}
    </div>
  `;
}

function renderCountingVisual(visual, step) {
  const outputValues = expandValuesToLength(visual.output, visual.input.length, '');
  const currentOutputIndex = visual.output.length ? [visual.output.length - 1] : [];
  const cards = [
    { tag: '읽는 위치', label: visual.currentInputIndex === null || visual.currentInputIndex === undefined ? '없음' : `input[${visual.currentInputIndex}]`, tone: 'highlight' },
    { tag: '세는 값', label: visual.currentCountValue === null || visual.currentCountValue === undefined ? '없음' : String(visual.currentCountValue), tone: 'warn' },
    { tag: 'output', label: visual.output.length ? `현재 길이 ${visual.output.length}` : '아직 비어 있음', tone: 'good' },
  ];
  return `
    <div class="count-layout ${getSceneMotionClass('counting', visual)}">
      ${renderDirectionStrip(cards)}
      ${renderArrayTable(visual.input, {
        title: '입력 배열',
        arrayName: 'input',
        currentIndices: [visual.currentInputIndex].filter((value) => value !== null && value !== undefined),
      })}
      ${renderArrayTable(visual.count, {
        title: 'count 배열',
        arrayName: 'count',
        indexLabel: 'value',
        valueLabel: 'count',
        currentIndices: [visual.currentCountValue].filter((value) => value !== null && value !== undefined),
      })}
      ${renderArrayTable(outputValues, {
        title: 'output 배열',
        arrayName: 'output',
        currentIndices: currentOutputIndex,
        sortedIndices: visual.output.map((_, index) => index),
      })}
    </div>
  `;
}

function renderGraphVisual(visual, step) {
  const nodes = visual.graph.nodes;
  const edges = visual.graph.edges;
  const isStack = visual.structureType === 'stack';
  const structureTitle = isStack ? 'DFS 작업 스택' : 'BFS 작업 큐';
  const currentLabel = visual.currentLabel || '현재';
  const neighborLabel = visual.neighborLabel || '다음';
  const cards = [
    { tag: currentLabel, label: visual.current ? visual.current : '없음', tone: 'highlight' },
    { tag: neighborLabel, label: visual.neighbor ? visual.neighbor : '없음', tone: visual.backtracking ? 'good' : 'warn' },
    { tag: isStack ? '스택 top' : '큐 front', label: visual.structure.length ? String(isStack ? visual.structure[visual.structure.length - 1] : visual.structure[0]) : '비어 있음', tone: 'good' },
  ];

  return `
    <div class="graph-layout ${getSceneMotionClass('graph', visual)}">
      ${renderDirectionStrip(cards)}
      <div class="graph-stage compact-stage">
        <svg viewBox="0 0 460 220" role="img" aria-label="graph">
          ${createArrowDefs('graph-flow')}
          ${edges.map(([from, to]) => `
            <line class="graph-edge"
                  x1="${nodes[from].x}" y1="${nodes[from].y}"
                  x2="${nodes[to].x}" y2="${nodes[to].y}"></line>
          `).join('')}
          ${visual.current && visual.neighbor ? renderMotionArrow(`graph-edge active arrow ${visual.backtracking ? 'backtracking' : ''}`.trim(), visual.current, visual.neighbor, nodes, visual.backtracking ? 'graph-flow-good' : 'graph-flow-warn') : ''}
          ${Object.entries(nodes).map(([id, pos]) => {
            const classes = ['graph-node'];
            if (visual.current === id) classes.push('current');
            else if (visual.order.includes(id)) classes.push('done');
            else if (visual.structure.includes(id) || visual.visited.includes(id)) classes.push('frontier');
            if (visual.neighbor === id) classes.push(visual.backtracking ? 'frontier' : 'checking');
            return `
              <g class="${classes.join(' ')}">
                <circle cx="${pos.x}" cy="${pos.y}" r="25"></circle>
                <text x="${pos.x}" y="${pos.y + 1}">${id}</text>
              </g>
            `;
          }).join('')}
          ${visual.current ? renderSvgBadge(nodes[visual.current], currentLabel, 'current', 0, -42) : ''}
          ${visual.neighbor ? renderSvgBadge(nodes[visual.neighbor], neighborLabel, visual.backtracking ? 'done' : 'next', 0, 34) : ''}
        </svg>
      </div>

      <div class="workspace-box">
        <div class="workspace-card structure-card">
          <div class="workspace-head">${structureTitle}</div>
          ${isStack
            ? renderStackBox(visual.structure, { compact: true, topLabel: 'TOP · 다음에 꺼냄', bottomLabel: 'BOTTOM', currentIndex: visual.structure.length - 1, focusValue: visual.current || visual.neighbor })
            : renderQueueBox(visual.structure, { compact: true, focusValue: visual.current || visual.neighbor })}
        </div>
        <div class="workspace-card">
          <div class="workspace-head">방문 순서</div>
          <div class="token-row">${renderTokens(visual.order)}</div>
        </div>
        ${visual.hideVisitedPanel ? '' : `
          <div class="workspace-card">
            <div class="workspace-head">${visual.visitedLabel || '방문 집합'}</div>
            <div class="token-row">${renderTokens(visual.visited)}</div>
          </div>
        `}
        ${visual.hidePathPanel ? '' : `
          <div class="workspace-card">
            <div class="workspace-head">탐색 경로</div>
            <div class="token-row">${renderTokens(visual.path || [])}</div>
          </div>
        `}
      </div>
    </div>
  `;
}

function renderTreeSearchVisual(visual, step) {
  const tree = visual.tree.nodes;
  const edges = Object.entries(tree).flatMap(([id, node]) => {
    const result = [];
    if (node.left) result.push([id, node.left]);
    if (node.right) result.push([id, node.right]);
    return result;
  });
  const pathEdgeSet = pathPairs(visual.path);
  const direction = visual.edge && visual.edge[1]
    ? (tree[visual.edge[0]].left === visual.edge[1] ? '왼쪽으로 내려감' : '오른쪽으로 내려감')
    : '현재 값을 비교 중';
  const cards = [
    { tag: '현재 노드', label: visual.current || '없음', tone: 'highlight' },
    { tag: '다음 이동', label: visual.edge && visual.edge[1] ? `${visual.edge[1]} (${direction})` : '없음', tone: 'warn' },
    { tag: '목표 값', label: String(visual.target), tone: 'good' },
  ];

  return `
    <div class="tree-layout ${getSceneMotionClass('tree-search', visual)}">
      ${renderDirectionStrip(cards)}
      <div class="tree-stage compact-stage">
        <svg viewBox="0 0 600 410" role="img" aria-label="tree-search">
          ${createArrowDefs('tree-search')}
          ${edges.map(([from, to]) => `
            <line class="tree-edge ${pathEdgeSet.has(`${from}->${to}`) ? 'active' : ''}"
                  x1="${tree[from].x}" y1="${tree[from].y}"
                  x2="${tree[to].x}" y2="${tree[to].y}"></line>
          `).join('')}
          ${visual.edge && visual.edge[1] ? renderMotionArrow('tree-edge arrow', visual.edge[0], visual.edge[1], tree, 'tree-search-warn') : ''}
          ${Object.entries(tree).map(([id, node]) => {
            const classes = ['tree-node'];
            if (visual.found === id) classes.push('done');
            else if (visual.current === id) classes.push('current');
            else if (visual.path.includes(id)) classes.push('path');
            return `
              <g class="${classes.join(' ')}">
                <circle cx="${node.x}" cy="${node.y}" r="24"></circle>
                <text x="${node.x}" y="${node.y + 1}">${id}</text>
              </g>
            `;
          }).join('')}
          ${visual.current ? renderSvgBadge(tree[visual.current], '현재', 'current', 0, -44) : ''}
          ${visual.edge && visual.edge[1] ? renderSvgBadge(tree[visual.edge[1]], '다음', 'next', 0, 34) : ''}
          ${visual.found ? renderSvgBadge(tree[visual.found], '찾음', 'done', 0, 34) : ''}
        </svg>
      </div>
      <div class="workspace-box">
        <div class="workspace-card">
          <div class="workspace-head">탐색 경로</div>
          <div class="token-row">${renderTokens(visual.path)}</div>
        </div>
        <div class="workspace-card">
          <div class="workspace-head">목표 값</div>
          <div class="token-row">${renderTokens([visual.target])}</div>
        </div>
      </div>
    </div>
  `;
}

function renderTreeTraversalVisual(visual, step) {
  const tree = visual.tree.nodes;
  const edges = Object.entries(tree).flatMap(([id, node]) => {
    const result = [];
    if (node.left) result.push([id, node.left]);
    if (node.right) result.push([id, node.right]);
    return result;
  });
  const stackPathEdges = pathPairs(visual.callStack);
  const stackTop = visual.callStack.length ? visual.callStack[visual.callStack.length - 1] : null;
  const actionLabel = visual.backtracking && visual.returnTarget
    ? `${visual.current} → ${visual.returnTarget} 로 백트래킹`
    : visual.edge && visual.edge[1]
      ? `${visual.edge[0]} → ${visual.edge[1]}`
      : (visual.action === 'visit' ? 'visit(node) 수행' : '현재 노드 확인');
  const cards = [
    { tag: '현재 노드', label: visual.current || stackTop || '없음', tone: 'highlight' },
    { tag: '현재 동작', label: actionLabel, tone: 'warn' },
    { tag: '방문 순서', label: visual.visitedOrder.length ? visual.visitedOrder.join(' → ') : '아직 방문 전', tone: 'good' },
  ];

  return `
    <div class="tree-layout ${getSceneMotionClass('tree-traversal', visual)}">
      ${renderDirectionStrip(cards)}
      <div class="tree-stage compact-stage">
        <svg viewBox="0 0 600 320" role="img" aria-label="traversal-tree">
          ${createArrowDefs('tree-traversal')}
          ${edges.map(([from, to]) => `
            <line class="tree-edge ${stackPathEdges.has(`${from}->${to}`) ? 'active' : ''}"
                  x1="${tree[from].x}" y1="${tree[from].y}"
                  x2="${tree[to].x}" y2="${tree[to].y}"></line>
          `).join('')}
          ${visual.edge && visual.edge[1]
            ? renderMotionArrow(
                'tree-edge arrow',
                visual.edge[0],
                visual.edge[1],
                tree,
                visual.backtracking ? 'tree-traversal-good' : 'tree-traversal-warn',
                visual.backtracking ? 'good' : 'warn'
              )
            : ''}
          ${Object.entries(tree).map(([id, node]) => {
            const classes = ['tree-node'];
            if (visual.callStack.includes(id) && visual.current !== id) classes.push('stacked');
            if (visual.returnTarget === id) classes.push('return-target');
            if (visual.backtracking && visual.current === id) classes.push('backtrack');
            else if (visual.current === id) classes.push('current');
            else if (visual.visitedOrder.includes(id)) classes.push('done');
            else if (visual.callStack.includes(id)) classes.push('path');
            return `
              <g class="${classes.join(' ')}">
                <circle cx="${node.x}" cy="${node.y}" r="24"></circle>
                <text x="${node.x}" y="${node.y + 1}">${id}</text>
              </g>
            `;
          }).join('')}
          ${visual.current ? renderSvgBadge(tree[visual.current], visual.backtracking ? '복귀 중' : '현재', visual.backtracking ? 'next' : 'current', 0, -44) : ''}
          ${visual.backtracking && visual.returnTarget ? renderSvgBadge(tree[visual.returnTarget], '돌아갈 곳', 'done', 0, 34) : ''}
          ${!visual.backtracking && visual.edge && visual.edge[1] ? renderSvgBadge(tree[visual.edge[1]], '다음', 'next', 0, 34) : ''}
        </svg>
      </div>
      <div class="workspace-box">
        <div class="workspace-card structure-card">
          <div class="workspace-head">호출 스택</div>
          ${renderStackBox(visual.callStack, { compact: true, topLabel: 'TOP · 지금 확인 중', bottomLabel: 'BOTTOM', currentIndex: visual.callStack.length - 1, focusValue: stackTop })}
        </div>
        <div class="workspace-card">
          <div class="workspace-head">방문 순서</div>
          <div class="token-row">${renderTokens(visual.visitedOrder)}</div>
        </div>
      </div>
    </div>
  `;
}

function renderFactorialVisual(visual) {
  const values = visual.sequence || [4, 3, 2, 1];
  const nodeByValue = {};
  (visual.layout.nodes || []).forEach((node) => {
    const match = /fact\((\d+)\)/.exec(node.label);
    if (match) nodeByValue[Number(match[1])] = node;
  });
  const currentMatch = visual.currentNodeId ? /fact-(\d+)/.exec(visual.currentNodeId) : null;
  const currentValue = currentMatch ? Number(currentMatch[1]) : null;
  const currentStatus = visual.currentNodeId ? visual.nodeStates[visual.currentNodeId]?.status : null;
  const maxValue = Math.max(...values);

  let moveText = '현재 프레임에서 기저 사례인지 확인합니다.';
  let moveDirection = '멈춤';
  if ((currentStatus === 'waiting' || currentStatus === 'current') && currentValue && currentValue > 1) {
    moveText = `문제를 더 작은 factorial(${currentValue - 1})로 줄여 내려갑니다.`;
    moveDirection = `${currentValue} → ${currentValue - 1}`;
  } else if (currentStatus === 'done' && currentValue && currentValue < maxValue) {
    moveText = `계산된 결과를 부모 factorial(${currentValue + 1})에게 돌려줍니다.`;
    moveDirection = `${currentValue} → ${currentValue + 1}`;
  } else if (currentStatus === 'done' && currentValue === 1) {
    moveText = '가장 작은 문제 factorial(1)에서 1을 반환하며 올라가기 시작합니다.';
    moveDirection = '1 → 2';
  }

  return `
    <div class="factorial-layout">
      ${renderDirectionStrip([
        { tag: '현재 프레임', label: currentValue ? `factorial(${currentValue})` : '없음', tone: 'highlight' },
        { tag: '내려가기 규칙', label: visual.recurrence || 'n! = n × (n-1)!', tone: 'warn' },
        { tag: '멈추는 규칙', label: visual.baseCase || 'n <= 1 이면 1 반환', tone: 'good' },
      ])}
      <div class="factorial-stage compact-stage">
        <div class="factorial-chain">
          ${values.map((value, index) => {
            const node = nodeByValue[value];
            const state = node ? (visual.nodeStates[node.id] || { status: 'idle', result: null }) : { status: 'idle', result: null };
            const classes = ['factorial-card'];
            if (state.status === 'current') classes.push('current');
            else if (state.status === 'waiting') classes.push('waiting');
            else if (state.status === 'done') classes.push('done');
            const smallerNode = nodeByValue[value - 1];
            const smallerResult = smallerNode && visual.nodeStates[smallerNode.id] ? visual.nodeStates[smallerNode.id].result : null;
            const formula = value <= 1
              ? (state.result !== null ? `1을 반환 → ${state.result}` : '기저 사례: 1 반환 준비')
              : state.result !== null && smallerResult !== null
                ? `${value} × ${smallerResult} = ${state.result}`
                : `${value} × factorial(${value - 1}) 계산 대기`;
            const statusLabel = state.status === 'current' ? '지금 조건을 검사하거나 곱셈을 계산하는 중'
              : state.status === 'waiting' ? `factorial(${value - 1}) 결과를 기다리는 중`
              : state.status === 'done' ? '반환값 계산이 끝나 위로 올라갈 준비 완료'
              : '아직 호출되지 않음';
            let arrowHtml = '';
            if (index < values.length - 1) {
              const childValue = values[index + 1];
              const activeBack = currentStatus === 'done' && currentValue === childValue;
              arrowHtml = `
                <div class="factorial-arrow ${activeBack ? 'back' : ''}">
                  <div class="factorial-arrow-main">${activeBack ? '←' : '→'}</div>
                  <div class="factorial-arrow-sub">${activeBack ? `factorial(${childValue}) 결과를 factorial(${value})에 반영` : `다음으로 factorial(${childValue}) 호출`}</div>
                </div>
              `;
            }
            return `
              <div class="factorial-step-wrap">
                <div class="${classes.join(' ')}">
                  <div class="factorial-card-tag">frame ${index}</div>
                  <div class="factorial-label">factorial(${value})</div>
                  <div class="factorial-status">${statusLabel}</div>
                  <div class="factorial-result ${state.result === null || state.result === undefined ? 'muted' : ''}">${formula}</div>
                </div>
                ${arrowHtml}
              </div>
            `;
          }).join('')}
        </div>
      </div>
      ${renderDirectionStrip([
        { tag: '지금 흐름', label: moveDirection, tone: 'warn' },
        { tag: '해석', label: moveText, tone: 'good' },
      ])}
      <div class="workspace-box">
        <div class="workspace-card structure-card">
          <div class="workspace-head">현재 호출 스택</div>
          ${renderStackBox(visual.callStack, { compact: true, topLabel: 'TOP · 지금 실행 중', bottomLabel: 'BOTTOM · 가장 먼저 호출됨', currentIndex: visual.callStack.length - 1, focusValue: visual.callStack.length ? visual.callStack[visual.callStack.length - 1] : null })}
        </div>
        ${renderArrayTable(values.map((value) => {
          const node = nodeByValue[value];
          const state = node ? visual.nodeStates[node.id] : null;
          return state && state.result !== null && state.result !== undefined ? state.result : '';
        }), {
          title: '반환값 진행 표',
          arrayName: 'returns',
          indexLabels: values,
          currentIndices: currentValue ? [values.indexOf(currentValue)] : [],
          sortedIndices: values.filter((value) => {
            const node = nodeByValue[value];
            return node && visual.nodeStates[node.id] && visual.nodeStates[node.id].result !== null && visual.nodeStates[node.id].result !== undefined;
          }).map((value) => values.indexOf(value)),
        })}
      </div>
    </div>
  `;
}

function renderPruningTreeVisual(visual, step) {
  const fitted = fitLayout(visual.layout, 820, 320, 38);
  const allNodes = {};
  fitted.nodes.forEach((node) => {
    allNodes[node.id] = node;
  });
  const visibleSet = new Set(visual.visibleNodeIds || fitted.nodes.map((node) => node.id));
  const nodes = fitted.nodes.filter((node) => visibleSet.has(node.id));
  const edges = fitted.edges.filter(([from, to]) => visibleSet.has(from) && visibleSet.has(to));
  const currentPath = pathPairs(visual.nodePath || []);
  const currentLabel = visual.currentNodeId && allNodes[visual.currentNodeId] ? allNodes[visual.currentNodeId].label : '없음';
  const nextLabel = visual.edge && visual.edge[1] && allNodes[visual.edge[1]] ? allNodes[visual.edge[1]].label : '없음';
  const cards = [
    { tag: '현재 분기', label: currentLabel, tone: 'highlight' },
    { tag: '다음 분기', label: nextLabel, tone: 'warn' },
    { tag: '원 하나의 의미', label: '각 원은 (현재 합 sum, 다음 인덱스 i) 상태를 뜻함', tone: 'range' },
    { tag: '가지치기 의미', label: '조건을 만족하지 못하면 그 아래는 더 보지 않음', tone: 'good' },
  ];

  return `
    <div class="recursion-layout pruning-layout scene-stable">
      ${renderDirectionStrip(cards)}
      <div class="recursion-stage compact-stage pruning-stage">
        <svg viewBox="0 0 ${fitted.width} ${fitted.height}" role="img" aria-label="pruning-tree">
          ${createArrowDefs('prune-flow')}
          ${edges.map(([from, to]) => {
            const toState = visual.nodeStates[to] || { status: 'idle' };
            const classes = ['call-edge'];
            if (currentPath.has(`${from}->${to}`)) classes.push('active');
            if (toState.status === 'pruned') classes.push('pruned');
            return `
              <line class="${classes.join(' ')}"
                    x1="${allNodes[from].x}" y1="${allNodes[from].y}"
                    x2="${allNodes[to].x}" y2="${allNodes[to].y}"></line>
            `;
          }).join('')}
          ${visual.edge && visual.edge[1] ? renderMotionArrow('call-edge arrow', visual.edge[0], visual.edge[1], allNodes, 'prune-flow-warn') : ''}
          ${nodes.map((node) => {
            const state = visual.nodeStates[node.id] || { status: 'idle', note: '' };
            const classes = ['call-node'];
            if (state.status === 'current') classes.push('current');
            else if (state.status === 'waiting') classes.push('waiting');
            else if (state.status === 'done') classes.push('done');
            else if (state.status === 'pruned') classes.push('pruned');
            else if (state.status === 'dead') classes.push('dead');
            const metaText = node.meta ? `i=${node.meta.idx}` : '';
            const noteText = state.note && state.note !== 'start' ? state.note : metaText;
            const extra = noteText ? `<text class="result-text" x="${node.x}" y="${node.y + 22}">${escapeHtml(noteText)}</text>` : '';
            return `
              <g class="${classes.join(' ')}">
                <circle cx="${node.x}" cy="${node.y}" r="24"></circle>
                <text x="${node.x}" y="${node.y - 1}">${node.label}</text>
                ${extra}
              </g>
            `;
          }).join('')}
          ${visual.currentNodeId && allNodes[visual.currentNodeId] ? renderSvgBadge(allNodes[visual.currentNodeId], '현재', 'current', 0, -44) : ''}
          ${visual.edge && visual.edge[1] && allNodes[visual.edge[1]] ? renderSvgBadge(allNodes[visual.edge[1]], '다음', 'next', 0, 34) : ''}
        </svg>
      </div>
      <div class="workspace-box">
        <div class="workspace-card">
          <div class="workspace-head">숫자 목록 / 상태 의미</div>
          ${renderArrayTable(visual.nums, {
            title: '숫자 목록',
            arrayName: 'nums',
            currentIndices: visual.currentNodeId ? [allNodes[visual.currentNodeId].meta.idx].filter((idx) => idx !== undefined && idx !== null && idx < visual.nums.length) : [],
          })}
          <div class="heap-note">각 원의 큰 숫자는 현재까지 만든 합(sum), 아래 보조 텍스트는 다음에 볼 숫자의 인덱스(i)입니다.</div>
        </div>
        <div class="workspace-card structure-card">
          <div class="workspace-head">현재 호출 스택</div>
          ${renderStackBox(visual.callStack, { compact: true, topLabel: 'TOP · 지금 내려가는 분기', bottomLabel: 'BOTTOM', currentIndex: visual.callStack.length - 1, focusValue: visual.callStack.length ? visual.callStack[visual.callStack.length - 1] : null })}
        </div>
      </div>
    </div>
  `;
}

function renderNQueenVisual(visual, step) {
  const attackedSet = new Set((visual.attacked || []).map(([r, c]) => `${r}-${c}`));
  const candidateText = visual.candidate ? `(${visual.candidate[0]}, ${visual.candidate[1]})` : '없음';
  const currentRow = visual.stack.length ? visual.stack[visual.stack.length - 1] : null;
  const cards = [
    { tag: '현재 행', label: currentRow === null || currentRow === undefined ? '없음' : String(currentRow), tone: 'highlight' },
    { tag: '검사 중인 칸', label: candidateText, tone: 'warn' },
    { tag: '안전 여부', label: visual.safe === undefined ? '비교 중' : (visual.safe ? '놓을 수 있음' : '놓을 수 없음'), tone: 'good' },
  ];
  const board = Array.from({ length: visual.size }, (_, row) => Array.from({ length: visual.size }, (_, col) => {
    const classes = ['board-cell', (row + col) % 2 === 0 ? 'light' : 'dark'];
    if (attackedSet.has(`${row}-${col}`)) classes.push('attacked');
    if (visual.safe && visual.candidate && visual.candidate[0] === row && visual.candidate[1] === col) classes.push('safe');
    if (visual.candidate && visual.candidate[0] === row && visual.candidate[1] === col) classes.push('candidate');
    if (visual.queens[row] === col) classes.push('queen');
    const queen = visual.queens[row] === col ? '♛' : '';
    return `
      <div class="${classes.join(' ')}">
        <span class="board-pos">${row},${col}</span>
        <span>${queen}</span>
      </div>
    `;
  }).join('')).join('');

  return `
    <div class="nqueen-layout ${getSceneMotionClass('nqueen', visual)}">
      ${renderDirectionStrip(cards)}
      <div class="board-frame">
        <div class="board-grid">${board}</div>
      </div>
      <div class="workspace-box">
        <div class="workspace-card structure-card">
          <div class="workspace-head">호출 스택</div>
          ${renderStackBox(visual.stack, { compact: true, topLabel: 'TOP · 지금 채우는 행', bottomLabel: 'BOTTOM', currentIndex: visual.stack.length - 1, focusValue: visual.stack.length ? visual.stack[visual.stack.length - 1] : null })}
        </div>
        ${renderArrayTable(visual.queens.map((col) => col === -1 ? '' : col), {
          title: '배치된 퀸 배열',
          arrayName: 'queens',
          indexLabel: 'row',
          valueLabel: 'column',
          currentIndices: currentRow === null || currentRow === undefined ? [] : [currentRow],
          candidateIndices: visual.candidate ? [visual.candidate[0]] : [],
          dangerIndices: visual.safe === false && visual.candidate ? [visual.candidate[0]] : [],
          successIndices: visual.safe === true && visual.candidate ? [visual.candidate[0]] : [],
        })}
      </div>
    </div>
  `;
}

function renderHeapVisual(visual, step) {
  const layout = heapLayoutFromArray(visual.heap);
  const compareIndices = visual.compareIndices || [];
  const swapIndices = visual.swapIndices || [];
  const heapArray = expandValuesToLength(visual.heap, visual.totalSize, '');
  const outputArray = expandValuesToLength(visual.output, visual.totalSize, '');
  const cards = [
    { tag: '현재 단계', label: visual.phase === 'build' ? '최소 힙 구축' : (visual.phase === 'done' ? '정렬 완료' : '최소값 추출 / 힙 복구'), tone: 'highlight' },
    { tag: '현재 초점', label: visual.activeIndex === null || visual.activeIndex === undefined ? '없음' : `heap[${visual.activeIndex}]`, tone: 'warn' },
    { tag: '정렬 결과', label: visual.output.length ? fmtArray(visual.output) : '아직 없음', tone: 'good' },
  ];
  return `
    <div class="heap-layout ${getSceneMotionClass('heap-sort', visual)}">
      ${renderDirectionStrip(cards)}
      <div class="heap-stage compact-stage">
        ${visual.heap.length ? `
          <svg viewBox="0 0 ${layout.width} ${layout.height}" role="img" aria-label="heap-tree">
            ${createArrowDefs('heap-flow')}
            ${layout.edges.map(([from, to]) => {
              const classes = ['heap-edge'];
              if (visual.edge && visual.edge[0] === from && visual.edge[1] === to) {
                classes.push(swapIndices.includes(from) && swapIndices.includes(to) ? 'swap' : 'active');
              }
              return `
                <line class="${classes.join(' ')}"
                      x1="${layout.nodes[from].x}" y1="${layout.nodes[from].y}"
                      x2="${layout.nodes[to].x}" y2="${layout.nodes[to].y}"></line>
              `;
            }).join('')}
            ${visual.edge ? renderMotionArrow('heap-edge active', visual.edge[0], visual.edge[1], layout.nodes, swapIndices.includes(visual.edge[0]) && swapIndices.includes(visual.edge[1]) ? 'heap-flow-danger' : 'heap-flow-warn', swapIndices.includes(visual.edge[0]) && swapIndices.includes(visual.edge[1]) ? 'warn' : 'warn') : ''}
            ${Object.entries(layout.nodes).map(([id, node]) => {
              const idx = Number(id);
              const classes = ['heap-node'];
              if (idx === 0) classes.push('root');
              if (swapIndices.includes(idx)) classes.push('swap');
              else if (compareIndices.includes(idx)) classes.push('checking');
              if (visual.activeIndex === idx) classes.push('current');
              return `
                <g class="${classes.join(' ')}">
                  <circle cx="${node.x}" cy="${node.y}" r="25"></circle>
                  <text x="${node.x}" y="${node.y - 3}">${node.value}</text>
                  <text class="heap-index" x="${node.x}" y="${node.y + 34}">idx ${idx}</text>
                </g>
              `;
            }).join('')}
            ${visual.activeIndex !== null && visual.activeIndex !== undefined && layout.nodes[visual.activeIndex] ? renderSvgBadge(layout.nodes[visual.activeIndex], '현재', 'current', 0, -58) : ''}
          </svg>
        ` : `<div class="empty-text">현재 힙이 비어 있습니다.</div>`}
      </div>
      <div class="workspace-box">
        ${renderArrayTable(visual.input, { title: '입력 배열', arrayName: 'input' })}
        ${renderArrayTable(heapArray, {
          title: '현재 힙 배열',
          arrayName: 'heap',
          currentIndices: [visual.activeIndex].filter((value) => value !== null && value !== undefined),
          comparingIndices: compareIndices,
          shiftedIndices: swapIndices,
          keyIndices: [0].filter((index) => visual.heap.length > 0),
        })}
        ${renderArrayTable(outputArray, {
          title: '정렬 결과 배열',
          arrayName: 'output',
          sortedIndices: visual.output.map((_, index) => index),
          currentIndices: visual.output.length ? [visual.output.length - 1] : [],
        })}
      </div>
    </div>
  `;
}

function renderVisual(scenario, step) {
  let body = '';
  if (scenario.renderer.startsWith('sorting')) {
    body = renderSortingVisual(step.visual, scenario.renderer, step);
  } else if (scenario.renderer === 'counting') {
    body = renderCountingVisual(step.visual, step);
  } else if (scenario.renderer === 'linear-structure') {
    body = renderLinearStructureVisual(step.visual, step);
  } else if (scenario.renderer === 'graph') {
    body = renderGraphVisual(step.visual, step);
  } else if (scenario.renderer === 'tree-search') {
    body = renderTreeSearchVisual(step.visual, step);
  } else if (scenario.renderer === 'tree-traversal') {
    body = renderTreeTraversalVisual(step.visual, step);
  } else if (scenario.renderer === 'factorial-recursion') {
    body = renderFactorialVisual(step.visual, step);
  } else if (scenario.renderer === 'recursion') {
    body = renderRecursionVisual(step.visual, step);
  } else if (scenario.renderer === 'pruning-tree') {
    body = renderPruningTreeVisual(step.visual, step);
  } else if (scenario.renderer === 'nqueen') {
    body = renderNQueenVisual(step.visual, step);
  } else if (scenario.renderer === 'heap-sort') {
    body = renderHeapVisual(step.visual, step);
  } else if (scenario.renderer === 'syntax-reference') {
    body = renderSyntaxReferenceVisual(step.visual, step);
  }
  els.visualArea.innerHTML = renderVisualGuide(scenario, step) + renderMetricStrip(step) + body;
}

function renderSyntaxReferenceVisual(visual, step) {
  const chips = visual.chips || [];
  const checklist = visual.checklist || [];
  return `
    <div class="syntax-showcase">
      <section class="syntax-hero">
        <div class="syntax-hero-copy">
          <h3>${escapeHtml(step.title)}</h3>
          <p>${escapeHtml(step.detail || step.summary)}</p>
        </div>
        <div class="syntax-language-pill">${escapeHtml(visual.language || 'Syntax')}</div>
      </section>

      <section class="syntax-card-grid">
        <article class="syntax-card syntax-card-primary">
          <div class="syntax-card-label">핵심 용도</div>
          <h4>${escapeHtml(visual.focusLabel || step.title)}</h4>
          <p>${escapeHtml(visual.useCase || step.summary)}</p>
        </article>

        <article class="syntax-card syntax-card-accent">
          <div class="syntax-card-label">자주 같이 쓰는 키워드</div>
          <div class="syntax-chip-row">
            ${chips.map((chip) => `<span class="syntax-chip">${escapeHtml(chip)}</span>`).join('')}
          </div>
        </article>

        <article class="syntax-card">
          <div class="syntax-card-label">실전 체크리스트</div>
          <ul>
            ${checklist.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}
          </ul>
        </article>

        <article class="syntax-card syntax-card-warning">
          <div class="syntax-card-label">실수 포인트</div>
          <p>${escapeHtml(visual.pitfall || '문법을 짧게 쓰는 것보다 실전에서 다시 읽기 쉬운지 먼저 확인하세요.')}</p>
        </article>
      </section>
    </div>
  `;
}
/* ===== end v6 overrides ===== */


  document.addEventListener('DOMContentLoaded', boot);
})();
</script>
</body>
</html>
