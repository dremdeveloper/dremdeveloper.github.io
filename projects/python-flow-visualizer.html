  <style>
:root {
  --bg: #07101e;
  --bg-2: #0b1327;
  --panel: rgba(10, 18, 36, 0.72);
  --panel-strong: rgba(8, 15, 32, 0.88);
  --panel-soft: rgba(20, 31, 58, 0.62);
  --line: rgba(148, 163, 184, 0.18);
  --line-strong: rgba(148, 163, 184, 0.35);
  --text: #edf2ff;
  --muted: #aab6d3;
  --muted-2: #8fa0c6;
  --accent: #63a4ff;
  --accent-2: #7c5cff;
  --accent-soft: rgba(99, 164, 255, 0.16);
  --good: #32d583;
  --warn: #ffbf5f;
  --danger: #ff6b81;
  --cyan: #5ad7ff;
  --shadow: 0 18px 48px rgba(2, 6, 23, 0.48);
  --radius-xl: 28px;
  --radius-lg: 20px;
  --radius-md: 16px;
  --radius-sm: 12px;
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  min-height: 100%;
  background:
    radial-gradient(circle at top left, rgba(92, 164, 255, 0.14), transparent 28%),
    radial-gradient(circle at top right, rgba(124, 92, 255, 0.12), transparent 24%),
    linear-gradient(180deg, var(--bg), var(--bg-2));
  color: var(--text);
  font-family: Inter, "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
}

body {
  padding: 20px;
}

button, input, select {
  font: inherit;
}

.app-shell {
  max-width: 1700px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 20px;
  position: relative;
}

.ambient {
  position: fixed;
  border-radius: 50%;
  filter: blur(90px);
  z-index: 0;
  pointer-events: none;
}

.ambient-a {
  width: 340px;
  height: 340px;
  background: rgba(99, 164, 255, 0.12);
  top: -60px;
  right: 10%;
}

.ambient-b {
  width: 300px;
  height: 300px;
  background: rgba(124, 92, 255, 0.1);
  bottom: 40px;
  left: 4%;
}

.glass {
  background: linear-gradient(180deg, rgba(17, 27, 50, 0.86), rgba(9, 17, 33, 0.88));
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
  position: relative;
  z-index: 1;
}

.sidebar {
  border-radius: var(--radius-xl);
  padding: 22px;
  position: sticky;
  top: 20px;
  align-self: start;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand-mark {
  width: 54px;
  height: 54px;
  border-radius: 18px;
  display: grid;
  place-items: center;
  background: linear-gradient(135deg, rgba(99, 164, 255, 0.28), rgba(124, 92, 255, 0.24));
  color: var(--text);
  font-weight: 800;
  letter-spacing: 0.08em;
  border: 1px solid rgba(148, 163, 184, 0.22);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
}

.eyebrow {
  color: var(--cyan);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.brand h1,
.hero h2 {
  margin: 4px 0 0;
  line-height: 1.18;
}

.brand h1 {
  font-size: 22px;
}

.brand-copy,
.hero p,
.project-meta p,
.note-block p,
.description-summary,
.description-detail {
  line-height: 1.7;
  color: var(--muted);
}

.brand-copy {
  margin: 0;
  font-size: 14px;
}

.sidebar-card,
.section-button,
.stat-card,
.panel-card,
.insight-card {
  border-radius: var(--radius-lg);
}

.sidebar-card {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--line);
  padding: 16px;
}

.sidebar-card-title,
.panel-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 8px;
}

.sidebar-list {
  margin: 0;
  padding-left: 18px;
  color: var(--muted);
  line-height: 1.75;
  font-size: 13px;
}

.section-nav {
  display: grid;
  gap: 10px;
}

.section-button {
  width: 100%;
  text-align: left;
  padding: 14px 16px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.02));
  border: 1px solid var(--line);
  color: var(--text);
  cursor: pointer;
  transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
}

.section-button:hover,
.control-btn:hover,
.algorithm-tab:hover {
  transform: translateY(-1px);
  border-color: rgba(99, 164, 255, 0.45);
}

.section-button.active {
  background: linear-gradient(135deg, rgba(99, 164, 255, 0.18), rgba(124, 92, 255, 0.14));
  border-color: rgba(99, 164, 255, 0.42);
}

.section-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 4px;
}

.section-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.55;
}

.sidebar-foot {
  margin-top: auto;
  display: grid;
  gap: 8px;
  color: var(--muted-2);
  font-size: 12px;
  line-height: 1.55;
}

.main {
  display: grid;
  gap: 18px;
}

.hero {
  border-radius: var(--radius-xl);
  padding: 26px 28px;
  display: grid;
  grid-template-columns: minmax(0, 1.3fr) 360px;
  gap: 18px;
  align-items: stretch;
}

.hero-copy h2 {
  font-size: 32px;
}

.hero-copy p {
  margin: 0;
  font-size: 15px;
}

.hero-summary {
  margin-top: 12px;
  max-width: 72ch;
  color: var(--muted);
  line-height: 1.75;
}

.hero-stats {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.stat-card {
  padding: 16px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015));
  border: 1px solid var(--line);
}

.stat-label {
  font-size: 12px;
  color: var(--muted-2);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 10px;
}

.stat-value {
  font-size: 20px;
  font-weight: 800;
  line-height: 1.4;
}

.badge-row,
.algorithm-tabs,
.legend,
.note-chip-row,
.stack-ribbon,
.token-row,
.count-strip,
.output-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.badge,
.legend-item,
.note-chip,
.structure-token,
.stack-token {
  padding: 8px 12px;
  border-radius: 999px;
  font-size: 13px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.03);
}

.badge-highlight,
.legend-item.highlight {
  background: rgba(99, 164, 255, 0.12);
  border-color: rgba(99, 164, 255, 0.36);
  color: #d6e6ff;
}

.algorithm-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.visual-toolbar {
  display: grid;
  gap: 14px;
  margin-bottom: 16px;
}

.visual-toolbar-top,
.visual-toolbar-bottom {
  display: flex;
  gap: 14px;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
}

.visual-toolbar-top .algorithm-tabs {
  flex: 1;
}

.algorithm-tab {
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.03);
  color: var(--text);
  padding: 9px 14px;
  cursor: pointer;
  transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
}

.algorithm-tab.active {
  background: linear-gradient(135deg, rgba(99, 164, 255, 0.18), rgba(124, 92, 255, 0.14));
  border-color: rgba(99, 164, 255, 0.42);
}

.toolbar-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.panel-head-main {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.control-btn {
  border-radius: 14px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.03);
  color: var(--text);
  padding: 10px 15px;
  cursor: pointer;
  transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
}

.control-btn-primary {
  background: linear-gradient(135deg, rgba(99, 164, 255, 0.22), rgba(124, 92, 255, 0.18));
  border-color: rgba(99, 164, 255, 0.46);
}

.meta-line {
  color: var(--muted);
  font-size: 14px;
  font-weight: 600;
}

.range-wrap {
  flex: 1;
  min-width: 260px;
}

.speed-wrap {
  min-width: 220px;
  display: grid;
  gap: 8px;
}

input[type="range"] {
  width: 100%;
  accent-color: var(--accent);
}

label {
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
}

.workspace {
  display: grid;
  grid-template-columns: minmax(0, 1.3fr) 420px;
  gap: 18px;
}

.visual-panel {
  border-radius: var(--radius-xl);
  padding: 20px;
  min-height: 760px;
}

.panel-head {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.panel-subtitle {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
}

.visual-area {
  min-height: 660px;
  display: grid;
  align-content: start;
  gap: 16px;
}

.side-stack {
  display: grid;
  gap: 18px;
  align-content: start;
}

.panel-card {
  padding: 18px;
  border-radius: var(--radius-xl);
}

.panel-card-state,
.panel-card-notes {
  display: grid;
  gap: 14px;
}

.description-card {
  padding: 18px;
  border-radius: var(--radius-lg);
  background: linear-gradient(180deg, rgba(99, 164, 255, 0.12), rgba(124, 92, 255, 0.08));
  border: 1px solid rgba(99, 164, 255, 0.2);
  display: grid;
  gap: 14px;
}

.description-top {
  display: flex;
  justify-content: space-between;
  gap: 14px;
  align-items: center;
  flex-wrap: wrap;
}

.line-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(99, 164, 255, 0.26);
  color: #deebff;
  font-size: 13px;
  font-weight: 700;
  width: fit-content;
}

.description-title {
  font-size: 22px;
  font-weight: 800;
  line-height: 1.4;
}

.description-summary {
  margin: 0;
  font-size: 15px;
}

.description-detail {
  margin: 0;
  font-size: 14px;
}

.description-caption {
  margin: 0;
  color: var(--muted-2);
  font-size: 12px;
  letter-spacing: 0.03em;
}

.progress-wrap {
  display: grid;
  gap: 10px;
}

.progress-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  color: var(--muted);
  font-size: 12px;
}

.progress-track {
  width: 100%;
  height: 9px;
  border-radius: 999px;
  overflow: hidden;
  background: rgba(148, 163, 184, 0.12);
  border: 1px solid rgba(148, 163, 184, 0.18);
}

.progress-value {
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, rgba(99, 164, 255, 0.95), rgba(124, 92, 255, 0.82));
  box-shadow: 0 0 22px rgba(99, 164, 255, 0.34);
}

.code-block {
  display: grid;
  gap: 6px;
  background: rgba(2, 6, 23, 0.78);
  border-radius: 18px;
  padding: 14px;
  border: 1px solid rgba(148, 163, 184, 0.16);
  overflow: auto;
}

.code-line {
  display: grid;
  grid-template-columns: 44px 1fr;
  gap: 14px;
  align-items: start;
  border-radius: 12px;
  padding: 8px 10px;
  font-family: "JetBrains Mono", "Consolas", monospace;
  font-size: 13px;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
  transition: background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease, opacity 0.16s ease;
}

.code-line.active {
  background: rgba(99, 164, 255, 0.14);
  box-shadow: inset 5px 0 0 rgba(99, 164, 255, 0.98);
  border: 2px solid rgba(99, 164, 255, 0.48);
}

.code-line-num {
  color: rgba(160, 196, 255, 0.7);
  text-align: right;
  user-select: none;
}

.code-line-text {
  color: #f5f7ff;
}

.state-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 12px;
}

.state-card {
  border-radius: 18px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.03);
  padding: 14px;
  min-height: 104px;
}

.state-label {
  color: var(--muted-2);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 10px;
}

.state-value {
  font-size: 17px;
  font-weight: 700;
  line-height: 1.6;
  word-break: break-word;
  white-space: pre-wrap;
}

.note-block {
  border-radius: 18px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.03);
  padding: 14px;
}

.note-block h3 {
  margin: 0 0 8px;
  font-size: 14px;
}

.note-block p {
  margin: 0;
  font-size: 14px;
}

.note-block ul {
  margin: 10px 0 0;
  padding-left: 18px;
  color: var(--muted);
  line-height: 1.7;
}

.project-meta p {
  margin: 0 0 10px;
  font-size: 14px;
}

.insight-grid {
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  gap: 18px;
}

.insight-card {
  padding: 18px;
  border-radius: var(--radius-xl);
}

.sort-layout,
.graph-layout,
.tree-layout,
.recursion-layout,
.nqueen-layout,
.count-layout {
  display: grid;
  gap: 16px;
}

.sort-bars {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
  gap: 12px;
  align-items: end;
}

.bar-card {
  border-radius: 18px;
  padding: 12px;
  border: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.015));
  min-height: 290px;
  display: grid;
  align-items: end;
  gap: 10px;
  position: relative;
  overflow: hidden;
  transition: transform 0.18s ease, border-color 0.18s ease, opacity 0.18s ease;
}

.bar-card.dimmed {
  opacity: 0.3;
}

.bar-card.range {
  border-color: rgba(99, 164, 255, 0.22);
}

.bar-card.comparing {
  border-color: rgba(255, 191, 95, 0.58);
  box-shadow: inset 0 0 0 1px rgba(255, 191, 95, 0.16);
}

.bar-card.key {
  border-color: rgba(124, 92, 255, 0.6);
}

.bar-card.shifted {
  border-color: rgba(255, 107, 129, 0.55);
}

.bar-card.sorted,
.bar-card.fixed {
  border-color: rgba(50, 213, 131, 0.52);
}

.bar-card.current-write {
  border-color: rgba(90, 215, 255, 0.56);
}

.bar-marker-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  min-height: 24px;
}

.bar-marker {
  padding: 4px 7px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.08);
  font-size: 11px;
  font-weight: 700;
}

.bar-marker.pivot { background: rgba(124, 92, 255, 0.2); }
.bar-marker.current { background: rgba(255, 191, 95, 0.18); }
.bar-marker.pointer { background: rgba(90, 215, 255, 0.18); }
.bar-marker.sorted { background: rgba(50, 213, 131, 0.18); }

.bar-track {
  height: 190px;
  border-radius: 14px;
  background: transparent;
  display: flex;
  align-items: end;
  overflow: hidden;
}

.bar-fill {
  width: 100%;
  border-radius: 14px 14px 10px 10px;
  background: linear-gradient(180deg, rgba(99, 164, 255, 0.95), rgba(64, 110, 255, 0.72));
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 6px;
  font-size: 14px;
  line-height: 1;
  color: #ffffff;
  font-weight: 800;
  transition: height 0.25s ease;
}

.bar-card.comparing .bar-fill {
  background: linear-gradient(180deg, rgba(255, 191, 95, 0.94), rgba(255, 166, 58, 0.72));
}

.bar-card.key .bar-fill {
  background: linear-gradient(180deg, rgba(160, 126, 255, 0.94), rgba(124, 92, 255, 0.76));
}

.bar-card.shifted .bar-fill {
  background: linear-gradient(180deg, rgba(255, 125, 144, 0.94), rgba(255, 96, 120, 0.76));
}

.bar-card.sorted .bar-fill,
.bar-card.fixed .bar-fill {
  background: linear-gradient(180deg, rgba(50, 213, 131, 0.95), rgba(27, 183, 94, 0.72));
}

.bar-card.current-write .bar-fill {
  background: linear-gradient(180deg, rgba(90, 215, 255, 0.95), rgba(43, 185, 243, 0.72));
}

.bar-footer {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  font-size: 13px;
  color: var(--muted);
}

.workspace-box {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}

.workspace-card {
  border-radius: 18px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.03);
  padding: 14px;
}

.workspace-head {
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 10px;
}

.token-row {
  min-height: 38px;
}

.structure-token,
.stack-token {
  background: rgba(255, 255, 255, 0.06);
  font-weight: 700;
}

.structure-token.current,
.stack-token.current {
  background: rgba(99, 164, 255, 0.18);
  border-color: rgba(99, 164, 255, 0.32);
}

.sort-layout,
.count-layout,
.structure-layout,
.factorial-layout {
  display: grid;
  gap: 12px;
}

.motion-dot.warn,
.motion-dot.good {
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.15));
  animation: flowPulse 1.35s ease-in-out infinite;
  transform-box: fill-box;
  transform-origin: center;
}

.factorial-stage {
  border-radius: 22px;
  border: 1px solid var(--line);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
    radial-gradient(circle at top, rgba(99,164,255,0.05), transparent 42%);
  padding: 14px;
  overflow: auto hidden;
}

.factorial-chain {
  display: flex;
  align-items: stretch;
  gap: 10px;
  min-height: 164px;
  padding-bottom: 4px;
}

.factorial-step-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.factorial-card {
  width: 170px;
  min-height: 144px;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.04);
  padding: 14px;
  display: grid;
  align-content: start;
  gap: 10px;
  transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
}

.factorial-card.current {
  border-color: rgba(255, 191, 95, 0.55);
  background: linear-gradient(180deg, rgba(255, 191, 95, 0.12), rgba(255, 255, 255, 0.04));
  box-shadow:
    0 0 0 1px rgba(255, 191, 95, 0.16) inset,
    0 0 0 3px rgba(255, 191, 95, 0.08);
}

.factorial-card.waiting {
  border-color: rgba(99, 164, 255, 0.48);
  background: rgba(99, 164, 255, 0.08);
}

.factorial-card.done {
  border-color: rgba(50, 213, 131, 0.5);
  background: rgba(50, 213, 131, 0.08);
}

.factorial-card-tag {
  width: fit-content;
  padding: 5px 9px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}

.factorial-label {
  font-size: 18px;
  font-weight: 800;
}

.factorial-status {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.55;
}

.factorial-result {
  margin-top: auto;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(7,16,30,0.45);
  border: 1px solid rgba(148,163,184,0.18);
  font-size: 14px;
  font-weight: 800;
}

.factorial-result.muted {
  color: var(--muted);
}

.factorial-arrow {
  min-width: 98px;
  text-align: center;
  font-size: 12px;
  font-weight: 800;
  color: #ffe0a7;
  line-height: 1.45;
}

.factorial-arrow.back {
  color: #c8f9df;
}

@media (max-width: 1280px) {
  .visual-guide-title {
    font-size: 18px;
  }

  .factorial-card {
    width: 156px;
  }
}

@media (max-width: 760px) {
  .visual-guide-title {
    font-size: 17px;
  }

  .direction-strip {
    grid-template-columns: 1fr;
  }

  .factorial-step-wrap {
    flex-direction: column;
    align-items: stretch;
  }

  .factorial-arrow {
    min-width: 0;
  }
}


/* v6 array-first layout, smaller arrows, clearer traversal/backtracking */
:root {
  --cell-bg: transparent;
  --array-cell-border: rgba(255, 255, 255, 0.16);
}

.graph-edge,
.tree-edge,
.call-edge {
  stroke-width: 2.6;
}

.graph-edge.active,
.tree-edge.active,
.call-edge.active {
  stroke-width: 3.5;
  stroke-dasharray: 8 10;
  animation: edgeFlow 0.9s linear infinite;
}

.graph-edge.arrow,
.tree-edge.arrow,
.call-edge.arrow {
  stroke-width: 3.1 !important;
}

.motion-dot.warn,
.motion-dot.good {
  filter: drop-shadow(0 0 4px rgba(255,255,255,0.12));
}

.graph-node.current circle,
.tree-node.current circle,
.call-node.current circle,
.heap-node.current circle,
.array-cell.current,
.array-cell.comparing,
.stack-slot.current-slot,
.queue-slot.front-slot,
.factorial-card.current,
.graph-node.frontier circle,
.tree-node.path circle,
.call-node.waiting circle,
.array-cell.key,
.array-cell.pivot,
.array-cell.fixed,
.queue-slot.rear-slot,
.factorial-card.waiting,
.heap-node.checking circle,
.array-cell.shifted,
.heap-node.swap circle,
.call-node.split circle {
  animation: none;
  transform-origin: center;
}

.visual-guide-title {
  font-size: 18px;
  line-height: 1.45;
}

.visual-guide-detail {
  line-height: 1.6;
}

.svg-badge text {
  font-size: 10px;
}

.sort-bars {
  grid-template-columns: repeat(auto-fit, minmax(68px, 1fr));
  gap: 8px;
}

.bar-card {
  min-height: 178px;
  padding: 8px;
  gap: 8px;
  align-content: start;
}

.bar-track {
  height: 110px;
}

@keyframes sceneFadeSoft {
  from {
    opacity: 0;
    transform: translateY(8px) scale(0.992);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes focusPulse {
  0%, 100% {
    transform: translateY(-3px) scale(1.02);
    box-shadow: inherit;
  }
  50% {
    transform: translateY(-5px) scale(1.035);
  }
}

@keyframes supportPulse {
  0%, 100% {
    transform: translateY(-3px) scale(1.02);
    opacity: 1;
  }
  50% {
    transform: translateY(-4px) scale(1.028);
    opacity: 0.92;
  }
}

@keyframes alertPulse {
  0%, 100% {
    transform: translateY(-3px) scale(1.02);
  }
  50% {
    transform: translateY(-6px) scale(1.045);
  }
}

@keyframes flowPulse {
  0%, 100% {
    transform: scale(0.92);
    opacity: 0.82;
  }
  50% {
    transform: scale(1.18);
    opacity: 1;
  }
}

@keyframes edgeFlow {
  from {
    stroke-dashoffset: 18;
  }
  to {
    stroke-dashoffset: 0;
  }
}

.bar-fill {
  padding: 8px 6px;
  font-size: 14px;
}

.bar-value-label {
  min-height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  font-size: 13px;
  font-weight: 800;
  line-height: 1;
}

.bar-marker-row {
  min-height: 18px;
  gap: 4px;
}

.bar-marker {
  padding: 3px 6px;
  font-size: 10px;
}

.bar-footer {
  display: none;
}

.array-table-panel {
  border-radius: 18px;
  border: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.015));
  padding: 12px;
  overflow: hidden;
}

.array-table-panel.compact {
  padding: 10px;
}

.array-table-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}

.array-table-title {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.array-table-title strong {
  font-size: 12px;
  font-weight: 800;
  color: var(--muted);
}

.array-table-badge {
  flex-shrink: 0;
  align-self: center;
  border-radius: 999px;
  border: 1px solid rgba(99, 164, 255, 0.28);
  background: rgba(99, 164, 255, 0.08);
  color: var(--accent);
  padding: 5px 10px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.04em;
}

.array-shell {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  gap: 10px;
  align-items: stretch;
}

.array-bracket {
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255, 255, 255, 0.72);
  font-size: 36px;
  font-weight: 500;
  line-height: 1;
  padding-bottom: 8px;
}

.array-grid {
  display: grid;
  gap: 6px;
  align-items: stretch;
}

.array-column {
  display: grid;
  gap: 6px;
}

.array-index-label,
.array-cell {
  min-height: 44px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  text-align: center;
  padding: 6px 8px;
}

.array-index-label {
  min-height: 28px;
  padding: 4px 6px;
  border: 1px solid rgba(148, 163, 184, 0.16);
  background: rgba(255, 255, 255, 0.03);
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.02em;
  line-height: 1.2;
}

.array-cell {
  min-height: 58px;
  border: 1px solid var(--array-cell-border);
  background: rgba(255, 255, 255, 0.02);
}

.array-cell {
  color: var(--text);
  font-size: 13px;
  font-weight: 800;
  line-height: 1.25;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
  transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease, opacity 0.22s ease, background 0.22s ease;
}

.array-cell.dim {
  opacity: 0.34;
}

.array-cell.range {
  border-color: rgba(124, 92, 255, 0.32);
}

.array-cell.current {
  border-width: 4px;
  border-color: rgba(255, 107, 129, 0.96);
  background: linear-gradient(180deg, rgba(255, 107, 129, 0.16), rgba(255, 191, 95, 0.08));
  box-shadow: inset 0 0 0 1px rgba(255, 107, 129, 0.34), 0 0 0 2px rgba(255, 107, 129, 0.12);
}

.array-cell.comparing {
  border-width: 3px;
  border-color: rgba(255, 191, 95, 0.76);
  background: rgba(255, 191, 95, 0.08);
  box-shadow: inset 0 0 0 1px rgba(255, 191, 95, 0.18), 0 0 0 1px rgba(255, 191, 95, 0.08);
}

.array-cell.key {
  border-width: 3px;
  border-color: rgba(90, 215, 255, 0.82);
  background: rgba(90, 215, 255, 0.08);
  box-shadow: inset 0 0 0 1px rgba(90, 215, 255, 0.18), 0 0 0 1px rgba(90, 215, 255, 0.08);
}

.array-cell.pivot {
  border-width: 3px;
  border-color: rgba(124, 92, 255, 0.86);
  background: rgba(124, 92, 255, 0.12);
  box-shadow: inset 0 0 0 1px rgba(124, 92, 255, 0.2), 0 0 0 1px rgba(124, 92, 255, 0.08);
}

.array-cell.shifted {
  border-width: 3px;
  border-color: rgba(255, 107, 129, 0.78);
  background: rgba(255, 107, 129, 0.08);
  box-shadow: inset 0 0 0 2px rgba(255, 107, 129, 0.16), 0 0 0 2px rgba(255, 107, 129, 0.1);
}

.array-cell.done {
  border-width: 4px;
  border-color: rgba(255, 107, 129, 0.9);
  background: rgba(255, 107, 129, 0.06);
  box-shadow: inset 0 0 0 1px rgba(255, 107, 129, 0.18), 0 0 0 2px rgba(255, 107, 129, 0.08);
}

.array-cell.success {
  border-width: 3px;
  border-color: rgba(50, 213, 131, 0.72);
  background: rgba(50, 213, 131, 0.08);
  box-shadow: inset 0 0 0 1px rgba(50, 213, 131, 0.16), 0 0 0 1px rgba(50, 213, 131, 0.08);
}

.array-cell.fixed {
  border-width: 4px;
  border-color: rgba(255, 107, 129, 0.9);
  background: rgba(255, 107, 129, 0.06);
  box-shadow: inset 0 0 0 1px rgba(255, 107, 129, 0.18), 0 0 0 2px rgba(255, 107, 129, 0.08);
}

.array-cell.candidate {
  border-color: rgba(90, 215, 255, 0.4);
  box-shadow: inset 0 0 0 1px rgba(90, 215, 255, 0.1);
}

.array-cell.danger {
  border-color: rgba(255, 107, 129, 0.42);
  box-shadow: inset 0 0 0 1px rgba(255, 107, 129, 0.11);
}

.array-cell.front {
  border-color: rgba(255, 191, 95, 0.50);
}

.array-cell.rear {
  border-color: rgba(99, 164, 255, 0.50);
}

.array-value {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 900;
  word-break: keep-all;
}

.array-value-main {
  font-size: 15px;
  font-weight: 900;
}

.array-value.muted {
  color: var(--muted);
}

.array-cell.current,
.array-cell.comparing,
.array-cell.key,
.array-cell.pivot,
.array-cell.fixed,
.array-cell.shifted,
.array-cell.done,
.array-cell.success,
.array-cell.candidate,
.array-cell.danger,
.array-cell.front,
.array-cell.rear {
  transform: translateY(-1px);
}

.workspace-box .array-table-panel {
  height: 100%;
}

.workspace-card .token-row {
  min-height: auto;
}

.board-frame {
  padding: 12px;
}

.board-grid {
  width: min(100%, 288px);
  gap: 5px;
}

.board-cell {
  border-radius: 12px;
  font-size: 22px;
}

.board-pos {
  top: 5px;
  left: 6px;
  padding: 1px 4px;
  border-radius: 999px;
  background: rgba(7, 16, 30, 0.55);
  font-size: 8px;
  line-height: 1.2;
}

.tree-node.stacked circle {
  stroke-dasharray: 7 4;
  stroke-width: 4;
}

.tree-node.backtrack circle {
  fill: rgba(90, 215, 255, 0.16);
  stroke: rgba(90, 215, 255, 0.88);
}

.tree-node.return-target circle {
  stroke: rgba(90, 215, 255, 0.92);
}

.direction-card {
  min-height: 80px;
}

.factorial-stage {
  overflow: hidden;
  padding: 12px;
}

.factorial-chain {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 8px;
  align-items: stretch;
  min-height: 0;
}

.factorial-step-wrap {
  display: contents;
}

.factorial-card {
  width: auto;
  min-height: 156px;
  padding: 12px;
  gap: 8px;
}

.factorial-card-tag {
  font-size: 10px;
}

.factorial-label {
  font-size: 16px;
  line-height: 1.3;
}

.factorial-status {
  font-size: 12px;
  line-height: 1.5;
}

.factorial-result {
  padding: 8px 10px;
  font-size: 13px;
  line-height: 1.4;
}

.factorial-arrow {
  min-width: 0;
  border-radius: 14px;
  border: 1px dashed rgba(255, 191, 95, 0.28);
  background: rgba(255, 191, 95, 0.08);
  padding: 8px 4px;
  display: grid;
  align-content: center;
  justify-items: center;
  gap: 4px;
  font-size: 11px;
  line-height: 1.35;
}

.factorial-arrow.back {
  border-color: rgba(50, 213, 131, 0.28);
  background: rgba(50, 213, 131, 0.08);
}

.factorial-arrow-main {
  font-size: 16px;
  font-weight: 900;
}

.factorial-arrow-sub {
  text-align: center;
}

.heap-layout {
  display: grid;
  gap: 12px;
}

.heap-stage {
  border-radius: 22px;
  border: 1px solid var(--line);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
    radial-gradient(circle at top, rgba(99,164,255,0.05), transparent 42%);
  padding: 12px;
  overflow: hidden;
}

.heap-stage svg {
  width: auto;
  max-width: 100%;
  max-height: 340px;
  margin: 0 auto;
  display: block;
}

.heap-edge {
  stroke: rgba(170, 182, 211, 0.34);
  stroke-width: 2.5;
}

.heap-edge.active {
  stroke: rgba(255, 191, 95, 0.96);
  stroke-width: 3.2;
}

.heap-edge.swap {
  stroke: rgba(255, 107, 129, 0.92);
  stroke-width: 3.2;
}

.heap-node circle {
  fill: rgba(14, 24, 46, 0.94);
  stroke: rgba(170, 182, 211, 0.5);
  stroke-width: 2.8;
}

.heap-node text {
  fill: #f8fbff;
  font-size: 16px;
  font-weight: 700;
  text-anchor: middle;
  dominant-baseline: central;
  paint-order: stroke;
  stroke: rgba(7, 16, 30, 0.56);
  stroke-width: 1.6px;
  stroke-linejoin: round;
}

.heap-node .heap-index {
  font-size: 10px;
  fill: #d7e3fb;
  dominant-baseline: hanging;
  stroke: rgba(7, 16, 30, 0.46);
  stroke-width: 1px;
}

.heap-node.current circle {
  fill: rgba(255, 191, 95, 0.18);
  stroke: rgba(255, 191, 95, 0.92);
}

.heap-node.checking circle {
  fill: rgba(124, 92, 255, 0.16);
  stroke: rgba(124, 92, 255, 0.88);
}

.heap-node.swap circle {
  fill: rgba(255, 107, 129, 0.16);
  stroke: rgba(255, 107, 129, 0.88);
}

.heap-node.root circle {
  box-shadow: none;
}

.heap-note {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.6;
}

.syntax-showcase {
  display: grid;
  gap: 16px;
}

.syntax-hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  flex-wrap: wrap;
  padding: 18px 20px;
  border-radius: var(--radius-lg);
  border: 1px solid rgba(99, 164, 255, 0.2);
  background:
    radial-gradient(circle at top right, rgba(90, 215, 255, 0.16), transparent 34%),
    linear-gradient(135deg, rgba(99, 164, 255, 0.12), rgba(124, 92, 255, 0.1));
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
}

.syntax-hero-copy {
  flex: 1 1 360px;
}

.syntax-hero-copy h3 {
  margin: 0 0 8px;
  font-size: 22px;
  line-height: 1.35;
}

.syntax-hero-copy p {
  margin: 0;
  color: var(--muted);
  line-height: 1.7;
}

.syntax-language-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid rgba(90, 215, 255, 0.24);
  background: rgba(7, 16, 30, 0.45);
  color: var(--cyan);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  box-shadow: 0 12px 28px rgba(8, 15, 32, 0.26);
  animation: syntaxFloat 4s ease-in-out infinite;
}

.syntax-language-pill::before {
  content: '';
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--cyan));
  box-shadow: 0 0 0 6px rgba(90, 215, 255, 0.08);
}

.syntax-card-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}

.syntax-card {
  padding: 18px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
  transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
}

.syntax-card:hover {
  transform: translateY(-2px);
  border-color: rgba(99, 164, 255, 0.34);
  box-shadow: 0 18px 32px rgba(2, 6, 23, 0.26);
}

.syntax-card h4 {
  margin: 0 0 10px;
  font-size: 16px;
}

.syntax-card p,
.syntax-card li {
  color: var(--muted);
  line-height: 1.72;
}

.syntax-card p {
  margin: 0;
}

.syntax-card ul {
  margin: 0;
  padding-left: 18px;
}

.syntax-card-label {
  display: inline-flex;
  align-items: center;
  margin-bottom: 12px;
  padding: 7px 11px;
  border-radius: 999px;
  border: 1px solid rgba(148, 163, 184, 0.2);
  background: rgba(255, 255, 255, 0.03);
  color: var(--muted-2);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.syntax-chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.syntax-chip {
  display: inline-flex;
  align-items: center;
  padding: 7px 11px;
  border-radius: 999px;
  border: 1px solid rgba(99, 164, 255, 0.22);
  background: rgba(99, 164, 255, 0.12);
  color: #d8e7ff;
  font-size: 12px;
  font-weight: 700;
}

.syntax-card-primary {
  background: linear-gradient(180deg, rgba(99, 164, 255, 0.12), rgba(124, 92, 255, 0.08));
  border-color: rgba(99, 164, 255, 0.24);
}

.syntax-card-accent {
  background: linear-gradient(180deg, rgba(90, 215, 255, 0.09), rgba(50, 213, 131, 0.06));
}

.syntax-card-warning {
  background: linear-gradient(180deg, rgba(255, 191, 95, 0.09), rgba(255, 107, 129, 0.04));
}

@keyframes syntaxFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

@media (max-width: 1280px) {
  .factorial-card {
    min-height: 148px;
  }
}

@media (prefers-reduced-motion: reduce) {
  .scene-fade,
  .syntax-language-pill,
  .motion-dot.warn,
  .motion-dot.good,
  .graph-edge.active,
  .tree-edge.active,
  .call-edge.active,
  .graph-node.current circle,
  .tree-node.current circle,
  .call-node.current circle,
  .heap-node.current circle,
  .graph-node.frontier circle,
  .tree-node.path circle,
  .call-node.waiting circle,
  .heap-node.checking circle,
  .heap-node.swap circle,
  .call-node.split circle,
  .array-cell.current,
  .array-cell.comparing,
  .array-cell.key,
  .array-cell.shifted,
  .stack-slot.current-slot,
  .queue-slot.front-slot,

  function flattenTree(root, childKeys = ['left', 'right']) {
    const nodes = [];
    const edges = [];
    function walk(node) {
      if (!node) return;
      nodes.push({ id: node.id, label: node.label, x: node.x, y: node.y, depth: node.depth, meta: node.meta || null });
      childKeys.forEach((key) => {
        const child = node[key];
        if (child) {
          edges.push([node.id, child.id]);
          walk(child);
        }
      });
    }
    walk(root);
    return { nodes, edges };
  }

  function layoutBinaryTree(root) {
    let nextX = 80;
    function place(node, depth) {
      if (!node) return null;
      node.depth = depth;
      const leftX = node.left ? place(node.left, depth + 1) : null;
      const rightX = node.right ? place(node.right, depth + 1) : null;
      if (leftX === null && rightX === null) {
        node.x = nextX;
        nextX += 120;
      } else if (leftX === null) {
        node.x = rightX;
      } else if (rightX === null) {
        node.x = leftX;
      } else {
        node.x = (leftX + rightX) / 2;
      }
      node.y = 70 + depth * 100;
      return node.x;
    }
    place(root, 0);
    return flattenTree(root);
  }

  function buildFactorialTree(n) {
    function makeNode(value) {
      const node = { id: `fact-${value}`, label: `f(${value})`, left: null, right: null };
      if (value > 1) node.left = makeNode(value - 1);
      return node;
    }
    return layoutBinaryTree(makeNode(n));
  }

  function buildFibTree(n, idSeed = { value: 0 }) {
    function makeNode(value) {
      const id = `fib-${idSeed.value++}`;
      const node = { id, label: `fib(${value})`, meta: { value }, left: null, right: null };
      if (value > 1) {
        node.left = makeNode(value - 1);
        node.right = makeNode(value - 2);
      }
      return node;
    }
    return layoutBinaryTree(makeNode(n));
  }

  function buildCombTree(n, k, idSeed = { value: 0 }) {
    function makeNode(nVal, kVal) {
      const id = `comb-${idSeed.value++}`;
      const node = { id, label: `C(${nVal}, ${kVal})`, meta: { n: nVal, k: kVal }, left: null, right: null };
      if (!(kVal === 0 || kVal === nVal)) {
        node.left = makeNode(nVal - 1, kVal - 1);
        node.right = makeNode(nVal - 1, kVal);
      }
      return node;
    }
    return layoutBinaryTree(makeNode(n, k));
  }

  function fitLayout(layout, targetWidth = 760, targetHeight = 320, padding = 34) {
    const xs = layout.nodes.map((node) => node.x);
    const ys = layout.nodes.map((node) => node.y);
    const minX = Math.min(...xs);
    const maxX = Math.max(...xs);
    const minY = Math.min(...ys);
    const maxY = Math.max(...ys);
    const width = Math.max(1, maxX - minX);
    const height = Math.max(1, maxY - minY);
    const usableWidth = Math.max(1, targetWidth - padding * 2);
    const usableHeight = Math.max(1, targetHeight - padding * 2);
    const scale = Math.min(usableWidth / width, usableHeight / height);
    const scaledWidth = width * scale;
    const scaledHeight = height * scale;
    const offsetX = (targetWidth - scaledWidth) / 2;
    const offsetY = (targetHeight - scaledHeight) / 2;

    return {
      width: targetWidth,
      height: targetHeight,
      nodes: layout.nodes.map((node) => ({
        ...node,
        x: offsetX + (node.x - minX) * scale,
        y: offsetY + (node.y - minY) * scale,
      })),
      edges: layout.edges.map((edge) => edge.slice()),
    };
  }

  function buildBubbleSortScenario() {
    const input = [7, 3, 5, 2, 9];
    const arr = input.slice();
    const steps = [];
    const n = arr.length;

    const sortedSuffix = (count) => Array.from({ length: count }, (_, idx) => n - count + idx);
    const makeMetrics = (i, j, sorted) => [
      metric('배열 상태', fmtArray(arr)),
      metric('바깥 반복 i', i === null ? '시작 전' : i),

      visual: { items: arr.slice(), comparing: [], sorted: [], activeRange: [0, n - 1] },
    }));

    for (let i = 0; i < n - 1; i++) {
      steps.push(createStep({
        lines: [3],
        title: `${i + 1}번째 패스 시작`,
        summary: `이번 패스가 끝나면 오른쪽 끝에서 ${i + 1}개의 자리가 확정됩니다.`,

        metrics: makeMetrics(i, null, sortedSuffix(i)),
        visual: { items: arr.slice(), comparing: [], sorted: sortedSuffix(i), activeRange: [0, n - 1 - i] },
      }));

      for (let j = 0; j < n - 1 - i; j++) {
        steps.push(createStep({
          lines: [4, 5],
          title: `인접 원소 비교`,
          summary: `${arr[j]}와 ${arr[j + 1]}를 비교합니다.`,
          detail: '버블 정렬은 항상 바로 옆 원소끼리 비교합니다. 앞 값이 더 크면 자리를 바꿉니다.',
          metrics: makeMetrics(i, j, sortedSuffix(i)),
          visual: { items: arr.slice(), comparing: [j, j + 1], sorted: sortedSuffix(i), activeRange: [0, n - 1 - i] },
        }));

        if (arr[j] > arr[j + 1]) {
          const beforeLeft = arr[j];
          const beforeRight = arr[j + 1];
          [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
          steps.push(createStep({
            lines: [6],
            title: '자리 교환',
            summary: `${beforeLeft}가 ${beforeRight}보다 크므로 두 값을 교환합니다.`,
            detail: '앞 값이 더 크면 두 값을 뒤바꿔서 더 큰 값이 오른쪽으로 이동하게 만듭니다.',
            metrics: makeMetrics(i, j, sortedSuffix(i)),
            visual: { items: arr.slice(), comparing: [j, j + 1], shifted: [j, j + 1], sorted: sortedSuffix(i), activeRange: [0, n - 1 - i] },
          }));
        } else {
          steps.push(createStep({
            lines: [5],
            title: '교환 없이 통과',
            summary: `${arr[j]}가 ${arr[j + 1]}보다 작거나 같아서 그대로 둡니다.`,
            detail: '교환이 필요 없으면 다음 인접 쌍으로 넘어갑니다.',
            metrics: makeMetrics(i, j, sortedSuffix(i)),
            visual: { items: arr.slice(), comparing: [j, j + 1], sorted: sortedSuffix(i), activeRange: [0, n - 1 - i] },
          }));
        }
      }

      const sortedIndices = sortedSuffix(i + 1);
      steps.push(createStep({
        lines: [3],
        title: `${i + 1}번째 패스 종료`,
        summary: `인덱스 ${n - i - 1} 위치 값이 확정되었습니다.`,
        detail: '오른쪽 끝에서부터 정렬이 완료된 구간이 늘어납니다.',
        metrics: makeMetrics(i, null, sortedIndices),
        visual: { items: arr.slice(), comparing: [], sorted: sortedIndices, activeRange: [0, n - i - 2] },
      }));
    }

    steps.push(createStep({
      lines: [7],
      title: '정렬 완료',
      summary: '배열이 오름차순으로 정렬되었습니다.',
      detail: '이제 모든 비교가 끝났고, 배열 전체가 정렬된 상태입니다.',
      metrics: makeMetrics(n - 1, null, Array.from({ length: n }, (_, idx) => idx)),
      visual: { items: arr.slice(), comparing: [], sorted: Array.from({ length: n }, (_, idx) => idx), activeRange: null },
    }));

    return baseScenario({
      id: 'bubble-sort',

      code: [
        'def bubble_sort(arr):',
        '    n = len(arr)',
        '    for i in range(n - 1):',
        '        for j in range(n - 1 - i):',
        '            if arr[j] > arr[j + 1]:',
        '                arr[j], arr[j + 1] = arr[j + 1], arr[j]',
        '    return arr',
      ],
      renderer: 'sorting',
      legend: [
        { label: '현재 비교', tone: 'highlight' },
        { label: '정렬 완료', tone: 'good' },
        { label: '현재 범위', tone: 'range' },

      notes: [

      ],
      steps,
    });
  }

  function buildInsertionSortScenario() {

      metric('비교 위치 j', j === null ? '없음' : j),
