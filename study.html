<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Algorithm visualization, AI paper summaries, and coding test preparation resources." />
  <meta name="keywords" content="algorithm, coding test, AI, reinforcement learning, PPO, DPO, visualization" />
  <meta name="author" content="박경록" />
  <meta property="og:title" content="DremDeveloper Blog" />
  <meta property="og:description" content="AI 논문 정리 및 코딩 테스트 시각화 자료" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://dremdeveloper.github.io/" />
  <meta property="og:image" content="https://dremdeveloper.github.io/assets/preview.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="DremDeveloper Blog" />
  <meta name="twitter:description" content="AI 논문 정리 및 코딩 테스트 시각화 자료" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <link rel="canonical" href="https://dremdeveloper.github.io/" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net" />
  <title>코테자료 | 박경록</title>

  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="site-shell">
    <header class="topbar study-topbar">
      <a class="brand" href="index.html" aria-label="홈으로 이동">
        <span class="brand-text">
          <strong>Home</strong>
        </span>
      </a>

      <button class="menu-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>

      <nav id="site-nav" class="site-nav" aria-label="주요 메뉴">
        <a href="articles.html">Article</a>
        <a href="lectures.html">강의</a>
        <div class="site-nav-study" id="study-nav-item">
          <button
            id="study-nav-toggle"
            class="site-nav-study-toggle"
            type="button"
            aria-expanded="false"
            aria-haspopup="true"
            aria-controls="study-top-submenu"
          >
            코테자료
          </button>

          <section id="study-top-submenu" class="study-top-submenu" aria-label="코테자료 서브메뉴">
            <div id="study-submenu-roots" class="study-submenu-roots" role="list">
              <button
                id="study-visualization-toggle"
                class="study-submenu-root"
                type="button"
                aria-expanded="false"
                aria-controls="study-visualization-panel"
              >
                <span class="study-submenu-root-label">시각화</span>
              </button>
              <button
                id="study-learning-plan-toggle"
                class="study-submenu-root"
                type="button"
                aria-expanded="false"
                aria-controls="study-learning-plan-panel"
              >
                <span class="study-submenu-root-label">학습 플랜</span>
              </button>
              <a class="study-submenu-root" href="boj-archive-search.html">
                <span class="study-submenu-root-label">문제 검색</span>
              </a>
            </div>
          </section>
        </div>
      </nav>
    </header>

    <main class="page-shell section-tight">
      <section id="study-visualization-panel" class="study-focus-layout" hidden>
        <article id="study-selector-card" class="panel-pad-md study-selector-card">
          <div class="study-selector-card-copy">
            <p class="study-chip-label">시각화 선택</p>
            <strong>알고리즘 종류와 세부 알고리즘을 선택해 시각화를 확인하세요.</strong>
          </div>
          <div class="study-selector-grid">
            <div class="study-viewer-controls">
              <label class="study-select-label" for="study-group-select">알고리즘 종류</label>
              <select id="study-group-select" class="study-scenario-select" aria-label="알고리즘 종류 선택"></select>
            </div>
            <div class="study-viewer-controls">
              <label class="study-select-label" for="study-scenario-select">세부 알고리즘</label>
              <select id="study-scenario-select" class="study-scenario-select" aria-label="세부 알고리즘 선택"></select>
            </div>
          </div>
        </article>

        <article class="card study-viewer-card study-viewer-shell">
          <div class="study-frame-wrap study-frame-wrap-embedded study-frame-wrap-expanded">
            <iframe id="study-frame" title="코테자료 시뮬레이션" loading="lazy" scrolling="no"></iframe>
          </div>
        </article>
      </section>

      <section id="study-learning-plan-panel" class="study-focus-layout" hidden>
        <div class="study-plan-browser">
          <aside class="card panel-pad-md study-plan-sidebar">
            <div id="study-plan-menu" class="study-plan-menu" role="tablist" aria-label="학습 플랜 파일 목록"></div>
          </aside>

          <article class="card study-viewer-card study-plan-viewer">
            <div class="study-frame-wrap study-frame-wrap-expanded study-plan-frame-wrap">
              <iframe id="study-plan-frame" title="학습 플랜 파일 뷰어" loading="lazy"></iframe>
            </div>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Copyright © <span id="year"></span> Kyungrok Park (ultrasuperrok@gmail.com)</p>
    </footer>
  </div>

  <script src="assets/site.js"></script>
  <script src="assets/data.js"></script>
  <script src="assets/study.js"></script>
</body>
</html>
