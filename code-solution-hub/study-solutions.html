<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>코테자료 | 문제 해설</title>
  <meta name="description" content="프로그래머스 문제의 분류, 힌트, 간단 해설, 그리고 Python/C++ 정답 코드를 한 곳에서 보는 페이지" />
  <style>
    :root {
      --bg: #f5f7f3;
      --surface: rgba(255, 255, 255, 0.92);
      --surface-soft: #f8faf7;
      --border: #d8e2d3;
      --text: #1f2a1f;
      --muted: #5d6a5d;
      --accent: #5a7b5c;
      --accent-strong: #3f6042;
      --accent-soft: #e7f0e5;
      --shadow: 0 10px 28px rgba(54, 77, 55, 0.08);
      --shadow-soft: 0 6px 18px rgba(54, 77, 55, 0.05);
      --radius-xl: 24px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;
      --max-width: 1440px;
    }

    * { box-sizing: border-box; }

    html {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #f5f7f3 0%, #f2f5f1 100%);
      overflow-y: scroll;
      scrollbar-gutter: stable both-edges;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--sans);
      color: var(--text);
      background: transparent;
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; }

    .page-shell {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 22px 20px 30px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .brand-label {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .menu-pill {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid var(--border);
      color: var(--accent-strong);
      font-weight: 700;
      box-shadow: var(--shadow-soft);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 330px) minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 18px;
      align-self: start;
    }

    .sidebar-panel,
    .detail-card {
      background:
        radial-gradient(circle at top right, rgba(105, 141, 108, 0.10), transparent 36%),
        var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .sidebar-panel {
      height: calc(100vh - 42px);
      min-height: 640px;
      padding: 18px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar-title {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 800;
    }

    .sidebar-caption {
      margin: -4px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .problem-list {
      flex: 1;
      min-height: 0;
      display: grid;
      gap: 10px;
      overflow: auto;
      padding-right: 4px;
      scrollbar-gutter: stable;
    }

    .problem-item {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      border-radius: 16px;
      padding: 12px 13px;
      background: var(--surface-soft);
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, background-color 0.16s ease, box-shadow 0.16s ease;
      color: var(--text);
    }

    .problem-item:hover {
      transform: translateY(-1px);
      border-color: rgba(90, 123, 92, 0.28);
      box-shadow: var(--shadow-soft);
    }

    .problem-item.active {
      background: var(--accent-soft);
      border-color: rgba(90, 123, 92, 0.40);
      box-shadow: inset 0 0 0 1px rgba(90, 123, 92, 0.10);
    }

    .problem-item-number {
      color: var(--accent);
      font-size: 0.88rem;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .problem-item-title {
      margin: 0 0 4px;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.35;
    }

    .problem-item-meta {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .content { min-width: 0; }

    .detail-card {
      padding: 24px 24px 22px;
      min-height: calc(100vh - 42px);
    }

    .detail-header {
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 18px;
    }

    .detail-kicker {
      margin: 0 0 6px;
      color: var(--accent);
      font-size: 0.95rem;
      font-weight: 800;
    }

    .detail-title {
      margin: 0;
      font-size: clamp(2rem, 2.9vw, 3.15rem);
      line-height: 1.12;
      letter-spacing: -0.02em;
      word-break: keep-all;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: minmax(260px, 0.9fr) minmax(0, 1.1fr);
      gap: 14px;
      margin-bottom: 18px;
      align-items: start;
    }

    .info-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface-soft);
      padding: 18px;
    }

    .info-card h2 {
      margin: 0 0 10px;
      font-size: 1.05rem;
    }

    .detail-category {
      margin: 0 0 12px;
      font-weight: 700;
    }

    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #eef4ec;
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    details.info-card {
      padding: 0;
      overflow: hidden;
    }

    details.info-card summary {
      list-style: none;
      cursor: pointer;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    details.info-card summary::-webkit-details-marker { display: none; }

    .summary-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .summary-title {
      font-size: 1.05rem;
      font-weight: 800;
    }

    .summary-subtitle {
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 600;
    }

    .summary-icon {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      color: var(--accent-strong);
      background: rgba(255, 255, 255, 0.75);
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    details.info-card[open] summary {
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.58);
    }

    details.info-card[open] .summary-icon::before { content: "−"; }
    details.info-card:not([open]) .summary-icon::before { content: "+"; }

    .notes-body {
      padding: 16px 18px 18px;
      display: grid;
      gap: 14px;
    }

    .note-block { margin: 0; }

    .note-label {
      display: block;
      margin-bottom: 6px;
      font-weight: 800;
    }

    .code-section {
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    .code-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .code-head h2 {
      margin: 0;
      font-size: 1.15rem;
    }

    .code-caption {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .language-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
      flex-shrink: 0;
      box-shadow: var(--shadow-soft);
    }

    .lang-button {
      border: none;
      background: transparent;
      color: var(--muted);
      padding: 8px 15px;
      min-width: 82px;
      border-radius: 999px;
      font-weight: 800;
      cursor: pointer;
      transition: background-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    .lang-button:hover { transform: translateY(-1px); }

    .lang-button.active {
      background: var(--accent);
      color: #fff;
    }

    .code-frame {
      border-radius: 18px;
      overflow: hidden;
      background: #162018;
      border: 1px solid rgba(14, 20, 15, 0.18);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .code-block {
      margin: 0;
      padding: 18px 20px;
      height: clamp(390px, 62vh, 760px);
      overflow: auto;
      scrollbar-gutter: stable;
    }

    .code-block code {
      display: block;
      min-width: max-content;
      color: #edf3ea;
      font-family: var(--mono);
      font-size: 0.92rem;
      line-height: 1.65;
      white-space: pre;
    }

    .footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
    }

    @media (max-width: 1120px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .sidebar-panel { height: auto; min-height: 0; }
      .problem-list { max-height: 420px; }
      .detail-card { min-height: 0; }
      .meta-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .page-shell { padding-inline: 14px; }
      .detail-card, .sidebar-panel { padding: 18px 16px; }
      .detail-title { font-size: clamp(1.75rem, 8vw, 2.4rem); }
      .code-head { flex-direction: column; }
      .language-toggle { align-self: flex-start; }
      .code-block { height: 58vh; }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-label">코테자료</span>
        <span class="menu-pill">문제해설</span>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar" aria-label="문제 목록">
        <section class="sidebar-panel">
          <h2 class="sidebar-title">문제 목록</h2>
          <p class="sidebar-caption">왼쪽에서 문제를 고르면 오른쪽에서 분류, 해설, 정답 코드를 볼 수 있습니다.</p>
          <div id="problem-list" class="problem-list"></div>
        </section>
      </aside>

      <section class="content">
        <article class="detail-card" aria-live="polite">
          <header class="detail-header">
            <p id="detail-kicker" class="detail-kicker"></p>
            <h1 id="detail-title" class="detail-title"></h1>
          </header>

          <section class="meta-grid">
            <section class="info-card" aria-labelledby="category-heading">
              <h2 id="category-heading">문제 분류</h2>
              <p id="detail-category" class="detail-category"></p>
              <div id="detail-tags" class="tag-row"></div>
            </section>

            <details id="detail-notes" class="info-card" aria-labelledby="notes-summary-title">
              <summary>
                <span class="summary-left">
                  <span id="notes-summary-title" class="summary-title">힌트 및 간단 해설</span>
                  <span class="summary-subtitle">처음에는 닫혀 있고, 눌렀을 때만 펼쳐집니다.</span>
                </span>
                <span class="summary-icon" aria-hidden="true"></span>
              </summary>
              <div class="notes-body">
                <p class="note-block"><span class="note-label">힌트</span><span id="detail-hint"></span></p>
                <p class="note-block"><span class="note-label">간단 해설</span><span id="detail-summary"></span></p>
              </div>
            </details>
          </section>

          <section class="code-section" aria-labelledby="code-heading">
            <div class="code-head">
              <div>
                <h2 id="code-heading">정답 코드</h2>
                <p class="code-caption">Python / C++를 바꿔가며 확인할 수 있습니다.</p>
              </div>
              <div class="language-toggle" aria-label="정답 코드 언어 선택">
                <button type="button" class="lang-button" data-lang="python">Python</button>
                <button type="button" class="lang-button" data-lang="cpp">C++</button>
              </div>
            </div>
            <div class="code-frame">
              <pre class="code-block"><code id="code-viewer"></code></pre>
            </div>
          </section>
        </article>
      </section>
    </main>

    <footer class="footer">
      <p>Copyright © Kyungrok Park (ultrasuperrok@gmail.com)</p>
    </footer>
  </div>

  <script>
    (() => {
      const state = {
        problems: JSON.parse(document.getElementById('problem-data').textContent),
        selectedId: null,
        language: localStorage.getItem('studySolutionLanguage') || 'python',
        codeCache: new Map(),
        requestId: 0
      };

      const els = {
        problemList: document.getElementById('problem-list'),
        detailKicker: document.getElementById('detail-kicker'),
        detailTitle: document.getElementById('detail-title'),
        detailCategory: document.getElementById('detail-category'),
        detailTags: document.getElementById('detail-tags'),
        detailNotes: document.getElementById('detail-notes'),
        detailHint: document.getElementById('detail-hint'),
        detailSummary: document.getElementById('detail-summary'),
        codeViewer: document.getElementById('code-viewer')
      };

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;');
      }

      function formatProblemNumber(num) {
        return String(num).padStart(2, '0');
      }

      function getProblem(id) {
        return state.problems.find((problem) => problem.id === id) || null;
      }

      function syncLanguageButtons() {
        document.querySelectorAll('.lang-button').forEach((button) => {
          button.classList.toggle('active', button.dataset.lang === state.language);
        });
      }

      function syncProblemButtons() {
        els.problemList.querySelectorAll('[data-id]').forEach((button) => {
          button.classList.toggle('active', button.dataset.id === state.selectedId);
        });
      }

      function currentLanguageMeta(item) {
        return item.languages[state.language] || item.languages.python || item.languages.cpp || Object.values(item.languages)[0];
      }

      function renderProblemList() {
        els.problemList.innerHTML = state.problems.map((item) => `
          <button type="button" class="problem-item" data-id="${item.id}">
            <div class="problem-item-number">${item.chapter} · 문제 ${formatProblemNumber(item.num)}</div>
            <div class="problem-item-title">${item.title}</div>
            <div class="problem-item-meta">${item.category}</div>
          </button>
        `).join('');

        els.problemList.addEventListener('click', (event) => {
          const button = event.target.closest('[data-id]');
          if (!button) return;
          selectProblem(button.dataset.id, true);
        });
      }

      function renderTags(item) {
        els.detailTags.innerHTML = item.tags.map((tag) => `<span class="tag">${tag}</span>`).join('');
      }

      function updateHash(id) {
        history.replaceState(null, '', `#${id}`);
      }

      async function loadCode(item) {
        const lang = currentLanguageMeta(item);
        const cacheKey = `${item.id}:${state.language}`;
        const requestId = ++state.requestId;

        els.codeViewer.innerHTML = escapeHtml(`// ${lang.label} 코드를 불러오는 중입니다...`);

        if (state.codeCache.has(cacheKey)) {
          els.codeViewer.innerHTML = escapeHtml(state.codeCache.get(cacheKey));
          return;
        }

        try {
          const response = await fetch(lang.rawCodeUrl, { mode: 'cors' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const code = await response.text();
          state.codeCache.set(cacheKey, code);
          if (requestId !== state.requestId) return;
          els.codeViewer.innerHTML = escapeHtml(code);
        } catch (error) {
          if (requestId !== state.requestId) return;
          els.codeViewer.innerHTML = escapeHtml([
            `// ${lang.label} 코드를 자동으로 불러오지 못했습니다.`,
            '// 브라우저에서 GitHub raw 요청이 차단된 경우 이런 현상이 생길 수 있습니다.',
            '// 잠시 후 다시 시도하거나 네트워크 환경을 확인해 주세요.'
          ].join('\n'));
        }
      }

      function renderDetail(item) {
        els.detailKicker.textContent = `${item.chapter} · 문제 ${item.num}`;
        els.detailTitle.textContent = item.title;
        els.detailCategory.textContent = `${item.category} · 난이도 ${item.stars}`;
        els.detailHint.textContent = item.hint;
        els.detailSummary.textContent = item.summary;
        els.detailNotes.open = false;
        renderTags(item);
        syncProblemButtons();
        syncLanguageButtons();
        loadCode(item);
      }

      function selectProblem(id, shouldUpdateHash = false) {
        const item = getProblem(id);
        if (!item) return;
        state.selectedId = id;
        renderDetail(item);
        if (shouldUpdateHash) updateHash(id);
      }

      function applyInitialSelection() {
        const hash = window.location.hash.replace('#', '');
        const first = state.problems[0];
        const target = getProblem(hash) || first;
        if (!target) return;
        state.selectedId = target.id;
        renderDetail(target);
        if (!hash) updateHash(target.id);
      }

      function attachEvents() {
        document.querySelectorAll('.lang-button').forEach((button) => {
          button.addEventListener('click', () => {
            const nextLang = button.dataset.lang;
            if (!nextLang || nextLang === state.language) return;
            state.language = nextLang;
            localStorage.setItem('studySolutionLanguage', state.language);
            syncLanguageButtons();
            const item = getProblem(state.selectedId);
            if (item) loadCode(item);
          });
        });

        window.addEventListener('hashchange', () => {
          const hash = window.location.hash.replace('#', '');
          const item = getProblem(hash);
          if (item) selectProblem(item.id, false);
        });
      }

      state.problems = state.problems
        .filter((item) => item && typeof item.num === 'number' && item.num < 86)
        .sort((a, b) => a.num - b.num);

      renderProblemList();
      attachEvents();
      applyInitialSelection();
    })();
  </script>
</body>
</html>
