    <main class="page-shell section-tight">
      <section class="card panel-pad-lg study-board-card">
        <div class="section-header">
          <h2>스터디모집</h2>
          <p>모집 글을 게시글 형태로 등록하고 목록과 상세에서 확인하세요.</p>
        </div>

        <form id="study-board-form" class="study-board-form">
          <label class="study-board-field-title">
            <span>제목</span>
            <input id="study-title" name="title" type="text" required placeholder="예: 알고리즘 스터디 4기" />
          </label>
          <label class="study-board-field-schedule">
            <span>모집 마감</span>
            <input id="study-schedule-date" name="scheduleDate" type="date" required />
          </label>
          <label class="study-board-field-capacity">
            <span>모집인원</span>
            <input id="study-capacity" name="capacity" type="number" min="1" required placeholder="예: 6" />
          </label>
          <label class="study-board-field-topic">
            <span>분야</span>
            <div class="study-choice-group" role="radiogroup" aria-label="분야 선택">
              <button class="study-choice-button is-active" type="button" data-choice-target="study-field" data-choice-value="알고리즘">알고리즘</button>
              <button class="study-choice-button" type="button" data-choice-target="study-field" data-choice-value="백엔드">백엔드</button>
              <button class="study-choice-button" type="button" data-choice-target="study-field" data-choice-value="프론트엔드">프론트엔드</button>
              <button class="study-choice-button" type="button" data-choice-target="study-field" data-choice-value="AI">AI</button>
              <button class="study-choice-button" type="button" data-choice-target="study-field" data-choice-value="CS">CS</button>
            </div>
            <input id="study-field" name="field" type="hidden" value="알고리즘" required />
          </label>
          <label class="study-board-field-mode">
            <span>온라인/오프라인</span>
            <div class="study-choice-group study-choice-group-mode" role="radiogroup" aria-label="진행 방식 선택">
              <button class="study-choice-button is-active study-mode-online" type="button" data-choice-target="study-mode" data-choice-value="온라인">온라인</button>
              <button class="study-choice-button study-mode-offline" type="button" data-choice-target="study-mode" data-choice-value="오프라인">오프라인</button>
              <button class="study-choice-button study-mode-hybrid" type="button" data-choice-target="study-mode" data-choice-value="혼합">혼합</button>
            </div>
            <input id="study-mode" name="mode" type="hidden" value="온라인" required />
          </label>
          <label class="study-board-field-apply">
            <span>신청방법 혹은 링크</span>
            <input id="study-apply" name="apply" type="text" required placeholder="오픈채팅 링크 또는 연락 방법" />
          </label>
          <label>
            <span>삭제 비밀번호</span>
            <input id="study-password" name="password" type="password" required minlength="4" maxlength="30" placeholder="글 삭제 시 사용할 비밀번호" />
          </label>
          <label>
            <span>비밀번호 확인</span>
            <input id="study-password-confirm" name="passwordConfirm" type="password" required minlength="4" maxlength="30" placeholder="비밀번호를 다시 입력하세요" />
          </label>
          <label class="study-board-full">
            <span>상세내용</span>
            <textarea id="study-detail" name="detail" rows="4" required placeholder="진행 방식, 대상, 준비물 등을 작성하세요."></textarea>
          </label>
          <input id="study-edit-id" name="editId" type="hidden" value="" />
          <div class="study-board-form-actions">
            <button class="button button-primary study-board-submit" type="submit" id="study-submit-button">등록하기</button>
            <button class="button button-secondary" type="button" id="study-cancel-edit" hidden>수정 취소</button>
          </div>
        </form>

        <div class="study-board-list-wrap">
          <h3>모집 리스트</h3>
          <p class="study-board-hint">필터를 적용해 원하는 모집글만 확인할 수 있습니다.</p>
          <div class="study-board-filters">
            <select id="filter-field" aria-label="분야 필터">
              <option value="all" selected>분야 전체</option>
              <option value="알고리즘">알고리즘</option>
              <option value="백엔드">백엔드</option>
              <option value="프론트엔드">프론트엔드</option>
              <option value="AI">AI</option>
              <option value="CS">CS</option>
            </select>
            <select id="filter-mode" aria-label="진행 방식 필터">
              <option value="all" selected>진행 방식 전체</option>
              <option value="온라인">온라인</option>
              <option value="오프라인">오프라인</option>
              <option value="혼합">혼합</option>
            </select>
          </div>
          <ul id="study-board-list" class="study-board-list"></ul>
          <p id="study-board-empty" class="study-board-empty">등록된 모집글이 없습니다.</p>
        </div>
